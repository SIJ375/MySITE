<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIJ！コミュニティ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; padding-bottom: 80px; }
        .main-container { max-width: 500px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; }
        @keyframes highlight {
            0% { background-color: #fef08a; }
            100% { background-color: #ffffff; }
        }
        .highlight-post { animation: highlight 2.5s ease-out forwards; }
        /* 動画のレスポンシブアスペクト比維持用 */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="main-container shadow-lg flex flex-col min-h-screen">
        
        <header class="sticky top-0 bg-white border-b border-gray-200 p-4 z-10 space-y-3">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold text-green-600 cursor-pointer" onclick="clearSearchAndRoute()">SIJ!コミュニティ</h1>
                <div class="flex items-center space-x-2">
                    <div id="userInfo" class="hidden flex items-center space-x-2">
                        <img id="myAvatar" onclick="openProfileModal()" class="w-8 h-8 rounded-full border cursor-pointer hover:opacity-80 transition" src="" alt="my avatar">
                        <span id="myName" onclick="openProfileModal()" class="text-sm font-bold text-gray-700 cursor-pointer hover:underline"></span>
                    </div>
                    <button id="adminAnnounceBtn" onclick="openAnnounceModal()" class="hidden bg-red-500 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-red-600 animate-pulse">
                        <i class="fa-solid fa-bullhorn"></i> 告知
                    </button>
                    <button id="adminCloseBtn" onclick="toggleServerClose(true)" class="hidden bg-gray-800 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-black">
                        <i class="fa-solid fa-lock"></i> サーバー閉鎖
                    </button>
                    <button id="adminOpenBtn" onclick="toggleServerClose(false)" class="hidden bg-blue-500 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-blue-600">
                        <i class="fa-solid fa-lock-open"></i> 閉鎖解除
                    </button>
                    <button id="postBtn" onclick="openPostModal()" class="hidden bg-green-500 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-green-600">
                        <i class="fa-solid fa-pen"></i> 投稿
                    </button>
                    <button id="authBtn" onclick="openAuthModal()" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-gray-300">
                        ログイン/作成
                    </button>
                    <button id="logoutBtn" onclick="handleLogout()" class="hidden bg-red-100 text-red-600 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-red-200">
                        ログアウト
                    </button>
                </div>
            </div>

            <div class="flex items-center space-x-2">
                <div class="flex-1 flex items-center space-x-2 bg-gray-100 rounded-full px-3 py-1.5 border border-gray-200">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
                    <span class="text-gray-400 font-bold text-sm">#</span>
                    <input id="searchInput" type="text" class="bg-transparent border-none outline-none text-sm w-full" placeholder="タグ名で検索" onkeydown="if(event.key==='Enter') execSearch()">
                    <button onclick="execSearch()" class="text-xs bg-green-600 text-white px-3 py-1 rounded-full font-bold hover:bg-green-700">検索</button>
                </div>
                <button onclick="openUserSearchModal()" class="bg-gray-100 border border-gray-200 text-gray-600 p-2 rounded-full hover:bg-gray-200 transition" title="ユーザー検索">
                    <i class="fa-solid fa-user-gear"></i>
                </button>
            </div>

            <div id="searchBadge" class="hidden text-xs bg-green-50 text-green-700 px-3 py-1 rounded-md flex justify-between items-center">
                <span>検索中: <strong id="searchWord"></strong></span>
                <button onclick="clearSearch()" class="text-gray-400 hover:text-gray-600">&times; 解除</button>
            </div>
        </header>

        <div id="newPostAlert" class="hidden text-center my-3 transition-all duration-300">
            <button onclick="loadNewPosts()" class="bg-green-500 hover:bg-green-600 text-white text-xs font-bold px-4 py-2 rounded-full shadow-md animate-bounce">
                <i class="fa-solid fa-arrow-up mr-1"></i> 新しい投稿
            </button>
        </div>
        
        <div id="profileBar" class="hidden bg-gray-50 p-3 border-b border-gray-100 text-xs text-gray-600 flex justify-between items-center">
            <div>
                <span class="font-bold">自己紹介:</span> <span id="myBio">未設定</span>
            </div>
            <button onclick="openProfileModal()" class="text-green-600 hover:underline">編集</button>
        </div>

        <div id="announceArea" class="hidden bg-green-50 border-b border-green-200 p-4 space-y-2 text-sm text-green-800">
            <div class="flex items-center space-x-2 font-bold text-green-700">
                <i class="fa-solid fa-bullhorn animate-bounce"></i>
                <span>公式からのお知らせ</span>
            </div>
            <p id="announceText" class="whitespace-pre-wrap leading-relaxed font-semibold">現在お知らせはありません。</p>
        </div>

        <main id="timeline" class="flex-1 p-4 space-y-4"></main>

        <nav class="fixed bottom-0 left-0 right-0 max-w-[500px] mx-auto bg-white border-t border-gray-200 flex justify-around py-3 z-10 shadow-lg">
            <button id="tabLatest" onclick="switchTab('latest')" class="flex flex-col items-center text-green-600 font-bold text-xs w-1/5">
                <i class="fa-solid fa-globe text-lg mb-0.5"></i>
                <span>最新</span>
            </button>
            <button id="tabRecommend" onclick="switchTab('recommend')" class="flex flex-col items-center text-gray-400 font-bold text-xs w-1/5">
                <i class="fa-solid fa-fire text-lg mb-0.5"></i>
                <span>おすすめ</span>
            </button>
            <button id="tabFollow" onclick="switchTab('follow')" class="flex flex-col items-center text-gray-400 font-bold text-xs w-1/5">
                <i class="fa-solid fa-user-group text-lg mb-0.5"></i>
                <span>フォロー</span>
            </button>
            <button id="tabNotification" onclick="switchTab('notification')" class="flex flex-col items-center text-gray-400 font-bold text-xs w-1/5 relative">
                <i class="fa-solid fa-bell text-lg mb-0.5"></i>
                <span>通知</span>
                <span id="navNotifyBadge" class="hidden absolute top-2 right-4 bg-red-500 text-white rounded-full text-[10px] w-4 h-4 flex items-center justify-center font-bold">0</span>
            </button>
            <button id="tabMyPage" onclick="switchTab('mypage')" class="flex flex-col items-center text-gray-400 font-bold text-xs w-1/5">
                <i class="fa-solid fa-user text-lg mb-0.5"></i>
                <span>マイページ</span>
            </button>
        </nav>

    </div>

    <div id="commentModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6 flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-lg font-bold text-gray-800"><i class="fa-regular fa-comments text-green-600 mr-1"></i> コメント</h3>
                <button onclick="closeCommentModal(true)" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <div id="commentListArea" class="flex-1 overflow-y-auto space-y-4 pr-1 mb-4 text-sm"></div>
            <div id="replyTargetBadge" class="hidden text-xs bg-blue-50 text-blue-700 p-2 rounded mb-2 flex justify-between items-center">
                <span><strong id="replyTargetName"></strong> さんに返信中...</span>
                <button onclick="cancelReplyTarget()" class="text-gray-400 hover:text-gray-600">&times; 取消</button>
            </div>
            <div id="commentFormArea"></div>
        </div>
    </div>

    <div id="userSearchModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-sm p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">ユーザーを探す</h3>
                <button onclick="closeUserSearchModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <input id="userQueryInput" type="text" class="border rounded-full px-3 py-1.5 text-sm w-full outline-none mb-4" placeholder="ユーザー名を入力..." oninput="searchUsers()">
            <div id="userSearchResults" class="space-y-2 max-h-60 overflow-y-auto"></div>
        </div>
    </div>

    <div id="userViewModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-sm p-6 text-center">
            <div class="flex justify-end">
                <button onclick="closeUserViewModal(true)" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <img id="viewAvatar" class="w-24 h-24 rounded-full border mx-auto mb-4 object-cover" src="">
            <h3 id="viewName" class="text-xl font-bold text-gray-800 mb-2"></h3>
            <p id="viewBio" class="text-sm text-gray-600 bg-gray-50 p-3 rounded-lg min-h-[50px] flex items-center justify-center whitespace-pre-wrap mb-4"></p>
            <div id="followBtnArea"></div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 id="authTitle" class="text-lg font-bold">簡易アカウント作成</h3>
                <button onclick="closeAuthModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <div class="space-y-3">
                <input id="authUsername" type="text" class="w-full border p-2 rounded text-sm" placeholder="ユーザー名">
                <input id="authPassword" type="password" class="w-full border p-2 rounded text-sm" placeholder="パスワード（6文字以上）">
                <input id="authPasswordConfirm" type="password" class="w-full border p-2 rounded text-sm" placeholder="パスワード確認（もう一度入力）">
                <div class="flex flex-col gap-2 pt-2">
                    <button id="authSubmitBtn" onclick="handleAuthSubmit()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600 text-sm">アカウントを作成する</button>
                    <button id="authToggleBtn" onclick="toggleAuthMode()" class="text-xs text-gray-500 underline hover:text-gray-700">すでにアカウントをお持ちの方（ログイン）</button>
                </div>
            </div>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">プロフィール編集</h3>
                <button onclick="closeProfileModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">アイコン画像</label>
                    <input id="avatarFile" type="file" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">一言（自己紹介）</label>
                    <input id="editBio" type="text" class="w-full border p-2 rounded text-sm" placeholder="今の一言を入力してください">
                </div>
                <button onclick="saveProfile()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600 text-sm">保存する</button>
            </div>
        </div>
    </div>

    <div id="postModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">新規投稿</h3>
                <button onclick="closePostModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <textarea id="postText" class="w-full border border-gray-300 rounded p-2 h-24 resize-none mb-4" placeholder="今なにしてる？ YouTubeのURLを貼ると動画が埋め込まれるよ！"></textarea>
            <label class="block text-xs font-bold text-gray-700 mb-1">画像を追加（任意）</label>
            <input id="postMediaFile" type="file" accept="image/*" class="w-full text-xs text-gray-500 mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
            <button onclick="submitPost()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600">投稿する</button>
        </div>
    </div>

    <div id="announceModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-red-600">公式お知らせを投稿</h3>
                <button onclick="closeAnnounceModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <textarea id="announceInputText" class="w-full border border-gray-300 rounded p-2 h-32 resize-none mb-4" placeholder="ユーザー全員に見せる重要なお知らせを入力..."></textarea>
            <button onclick="submitAnnouncement()" class="w-full bg-red-500 text-white py-2 rounded font-bold hover:bg-red-600">お知らせを更新する</button>
        </div>
    </div>

    <div id="editPostModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">投稿を編集</h3>
                <button onclick="closeEditPostModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <input type="hidden" id="editPostId">
            <textarea id="editPostText" class="w-full border border-gray-300 rounded p-2 h-24 resize-none mb-4" placeholder="投稿を編集します..."></textarea>
            <button onclick="submitEditPost()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600">更新する</button>
        </div>
    </div>

    <script>
        // --- 1. Supabaseの初期化 ---
        const SUPABASE_URL = "https://koxkocjylgupwlygbyat.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtveGtvY2p5bGd1cHdseWdieWF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzcwMTkwNzcsImV4cCI6MjA1MjU5NTA3N30.Z4jXUaHURvOicRAs5T8-fF6Wq-p_r-iK6Iqf8I6Iqf8"; // あなたのanon key
        const exClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. 状態管理用変数 ---
        let currentUser = null;
        let currentTab = 'latest'; // 'latest', 'recommend', 'follow', 'notification', 'mypage'
        let currentSearchTag = null;
        let replyTargetCommentId = null;

        // グローバルDOM要素の宣言
        let postListArea;
        let commentListArea;

        // --- 3. 認証関連の関数 ---
        function openAuthModal() {
            document.getElementById('authModal').classList.remove('hidden');
        }
        function closeAuthModal() {
            document.getElementById('authModal').classList.add('hidden');
        }
        function toggleAuthMode() {
            const title = document.getElementById('authTitle');
            const submitBtn = document.getElementById('authSubmitBtn');
            const toggleBtn = document.getElementById('authToggleBtn');
            const confirmInput = document.getElementById('authPasswordConfirm');

            if (title.innerText === '簡易アカウント作成') {
                title.innerText = 'ログイン';
                submitBtn.innerText = 'ログインする';
                toggleBtn.innerText = 'アカウントをお持ちでない方（新規作成）';
                confirmInput.classList.add('hidden');
            } else {
                title.innerText = '簡易アカウント作成';
                submitBtn.innerText = 'アカウントを作成する';
                toggleBtn.innerText = 'すでにアカウントをお持ちの方（ログイン）';
                confirmInput.classList.remove('hidden');
            }
        }

        async function handleAuthSubmit() {
            const isLogin = document.getElementById('authTitle').innerText === 'ログイン';
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            const passwordConfirm = document.getElementById('authPasswordConfirm').value;

            if (!username || !password) {
                alert('ユーザー名とパスワードを入力してください。');
                return;
            }

            if (!isLogin && password !== passwordConfirm) {
                alert('パスワード確認が一致しません。');
                return;
            }

            try {
                if (isLogin) {
                    const { data, error } = await exClient
                        .from('profiles')
                        .select('*')
                        .eq('username', username)
                        .eq('password', password)
                        .single();

                    if (error || !data) {
                        alert('ユーザー名またはパスワードが間違っています。');
                        return;
                    }
                    currentUser = data;
                    localStorage.setItem('sij_user', JSON.stringify(currentUser));
                    alert(`おかえりなさい、${currentUser.username} さん！`);
                } else {
                    const { data: exist } = await exClient
                        .from('profiles')
                        .select('username')
                        .eq('username', username);

                    if (exist && exist.length > 0) {
                        alert('そのユーザー名はすでに使用されています。');
                        return;
                    }

                    const { data, error } = await exClient
                        .from('profiles')
                        .insert([{ username, password, avatar_url: '', bio: '' }])
                        .select()
                        .single();

                    if (error) throw error;
                    currentUser = data;
                    localStorage.setItem('sij_user', JSON.stringify(currentUser));
                    alert(`アカウントを作成しました！ようこそ、${currentUser.username} さん！`);
                }

                closeAuthModal();
                updateAuthUI();
                await fetchAndRenderPosts();

            } catch (err) {
                console.error(err);
                alert('エラーが発生しました。');
            }
        }

        function handleLogout() {
            if (!confirm('ログアウトしますか？')) return;
            currentUser = null;
            localStorage.removeItem('sij_user');
            updateAuthUI();
            switchTab('latest');
        }

        function updateAuthUI() {
            const authBtn = document.getElementById('authBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const userInfo = document.getElementById('userInfo');
            const postBtn = document.getElementById('postBtn');
            const profileBar = document.getElementById('profileBar');
            const adminAnnounceBtn = document.getElementById('adminAnnounceBtn');
            const adminCloseBtn = document.getElementById('adminCloseBtn');
            const adminOpenBtn = document.getElementById('adminOpenBtn');

            if (currentUser) {
                authBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                userInfo.classList.remove('hidden');
                postBtn.classList.remove('hidden');
                profileBar.classList.remove('hidden');

                if (currentUser.username === '管理者') {
                    adminAnnounceBtn.classList.remove('hidden');
                    adminCloseBtn.classList.remove('hidden');
                    adminOpenBtn.classList.remove('hidden');
                } else {
                    adminAnnounceBtn.classList.add('hidden');
                    adminCloseBtn.classList.add('hidden');
                    adminOpenBtn.classList.add('hidden');
                }

                document.getElementById('myName').innerText = currentUser.username;
                document.getElementById('myAvatar').src = currentUser.avatar_url || 'https://via.placeholder.com/150';
                document.getElementById('myBio').innerText = currentUser.bio || '未設定';
            } else {
                authBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                userInfo.classList.add('hidden');
                postBtn.classList.add('hidden');
                profileBar.classList.add('hidden');
                adminAnnounceBtn.classList.add('hidden');
                adminCloseBtn.classList.add('hidden');
                adminOpenBtn.classList.add('hidden');
            }
        }

        async function checkUserStatus() {
            const saved = localStorage.getItem('sij_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                const { data, error } = await exClient
                    .from('profiles')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single();
                if (!error && data) {
                    currentUser = data;
                    localStorage.setItem('sij_user', JSON.stringify(currentUser));
                }
            }
            updateAuthUI();
        }

        // --- 4. 公式お知らせ関連 ---
        async function fetchAnnouncement() {
            const { data, error } = await exClient
                .from('announcements')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(1);

            const announceArea = document.getElementById('announceArea');
            const announceText = document.getElementById('announceText');

            if (!error && data && data.length > 0) {
                announceText.innerText = data[0].content;
                announceArea.classList.remove('hidden');
            } else {
                announceArea.classList.add('hidden');
            }
        }

        function openAnnounceModal() {
            document.getElementById('announceModal').classList.remove('hidden');
        }
        function closeAnnounceModal() {
            document.getElementById('announceModal').classList.add('hidden');
        }
        async function submitAnnouncement() {
            const text = document.getElementById('announceInputText').value.trim();
            if (!text) return;

            const { error } = await exClient
                .from('announcements')
                .insert([{ content: text }]);

            if (error) {
                alert('お知らせの送信に失敗しました。');
                console.error(error);
            } else {
                document.getElementById('announceInputText').value = '';
                closeAnnounceModal();
                await fetchAnnouncement();
            }
        }

        // --- 5. タイムライン・投稿関連 ---
        async function fetchAndRenderPosts(highlightPostId = null) {
            if (!postListArea) return;
            postListArea.innerHTML = '<div class="text-center text-gray-500 text-sm py-8">読み込み中...</div>';

            try {
                let query = exClient
                    .from('posts')
                    .select(`
                        *,
                        profiles!posts_user_id_fkey(*),
                        likes(*),
                        comments(*)
                    `)
                    .order('created_at', { ascending: false });

                if (currentSearchTag) {
                    query = query.ilike('content', `%#${currentSearchTag}%`);
                }

                let { data: posts, error } = await query;
                if (error) throw error;

                if (currentTab === 'recommend' && posts) {
                    posts = posts.sort((a, b) => {
                        const scoreA = (a.likes?.length || 0) + (a.comments?.length || 0);
                        const scoreB = (b.likes?.length || 0) + (b.comments?.length || 0);
                        return scoreB - scoreA;
                    });
                }

                if (currentTab === 'follow' && posts) {
                    if (!currentUser) {
                        postListArea.innerHTML = '<div class="text-center text-gray-500 text-sm py-8">フォロー中の投稿を見るにはログインが必要です。</div>';
                        return;
                    }
                    const { data: follows } = await exClient
                        .from('follows')
                        .select('following_id')
                        .eq('follower_id', currentUser.id);
                    
                    const followingIds = follows ? follows.map(f => f.following_id) : [];
                    posts = posts.filter(p => followingIds.includes(p.user_id));
                }

                if (!posts || posts.length === 0) {
                    postListArea.innerHTML = '<div class="text-center text-gray-500 text-sm py-8">投稿がありません。</div>';
                    return;
                }

                postListArea.innerHTML = '';

                posts.forEach(post => {
                    const postEl = document.createElement('article');
                    postEl.id = `post-${post.id}`;
                    
                    const isHighlight = post.id === highlightPostId;
                    postEl.className = `p-4 bg-white border border-gray-100 rounded-xl shadow-sm space-y-3 transition duration-300 ${isHighlight ? 'highlight-post' : ''}`;

                    const author = post.profiles || {};
                    const isLiked = currentUser ? post.likes.some(l => l.user_id === currentUser.id) : false;
                    const likeCount = post.likes?.length || 0;
                    const commentCount = post.comments?.length || 0;

                    let actionBtns = '';
                    if (currentUser && (currentUser.id === post.user_id || currentUser.username === '管理者')) {
                        actionBtns = `
                            <div class="flex space-x-2">
                                <button onclick="openEditPostModal('${post.id}', \`${encodeURIComponent(post.content)}\`)" class="text-gray-400 hover:text-blue-500 text-xs">編集</button>
                                <button onclick="deletePost('${post.id}')" class="text-gray-400 hover:text-red-500 text-xs">削除</button>
                            </div>
                        `;
                    }

                    // --- 【元の機能】テキストパース処理の完全復元 ---
                    let formattedContent = escapeHTML(post.content);

                    // 1. 外部サイトURLリンク化の正規表現ロジック
                    const urlRegex = /(https?:\/\/[^\s]+)/g;
                    formattedContent = formattedContent.replace(urlRegex, function(url) {
                        return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="text-blue-500 hover:underline break-all">${url}</a>`;
                    });

                    // 2. ハッシュタグのリンク化
                    formattedContent = formattedContent.replace(/#([a-zA-Z0-9ぁ-んァ-ヶー一-龠]+)/g, '<span class="text-green-600 font-bold cursor-pointer hover:underline" onclick="clickTag(\'$1\')">#$1</span>');

                    // 3. YouTube 埋め込みプレイヤー
                    let youtubeEmbed = '';
                    const ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
                    const ytMatch = post.content.match(ytRegex);
                    if (ytMatch && ytMatch[1]) {
                        youtubeEmbed = `
                            <div class="video-container rounded-lg overflow-hidden border border-gray-100 mt-2 shadow-sm">
                                <iframe src="https://www.youtube.com/embed/${ytMatch[1]}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                            </div>
                        `;
                    }

                    // 4. 画像添付
                    let imageEmbed = '';
                    if (post.media_url) {
                        imageEmbed = `
                            <div class="mt-2 rounded-lg overflow-hidden border border-gray-100 shadow-sm max-h-60 bg-gray-50 flex justify-center items-center">
                                <img src="${post.media_url}" class="max-w-full max-h-60 object-contain hover:scale-105 transition duration-300 cursor-pointer" onclick="window.open('${post.media_url}', '_blank')">
                            </div>
                        `;
                    }

                    postEl.innerHTML = `
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-2.5 cursor-pointer" onclick="openUserViewModal('${author.id}')">
                                <img class="w-10 h-10 rounded-full border object-cover" src="${author.avatar_url || 'https://via.placeholder.com/150'}" alt="avatar">
                                <div>
                                    <h4 class="text-sm font-bold text-gray-800 hover:underline">${author.username || '名無しユーザー'}</h4>
                                    <span class="text-[10px] text-gray-400">${new Date(post.created_at).toLocaleString('ja-JP')}</span>
                                </div>
                            </div>
                            ${actionBtns}
                        </div>

                        <div class="space-y-2">
                            <p class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">${formattedContent}</p>
                            ${youtubeEmbed}
                            ${imageEmbed}
                        </div>

                        <div class="flex items-center space-x-6 text-gray-400 text-xs pt-2 border-t border-gray-50">
                            <button onclick="toggleLike('${post.id}')" class="hover:text-red-500 flex items-center space-x-1 ${isLiked ? 'text-red-500 font-semibold' : ''}">
                                <i class="${isLiked ? 'fa-solid' : 'fa-regular'} fa-heart text-base"></i>
                                <span>${likeCount}</span>
                            </button>
                            <button onclick="openCommentModal('${post.id}')" class="hover:text-green-600 flex items-center space-x-1">
                                <i class="fa-regular fa-comment text-base"></i>
                                <span>${commentCount}</span>
                            </button>
                        </div>
                    `;

                    postListArea.appendChild(postEl);
                });

                if (highlightPostId) {
                    const el = document.getElementById(`post-${highlightPostId}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }

            } catch (err) {
                console.error(err);
                postListArea.innerHTML = '<div class="text-center text-red-500 text-sm py-8">読み込み中にエラーが発生しました。</div>';
            }
        }

        function clickTag(tagName) {
            currentSearchTag = tagName;
            document.getElementById('searchInput').value = tagName;
            document.getElementById('searchWord').innerText = tagName;
            document.getElementById('searchBadge').classList.remove('hidden');

        function openPostModal() {
            if (!currentUser) {
                alert('投稿するにはログインが必要です。');
                openAuthModal();
                return;
            }
            document.getElementById('postModal').classList.remove('hidden');
        }
        function closePostModal() {
            document.getElementById('postModal').classList.add('hidden');
            document.getElementById('postText').value = '';
            document.getElementById('postMediaFile').value = '';
        }

        async function submitPost() {
            const content = document.getElementById('postText').value.trim();
            const mediaFile = document.getElementById('postMediaFile').files[0];

            if (!content && !mediaFile) {
                alert('投稿内容を入力するか、画像を選択してください。');
                return;
            }

            try {
                let mediaUrl = '';

                if (mediaFile) {
                    const fileExt = mediaFile.name.split('.').pop();
                    const fileName = `${currentUser.id}-${Date.now()}.${fileExt}`;
                    const filePath = `posts/${fileName}`;

                    const { error: uploadError } = await exClient.storage
                        .from('media')
                        .upload(filePath, mediaFile);

                    if (uploadError) throw uploadError;

                    const { data } = exClient.storage.from('media').getPublicUrl(filePath);
                    mediaUrl = data.publicUrl;
                }

                const { error } = await exClient
                    .from('posts')
                    .insert([{
                        user_id: currentUser.id,
                        content: content,
                        media_url: mediaUrl
                    }]);

                if (error) throw error;

                closePostModal();
                await fetchAndRenderPosts();

            } catch (err) {
                console.error(err);
                alert('投稿に失敗しました。');
            }
        }

        async function deletePost(postId) {
            if (!confirm('この投稿を削除しますか？')) return;

            try {
                const { error } = await exClient
                    .from('posts')
                    .delete()
                    .eq('id', postId);

                if (error) throw error;
                await fetchAndRenderPosts();
            } catch (err) {
                console.error(err);
                alert('削除に失敗しました。');
            }
        }

        async function toggleLike(postId) {
            if (!currentUser) {
                alert('いいねするにはログインが必要です。');
                openAuthModal();
                return;
            }

            try {
                const { data: exist, error: checkError } = await exClient
                    .from('likes')
                    .select('*')
                    .eq('post_id', postId)
                    .eq('user_id', currentUser.id);

                if (checkError) throw checkError;

                if (exist && exist.length > 0) {
                    const { error } = await exClient
                        .from('likes')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id);
                    if (error) throw error;
                } else {
                    const { error } = await exClient
                        .from('likes')
                        .insert([{ post_id: postId, user_id: currentUser.id }]);
                    if (error) throw error;

                    const { data: postData } = await exClient
                        .from('posts')
                        .select('user_id')
                        .eq('id', postId)
                        .single();

                    if (postData && postData.user_id !== currentUser.id) {
                        await exClient.from('notifications').insert([{
                            notifier_id: currentUser.id,
                            receiver_id: postData.user_id,
                            post_id: postId,
                            type: 'like'
                        }]);
                    }
                }

                await fetchAndRenderPosts();

            } catch (err) {
                console.error(err);
            }
        }

        // --- 6. タブ切り替えとナビゲーション ---
        function switchTab(tabName) {
            currentTab = tabName;
            
            const tabs = {
                latest: 'tabLatest',
                recommend: 'tabRecommend',
                follow: 'tabFollow',
                notification: 'tabNotification',
                mypage: 'tabMyPage'
            };

            Object.keys(tabs).forEach(key => {
                const el = document.getElementById(tabs[key]);
                if (key === tabName) {
                    el.classList.add('text-green-600');
                    el.classList.remove('text-gray-400');
                } else {
                    el.classList.remove('text-green-600');
                    el.classList.add('text-gray-400');
                }
            });

            if (tabName === 'latest' || tabName === 'recommend' || tabName === 'follow') {
                fetchAndRenderPosts();
            } else if (tabName === 'notification') {
                renderNotificationsList();
            } else if (tabName === 'mypage') {
                renderMyPage();
            }
        }

        // --- 8. コメントモーダル関連 ---
        let activePostIdForComment = null;

        async function openCommentModal(postId) {
            activePostIdForComment = postId;
            replyTargetCommentId = null;
            cancelReplyTarget();

            document.getElementById('commentModal').classList.remove('hidden');
            await fetchAndRenderComments();
        }

        function closeCommentModal(needReload = false) {
            document.getElementById('commentModal').classList.add('hidden');
            activePostIdForComment = null;
            replyTargetCommentId = null;
            cancelReplyTarget();
            if (needReload) {
                fetchAndRenderPosts();
            }
        }

        async function fetchAndRenderComments() {
            if (!commentListArea || !activePostIdForComment) return;
            commentListArea.innerHTML = '<div class="text-center text-gray-500 py-4">読み込み中...</div>';

            try {
                const { data: comments, error } = await exClient
                    .from('comments')
                    .select('*, profiles!comments_user_id_fkey(*)')
                    .eq('post_id', activePostIdForComment)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                const formArea = document.getElementById('commentFormArea');
                if (currentUser) {
                    formArea.innerHTML = `
                        <div class="flex space-x-2">
                            <input id="commentTextInput" type="text" class="flex-1 border rounded-full px-4 py-2 text-sm outline-none focus:border-green-500" placeholder="コメントを入力...">
                            <button onclick="submitComment()" class="bg-green-500 hover:bg-green-600 text-white text-xs font-bold px-4 py-2 rounded-full">送信</button>
                        </div>
                    `;
                } else {
                    formArea.innerHTML = `
                        <p class="text-center text-gray-400 text-xs py-2 cursor-pointer hover:underline" onclick="closeCommentModal(); openAuthModal();">
                            ログインするとコメントできます
                        </p>
                    `;
                }

                if (!comments || comments.length === 0) {
                    commentListArea.innerHTML = '<div class="text-center text-gray-400 py-4">コメントはまだありません。</div>';
                    return;
                }

                commentListArea.innerHTML = '';
                
                comments.forEach(c => {
                    const author = c.profiles || {};
                    const isMyComment = currentUser && currentUser.id === c.user_id;

                    const commentEl = document.createElement('div');
                    commentEl.className = 'p-3 bg-gray-50 rounded-lg space-y-1 border border-gray-100';

                    let replyPrefix = '';
                    if (c.parent_id) {
                        const parent = comments.find(p => p.id === c.parent_id);
                        if (parent) {
                            replyPrefix = `<span class="text-xs text-blue-600 font-bold block mb-1">➔ @${parent.profiles?.username || '他ユーザー'} への返信</span>`;
                        }
                    }

                    commentEl.innerHTML = `
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-2">
                                <img class="w-6 h-6 rounded-full border object-cover" src="${author.avatar_url || 'https://via.placeholder.com/150'}">
                                <span class="font-bold text-xs text-gray-700">${author.username || '名無し'}</span>
                                <span class="text-[9px] text-gray-400">${new Date(c.created_at).toLocaleString('ja-JP')}</span>
                            </div>
                            <div class="flex space-x-2 text-[10px]">
                                ${currentUser ? `<button onclick="setReplyTarget('${c.id}', '${author.username}')" class="text-blue-500 hover:underline">返信</button>` : ''}
                                ${isMyComment ? `<button onclick="deleteComment('${c.id}')" class="text-red-500 hover:underline">削除</button>` : ''}
                            </div>
                        </div>
                        ${replyPrefix}
                        <p class="text-xs text-gray-600 leading-relaxed">${escapeHTML(c.content)}</p>
                    `;
                    commentListArea.appendChild(commentEl);
                });

            } catch (err) {
                console.error(err);
                commentListArea.innerHTML = '<div class="text-center text-red-500 py-4">コメントの取得に失敗。</div>';
            }
        }

        function setReplyTarget(commentId, name) {
            replyTargetCommentId = commentId;
            document.getElementById('replyTargetName').innerText = name;
            document.getElementById('replyTargetBadge').classList.remove('hidden');
        }
        function cancelReplyTarget() {
            replyTargetCommentId = null;
            document.getElementById('replyTargetBadge').classList.add('hidden');
        }

        async function submitComment() {
            const textInput = document.getElementById('commentTextInput');
            const content = textInput.value.trim();
            if (!content) return;

            try {
                const { error } = await exClient
                    .from('comments')
                    .insert([{
                        post_id: activePostIdForComment,
                        user_id: currentUser.id,
                        content: content,
                        parent_id: replyTargetCommentId
                    }]);

                if (error) throw error;

                const { data: postData } = await exClient
                    .from('posts')
                    .select('user_id')
                    .eq('id', activePostIdForComment)
                    .single();

                if (postData && postData.user_id !== currentUser.id) {
                    await exClient.from('notifications').insert([{
                        notifier_id: currentUser.id,
                        receiver_id: postData.user_id,
                        post_id: activePostIdForComment,
                        type: 'comment'
                    }]);
                }

                textInput.value = '';
                cancelReplyTarget();
                await fetchAndRenderComments();
                await fetchAndRenderPosts();

            } catch (err) {
                console.error(err);
                alert('コメントの送信に失敗しました。');
            }
        }

        async function deleteComment(commentId) {
            if (!confirm('このコメントを削除しますか？')) return;

            try {
                const { error } = await exClient
                    .from('comments')
                    .delete()
                    .eq('id', commentId);

                if (error) throw error;
                await fetchAndRenderComments();
            } catch (err) {
                console.error(err);
                alert('削除に失敗しました。');
            }
        }

        // --- 11. プロフィール・マイページ関連 ---
        function openProfileModal() {
            if (!currentUser) return;
            document.getElementById('profileModal').classList.remove('hidden');
            document.getElementById('editBio').value = currentUser.bio || '';

        async function saveProfile() {
            const bio = document.getElementById('editBio').value.trim();
            const avatarFile = document.getElementById('avatarFile').files[0];

            try {
                let avatarUrl = currentUser.avatar_url;

                if (avatarFile) {
                    const fileExt = avatarFile.name.split('.').pop();
                    const fileName = `${currentUser.id}-${Date.now()}.${fileExt}`;
                    const filePath = `avatars/${fileName}`;

                    const { error: uploadError } = await exClient.storage
                        .from('media')
                        .upload(filePath, avatarFile);

                    if (uploadError) throw uploadError;

                    const { data } = exClient.storage.from('media').getPublicUrl(filePath);
                    avatarUrl = data.publicUrl;
                }

                const { data, error } = await exClient
                    .from('profiles')
                    .update({ bio: bio, avatar_url: avatarUrl })
                    .eq('id', currentUser.id)
                    .select()
                    .single();

                if (error) throw error;

                currentUser = data;
                localStorage.setItem('sij_user', JSON.stringify(currentUser));
                updateAuthUI();
                closeProfileModal();

                if (currentTab === 'mypage') {
                    renderMyPage();
                } else {
                    await fetchAndRenderPosts();
                }

            } catch (err) {
                console.error(err);
                alert('プロフィールの更新に失敗しました。');
            }
        }

                `;

            }

            postListArea.innerHTML = `
                <div class="p-6 bg-white border border-gray-100 rounded-2xl shadow-sm space-y-6 text-center">
                    <div class="relative inline-block">
                        <img class="w-28 h-28 rounded-full border-2 border-green-500 mx-auto object-cover" src="${currentUser.avatar_url || 'https://via.placeholder.com/150'}">
                        <button onclick="openProfileModal()" class="absolute bottom-0 right-1 bg-green-500 text-white p-2 rounded-full hover:bg-green-600 shadow-md">
                            <i class="fa-solid fa-pen text-xs"></i>
                        </button>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold text-gray-800">${currentUser.username}</h3>
                        <p class="text-gray-400 text-xs mt-1">ID: ${currentUser.id.substring(0, 8)}...</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl text-left">
                        <span class="text-xs font-bold text-gray-400 block mb-1">自己紹介</span>
                        <p class="text-sm text-gray-700 whitespace-pre-wrap">${currentUser.bio || '一言はまだ設定されていません。'}</p>
                    </div>
                    <div class="flex space-x-2 pt-2">
                        <button onclick="openProfileModal()" class="flex-1 border border-gray-200 text-gray-700 py-2 rounded-full font-bold hover:bg-gray-50 text-xs">プロフィール編集</button>
                        <button onclick="handleLogout()" class="flex-1 bg-red-50 text-red-600 py-2 rounded-full font-bold hover:bg-red-100 text-xs">ログアウト</button>
                    </div>
                </div>
            `;
        }

        // --- 12. 通知タブ機能 ---
        async function renderNotificationsList() {
            if (!postListArea) return;

            if (!currentUser) {
                postListArea.innerHTML = '<div class="text-center text-gray-500 text-sm py-8">通知を見るにはログインが必要です。</div>';
                return;
            }

            postListArea.innerHTML = '<div class="text-center text-gray-500 text-sm py-8">通知を読み込み中...</div>';

            try {
                const { data: notifies, error } = await exClient
                    .from('notifications')
                    .select('*, profiles!notifications_notifier_id_fkey(*)')
                    .eq('receiver_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                await exClient
                    .from('notifications')
                    .update({ is_read: true })
                    .eq('receiver_id', currentUser.id);

                updateNavNotifyBadge(0);

                if (!notifies || notifies.length === 0) {
                    postListArea.innerHTML = '<div class="text-center text-gray-400 text-sm py-8">通知はありません。</div>';
                    return;
                }

                postListArea.innerHTML = '';
                notifies.forEach(n => {
                    const notifier = n.profiles || {};
                    let typeText = '';
                    let icon = '';

                    if (n.type === 'like') {
                        typeText = 'あなたの投稿をいいねしました。';
                        icon = '<i class="fa-solid fa-heart text-red-500 text-base"></i>';
                    } else if (n.type === 'comment') {
                        typeText = 'あなたの投稿にコメントしました。';
                        icon = '<i class="fa-solid fa-comment text-green-500 text-base"></i>';
                    } else if (n.type === 'follow') {
                        typeText = 'あなたをフォローしました。';
                        icon = '<i class="fa-solid fa-user-plus text-blue-500 text-base"></i>';
                    }

                    const notifyEl = document.createElement('div');
                    notifyEl.className = `flex items-center justify-between p-4 bg-white border border-gray-100 rounded-xl shadow-sm transition hover:bg-gray-50 ${n.is_read ? '' : 'border-l-4 border-l-green-500'}`;
                    
                    if (n.post_id) {
                        notifyEl.className += ' cursor-pointer';
                        notifyEl.onclick = async () => {
                            switchTab('latest');
                            await fetchAndRenderPosts(n.post_id);
                        };
                    } else {
                        notifyEl.onclick = () => {
                            openUserViewModal(n.notifier_id);
                        };
                    }

                    notifyEl.innerHTML = `
                        <div class="flex items-center space-x-3">
                            <div class="bg-gray-50 p-2 rounded-full flex items-center justify-center w-10 h-10 border border-gray-100 shadow-inner">
                                ${icon}
                            </div>
                            <div class="text-xs">
                                <p class="text-gray-800"><strong class="font-bold text-gray-900">${notifier.username || '誰か'}</strong> さんが${typeText}</p>
                                <span class="text-[9px] text-gray-400">${new Date(n.created_at).toLocaleString('ja-JP')}</span>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                    `;
                    postListArea.appendChild(notifyEl);
                });

            } catch (err) {
                console.error(err);
                postListArea.innerHTML = '<div class="text-center text-red-500 text-sm py-8">通知の読み込みに失敗しました。</div>';
            }
        }

        // --- 13. 投稿編集関連 ---
        function openEditPostModal(postId, encodedContent) {
            document.getElementById('editPostModal').classList.remove('hidden');
            document.getElementById('editPostId').value = postId;
            document.getElementById('editPostText').value = decodeURIComponent(encodedContent);
        }
        function closeEditPostModal() {
            document.getElementById('editPostModal').classList.add('hidden');
            document.getElementById('editPostId').value = '';
            document.getElementById('editPostText').value = '';
        }
        async function submitEditPost() {
            const postId = document.getElementById('editPostId').value;
            const newContent = document.getElementById('editPostText').value.trim();

            if (!newContent) {
                alert('投稿内容を入力してください。');
                return;
            }

            try {
                const { error } = await exClient
                    .from('posts')
                    .update({ content: newContent })
                    .eq('id', postId);

                if (error) throw error;
                
                closeEditPostModal();
                await fetchAndRenderPosts();
            } catch (err) {
                console.error(err);
                alert('投稿の更新に失敗しました。');
            }
        }

        // --- 14. サーバー閉鎖・解除を切り替える関数 ---
        async function toggleServerClose(shouldClose) {
            const confirmMsg = shouldClose 
                ? "サーバーを一時的に閉鎖（メンテナンスモード）にしますか？" 
                : "サーバーの閉鎖を解除して通常運転に戻しますか？";
                
            if (!confirm(confirmMsg)) return;

            const text = shouldClose 
                ? "[閉鎖中] 現在システムアップデート中です。終了までしばらくお待ちください。" 
                : "メンテナンスは無事終了しました！ご協力ありがとうございました。";

            try {
                const { error } = await exClient
                    .from('announcements')
                    .insert([{ content: text }]);

                if (error) throw error;
                
                alert(shouldClose ? 'サーバーを閉鎖しました。' : '閉鎖を解除しました。');
                await fetchAnnouncement();
            } catch (err) {
                alert('状態の切り替えに失敗しました。');
                console.error(err);
            }
        }

        // --- 15. バックグラウンドチェック（未読通知バッジ、ブラウザ通知） ---
        function startNotificationInterval() {
            setInterval(async () => {
                if (!currentUser) return;

                try {
                    const { data, error } = await exClient
                        .from('notifications')
                        .select('id', { count: 'exact' })
                        .eq('receiver_id', currentUser.id)
                        .eq('is_read', false);

                    if (!error && data) {
                        const count = data.length;
                        updateNavNotifyBadge(count);

                        if (count > 0 && ('Notification' in window) && Notification.permission === 'granted') {
                            new Notification('SIJ！コミュニティ', {
                                body: `未読の通知が ${count} 件届いています！`,
                                icon: 'icon.png'
                            });
                        }
                    }
                } catch (err) {
                    console.error(err);
                }
            }, 30000);
        }

        function updateNavNotifyBadge(count) {
            const badge = document.getElementById('navNotifyBadge');
            if (badge) {
                if (count > 0) {
                    badge.innerText = count;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }
        }

        // --- 16. ヘルパー（エスケープ） ---
        function escapeHTML(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // =========================================================================
        // 🚀 全てのオリジナル機能を完璧に損なわずに安全に実行する初期化イベント
        // =========================================================================
        document.addEventListener('DOMContentLoaded', async () => {
            // HTML要素を安全に割り当て
            postListArea = document.getElementById('postListArea');
            commentListArea = document.getElementById('commentListArea');

            // 【元の機能】ブラウザ通知許可と初期テスト通知
            if ('Notification' in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        console.log('通知が許可されました！');
                        new Notification('SIJ！コミュニティ', {
                            body: '新しい投稿がありました！',
                            icon: 'icon.png'
                        });
                    }
                });
            }

            // 初期ロード処理
            await checkUserStatus();
            await fetchAnnouncement();
            await fetchAndRenderPosts();
            
            // 定期チェック開始
            startNotificationInterval();
        });
    </script>
</body>
</html>
