<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIJ！コミュニティ</title>

    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; padding-bottom: 80px; }
        .main-container { max-width: 500px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; }
        @keyframes highlight {
            0% { background-color: #fef08a; }
            100% { background-color: #ffffff; }
        }
        .highlight-post { animation: highlight 2.5s ease-out forwards; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

</head>
<body>

        <header class="sticky top-0 bg-white border-b border-gray-200 p-4 z-10 space-y-3">

                <div class="flex items-center space-x-2">

                    <button id="authBtn" onclick="openAuthModal()" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-gray-300">
                        ログイン/作成
                    </button>
                    <button id="logoutBtn" onclick="handleLogout()" class="hidden bg-red-100 text-red-600 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-red-200">

                </div>
            </div>

            <div class="flex items-center space-x-2">

        <div id="profileBar" class="hidden bg-gray-50 p-3 border-b border-gray-100 text-xs text-gray-600 flex justify-between items-center">

        <nav class="fixed bottom-0 left-0 right-0 max-w-[500px] mx-auto bg-white border-t border-gray-200 flex justify-around py-3 z-10 shadow-lg">

    <div id="commentModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4"><div class="bg-white rounded-lg w-full max-w-md p-6 flex flex-col max-h-[85vh]"><div class="flex justify-between items-center mb-4 border-b pb-2"><h3 class="text-lg font-bold text-gray-800"><i class="fa-regular fa-comments text-green-600 mr-1"></i> コメント</h3><button onclick="closeCommentModal(true)" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button></div><div id="commentListArea" class="flex-1 overflow-y-auto space-y-4 pr-1 mb-4 text-sm"></div><div id="replyTargetBadge" class="hidden text-xs bg-blue-50 text-blue-700 p-2 rounded mb-2 flex justify-between items-center"><span><strong id="replyTargetName"></strong> さんに返信中...</span><button onclick="cancelReplyTarget()" class="text-gray-400 hover:text-gray-600">&times; 取消</button></div><div id="commentFormArea"></div></div></div>

    <div id="userViewModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4"><div class="bg-white rounded-lg w-full max-w-sm p-6 text-center"><div class="flex justify-end"><button onclick="closeUserViewModal(true)" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button></div><img id="viewAvatar" class="w-24 h-24 rounded-full border mx-auto mb-4 object-cover" src=""><h3 id="viewName" class="text-xl font-bold text-gray-800 mb-2"></h3><p id="viewBio" class="text-sm text-gray-600 bg-gray-50 p-3 rounded-lg min-h-[50px] flex items-center justify-center whitespace-pre-wrap mb-4"></p><div id="followBtnArea"></div></div></div>
    <div id="authModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4"><div class="bg-white rounded-lg w-full max-w-md p-6"><div class="flex justify-between items-center mb-4"><h3 id="authTitle" class="text-lg font-bold">簡易アカウント作成</h3><button onclick="closeAuthModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button></div><div class="space-y-3"><input id="authUsername" type="text" class="w-full border p-2 rounded text-sm" placeholder="ユーザー名"><input id="authPassword" type="password" class="w-full border p-2 rounded text-sm" placeholder="パスワード（6文字以上）"><input id="authPasswordConfirm" type="password" class="w-full border p-2 rounded text-sm" placeholder="パスワード確認（もう一度入力）"><div class="flex flex-col gap-2 pt-2"><button id="authSubmitBtn" onclick="handleAuthSubmit()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600 text-sm">アカウントを作成する</button><button id="authToggleBtn" onclick="toggleAuthMode()" class="text-xs text-gray-500 underline hover:text-gray-700">すでにアカウントをお持ちの方（ログイン）</button></div></div></div></div>
    <div id="profileModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4"><div class="bg-white rounded-lg w-full max-w-md p-6"><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold">プロフィール編集</h3><button onclick="closeProfileModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button></div><div class="space-y-4"><div><label class="block text-xs font-bold text-gray-700 mb-1">アイコン画像</label><input id="avatarFile" type="file" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100"></div><div><label class="block text-xs font-bold text-gray-700 mb-1">一言（自己紹介）</label><input id="editBio" type="text" class="w-full border p-2 rounded text-sm" placeholder="今の一言を入力してください"></div><button onclick="saveProfile()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600 text-sm">保存する</button></div></div></div>
    <div id="postModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4"><div class="bg-white rounded-lg w-full max-w-md p-6"><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold">新規投稿</h3><button onclick="closePostModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button></div><textarea id="postText" class="w-full border border-gray-300 rounded p-2 h-24 resize-none mb-4" placeholder="今なにしてる？ 画像や短い動画(15MBまで)も載せられるよ！"></textarea><label class="block text-xs font-bold text-gray-700 mb-1">画像または動画を追加（任意）</label><input id="postMediaFile" type="file" accept="image/*,video/*" class="w-full text-xs text-gray-500 mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100"><button id="realPostSubmitBtn" onclick="submitPost()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600">投稿する</button></div></div>
    <div id="announceModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4"><div class="bg-white rounded-lg w-full max-w-md p-6"><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold text-red-600">公式お知らせを投稿</h3><button onclick="closeAnnounceModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button></div><textarea id="announceInputText" class="w-full border border-gray-300 rounded p-2 h-32 resize-none mb-4" placeholder="ユーザー全員に見せる重要なお知らせを入力..."></textarea><button onclick="submitAnnouncement()" class="w-full bg-red-500 text-white py-2 rounded font-bold hover:bg-red-600">お知らせを更新する</button></div></div>
<div class="p-3 border-t border-gray-100 flex items-center space-x-6">
                        <button onclick="toggleLike(${post.id}, ${isLiked})" class="flex items-center space-x-1 ${isLiked ? 'text-red-500' : 'text-gray-400'} hover:scale-105 transition"><i class="${isLiked ? 'fa-solid' : 'fa-regular'} fa-heart text-lg"></i><span class="text-xs font-bold">${likeCount || 0}</span></button>
                        <button onclick="openCommentModal(${post.id})" class="flex items-center space-x-1 text-gray-400 hover:text-green-500 transition"><i class="fa-regular fa-comment text-lg"></i><span class="text-xs font-bold">${commentCount || 0}</span></button>
                        <button onclick="copyPostLink(${post.id})" class="flex items-center space-x-1 text-gray-400 hover:text-blue-500 transition" title="リンクをコピー"><i class="fa-regular fa-share-from-square text-lg"></i><span class="text-xs font-bold">シェア</span></button>
                    </div>
    
    <script>
        const EX_URL = "https://kdydbrscxrekivqmplyn.supabase.co";
        const EX_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkeWRicnNjeHJla2l2cW1wbHluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMDk0NjEsImV4cCI6MjA5OTY4NTQ2MX0._sqoMMFn5Zf1m4VarmbkjXpn0H3Tma5qmymI57JkOLA";
        
        const exClient = supabase.createClient(EX_URL, EX_KEY);

        let currentUser = null;
        let myProfileName = "";
        let isSignUpMode = true;
        let currentSearchWord = "";
        let currentTab = "latest"; 
        
        let activePostIdForComment = null;
        let activeParentCommentId = null;

        window.onload = async () => {
            await checkUser();
            await fetchAnnouncement(); 
            await handleUrlRouting();
            if (currentUser) {
                await checkUnreadNotifications();
                setInterval(checkUnreadNotifications, 3000);
            }
        };

        window.onpopstate = async () => { await handleUrlRouting(); };

        async function handleUrlRouting() {
            const hash = window.location.hash;
            document.getElementById('commentModal').classList.add('hidden');
            document.getElementById('userViewModal').classList.add('hidden');
            activePostIdForComment = null;

            if (hash.startsWith('#/post/')) {
                const postId = hash.replace('#/post/', '');
                if (postId) await openCommentModal(Number(postId), false);
            } else if (hash.startsWith('#/user/')) {
                const userId = hash.replace('#/user/', '');
                if (userId) await viewUserProfile(userId, false);
            } else if (hash === '#/mypage') {
                await switchTab('mypage', false);
            } else {
                if (currentTab === 'mypage') currentTab = 'latest';
                await switchTab(currentTab, false);
            }
        }

        function getYouTubeEmbedHtml(text) {
            if (!text) return "";
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const matches = text.match(/(https?:\/\/[^\s]+)/g);
            if (!matches) return "";
            let embedHtml = "";
            matches.forEach(url => {
                const match = url.match(regExp);
                if (match && match[2].length === 11) {
                    const videoId = match[2];
                    embedHtml += `<div class="video-container bg-black"><iframe src="https://www.youtube.com/embed/${videoId}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>`;
                }
            });
            return embedHtml;
        }

        function renderMediaAttachment(url) {
            if (!url) return "";
            const isVideo = url.toLowerCase().match(/\.(mp4|mov|webm|ogv|3gp|m4v)/) || url.includes('video');
            if (isVideo) {
                return `<div class="w-full bg-black flex justify-center"><video src="${url}" controls playsinline class="max-h-96 w-full object-contain"></video></div>`;
            } else {
                return `<div class="w-full bg-black flex justify-center"><img src="${url}" class="max-h-96 w-full object-cover"></div>`;
            }
        }

        async function compressImage(file, maxWidth = 800, quality = 0.6) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height;
                        if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => { resolve(blob); }, 'image/jpeg', quality);
                    };
                };
            });
        }

        async function checkUser() {
            const { data: { user } } = await exClient.auth.getUser();
            if (user) {
                currentUser = user;
                const { data: profile } = await exClient.from('profiles').select('*').eq('id', user.id).single();
                if (profile) {
                    myProfileName = profile.username;
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('profileBar').classList.remove('hidden');
                    document.getElementById('postBtn').classList.remove('hidden');
                    document.getElementById('logoutBtn').classList.remove('hidden');
                    document.getElementById('authBtn').classList.add('hidden');
                    document.getElementById('myAvatar').src = profile.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + profile.username;
                    document.getElementById('myName').innerText = profile.username;
                    document.getElementById('myBio').innerText = profile.bio || "未設定";
                    document.getElementById('editBio').value = profile.bio || "";
                    if (profile.username === 'SIJ375') document.getElementById('adminAnnounceBtn').classList.remove('hidden');
                }
            }
        }

        async function checkUnreadNotifications() {
            if (!currentUser) return;
            const { count } = await exClient.from('notifications').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id).eq('is_read', false);
            const badge = document.getElementById('navNotifyBadge');
            if (count > 0) { badge.innerText = count; badge.classList.remove('hidden'); } else { badge.classList.add('hidden'); }
        }

        async function fetchAnnouncement() {
            const { data, error } = await exClient.from('announcements').select('content').order('created_at', { ascending: false }).limit(1);
            const announceArea = document.getElementById('announceArea');
            const announceText = document.getElementById('announceText');
            
            if (!error && data && data.length > 0 && data[0].content) {
                announceText.innerText = data[0].content;
                announceArea.classList.remove('hidden');
            } else {
                announceArea.classList.add('hidden');
            }
        }

        async function submitAnnouncement() {
            const text = document.getElementById('announceInputText').value.trim(); 
            if (!text) return;
            const { error } = await exClient.from('announcements').insert([{ content: text }]);
            if (!error) { 
                alert('お知らせを更新しました！'); 
                document.getElementById('announceInputText').value = ''; 
                closeAnnounceModal(); 
                await fetchAnnouncement(); 
            }
        }

        async function switchTab(tabName, updateHash = true) {
            if ((tabName === 'follow' || tabName === 'notification' || tabName === 'mypage') && !currentUser) { 
                alert('ログインが必要です'); switchTab('latest', true); return; 
            }
            currentTab = tabName;
            const tabs = { latest: document.getElementById('tabLatest'), recommend: document.getElementById('tabRecommend'), follow: document.getElementById('tabFollow'), notification: document.getElementById('tabNotification'), mypage: document.getElementById('tabMyPage') };
            Object.keys(tabs).forEach(k => { tabs[k].className = (k === tabName) ? "flex flex-col items-center text-green-600 font-bold text-xs w-1/5 relative" : "flex flex-col items-center text-gray-400 font-bold text-xs w-1/5 relative"; });
            if (updateHash) {
                if (tabName === 'mypage') window.history.pushState(null, null, '#/mypage');
                else if (window.location.hash === '#/mypage' || window.location.hash.startsWith('#/post/') || window.location.hash.startsWith('#/user/')) window.history.pushState(null, null, ' ');
            }
            if (tabName === 'notification') { await renderNotificationsList(); } else if (tabName === 'mypage') { await renderMyPage(); } else { await fetchAndRenderPosts(); }
        }

        async function execSearch() {
            const word = document.getElementById('searchInput').value.trim().replace(/^#/, '');
            if (word) { currentSearchWord = word; document.getElementById('searchWord').innerText = '#' + word; document.getElementById('searchBadge').classList.remove('hidden'); }
            else { clearSearch(); return; }
            await fetchAndRenderPosts();
        }

        async function clearSearch() { currentSearchWord = ""; document.getElementById('searchInput').value = ""; document.getElementById('searchBadge').classList.add('hidden'); await fetchAndRenderPosts(); }
        function clearSearchAndRoute() { window.history.pushState(null, null, ' '); clearSearch(); }

        function parseRichText(text) {
            if (!text) return "";
            let formatted = text.replace(/[#＃]([A-Za-z0-9_ぁ-んァ-ヶー一-龠々]+)/g, (match, tag) => {
                return `<span class="text-blue-500 font-semibold cursor-pointer hover:underline" onclick="clickHashtag('${tag}')">${match}</span>`;
            });
            formatted = formatted.replace(/@([A-Za-z0-9_ぁ-んァ-ヶー一-龠々]+)/g, (match, username) => {
                return `<span class="text-blue-600 font-bold cursor-pointer hover:underline" onclick="clickMention('${username}')">${match}</span>`;
            });
            formatted = formatted.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="text-green-600 hover:underline break-all">$1</a>');
            return formatted;
        }

        function clickHashtag(tag) { document.getElementById('searchInput').value = tag; execSearch(); }
        async function clickMention(username) {
            const { data } = await exClient.from('public_profiles').select('id').eq('username', username).maybeSingle();
            if (data) viewUserProfile(data.id); else alert('ユーザーが見つかりませんでした');
        }

        async function searchUsers() {
            const query = document.getElementById('userQueryInput').value.trim(); const resultsArea = document.getElementById('userSearchResults'); if (!query) { resultsArea.innerHTML = ''; return; }
            const { data: users } = await exClient.from('public_profiles').select('*').ilike('username', `%${query}%`).limit(10);
            if (!users || users.length === 0) { resultsArea.innerHTML = '<p class="text-center text-xs text-gray-400">見つかりませんでした</p>'; return; }
            resultsArea.innerHTML = '';
            users.forEach(u => {
                const avatar = u.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + u.username;
                const div = document.createElement('div'); div.className = "flex items-center justify-between p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition";
                div.onclick = () => { closeUserSearchModal(); viewUserProfile(u.id); };
                div.innerHTML = `<div class="flex items-center"><img src="${avatar}" class="w-8 h-8 rounded-full border mr-2 object-cover"><span class="font-bold text-sm text-gray-800">${u.username}</span></div><i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>`;
                resultsArea.appendChild(div);
            });
        }

        async function renderMyPage() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '<div class="text-center text-gray-500 py-10">マイページを読み込み中...</div>';
            const { data: profile } = await exClient.from('profiles').select('*').eq('id', currentUser.id).single();
            if (!profile) { timeline.innerHTML = '<div class="text-center text-red-500 py-10">プロフィールの取得に失敗しました</div>'; return; }
            const avatar = profile.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + profile.username;
            
            let htmlContent = `
                <div class="bg-gradient-to-br from-green-50 to-white border border-gray-200 rounded-2xl p-6 text-center shadow-sm space-y-4 mb-6">
                    <img src="${avatar}" class="w-24 h-24 rounded-full border-4 border-white mx-auto shadow-md object-cover cursor-pointer hover:opacity-90" onclick="openProfileModal()">
                    <div><h2 class="text-xl font-bold text-gray-800">${profile.username}</h2><p class="text-xs text-gray-400 mt-1">ID: ${profile.id.substring(0,8)}...</p></div>
                    <div class="bg-white px-4 py-3 rounded-xl border border-gray-100 text-sm text-gray-600 min-h-[50px] flex items-center justify-center whitespace-pre-wrap">${profile.bio || "自己紹介はまだありません。上の「編集」から設定できます！"}</div>
                    <button onclick="openProfileModal()" class="bg-white border border-gray-300 text-gray-700 px-4 py-1.5 rounded-full text-xs font-bold hover:bg-gray-50 transition shadow-sm"><i class="fa-solid fa-user-pen mr-1"></i> プロフィールを編集する</button>
                </div>
                <h3 class="text-sm font-bold text-gray-700 border-b pb-2 mb-4"><i class="fa-solid fa-list-ul text-green-600 mr-1"></i> あなたの過去の投稿</h3>
            `;

            const { data: posts, error } = await exClient.from('posts').select(`id, content, media_url, user_id, created_at, profiles ( username, avatar_url )`).eq('user_id', currentUser.id).order('created_at', { ascending: false });
            if (error) { htmlContent += `<div class="text-center text-red-500 py-10">投稿の取得に失敗しました</div>`; timeline.innerHTML = htmlContent; return; }
            if (!posts || posts.length === 0) { htmlContent += `<div class="text-center text-gray-400 py-10">まだ投稿がありません。</div>`; timeline.innerHTML = htmlContent; return; }
            timeline.innerHTML = htmlContent;

            for (const post of posts) {
                const { count: likeCount } = await exClient.from('likes').select('*', { count: 'exact', head: true }).eq('post_id', post.id);
                const { count: commentCount } = await exClient.from('comments').select('*', { count: 'exact', head: true }).eq('post_id', post.id);
                let isLiked = false; const { data: myLike } = await exClient.from('likes').select('id').eq('post_id', post.id).eq('user_id', currentUser.id).maybeSingle(); if (myLike) isLiked = true;

                const videoEmbedHtml = getYouTubeEmbedHtml(post.content);

                const postCard = document.createElement('div');
                postCard.id = `post-card-${post.id}`;
                postCard.className = "bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm mb-4 transition-all duration-500";
                postCard.innerHTML = `
                    <div class="flex justify-between items-center p-3">
                        <div class="flex items-center"><img src="${avatar}" class="w-10 h-10 rounded-full border mr-3 object-cover"><span class="font-bold text-gray-800">${profile.username}</span></div>
                        <button onclick="deletePost(${post.id})" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                    <div class="px-3 pb-3 text-gray-800 text-sm whitespace-pre-wrap">${parseRichText(post.content)}</div>
                    ${videoEmbedHtml}
                    ${renderMediaAttachment(post.media_url)}
                    <div class="p-3 border-t border-gray-100 flex items-center space-x-6">
                        <button onclick="toggleLike(${post.id}, ${isLiked})" class="flex items-center space-x-1 ${isLiked ? 'text-red-500' : 'text-gray-400'} hover:scale-105 transition"><i class="${isLiked ? 'fa-solid' : 'fa-regular'} fa-heart text-lg"></i><span class="text-xs font-bold">${likeCount || 0}</span></button>
                        <button onclick="openCommentModal(${post.id})" class="flex items-center space-x-1 text-gray-400 hover:text-green-500 transition"><i class="fa-regular fa-comment text-lg"></i><span class="text-xs font-bold">${commentCount || 0}</span></button>
                    </div>
                `;
                timeline.appendChild(postCard);
            }
        }

        async function fetchAndRenderPosts() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '<div class="text-center text-gray-500 py-10">タイムラインを読み込み中...</div>';

            let query = exClient.from('posts').select(`id, content, media_url, user_id, created_at, profiles ( username, avatar_url )`);
            if (currentSearchWord) query = query.ilike('content', `%#${currentSearchWord}%`);
            if (currentTab === 'follow' && currentUser) {
                const { data: follows } = await exClient.from('follows').select('following_id').eq('follower_id', currentUser.id);
                const followingIds = follows.map(f => f.following_id);
                if (followingIds.length === 0) { timeline.innerHTML = `<div class="text-center text-gray-400 py-10">フォロー中のユーザーがいません。</div>`; return; }
                query = query.in('user_id', followingIds);
            }
            const { data: posts, error } = await query.order('created_at', { ascending: false });
            if (error || !posts) { timeline.innerHTML = `<div class="text-center text-red-500 py-10">読み込み失敗</div>`; return; }
            if (posts.length === 0) { timeline.innerHTML = `<div class="text-center text-gray-400 py-10">投稿がありません。</div>`; return; }

            let extendedPosts = [];
            for (const post of posts) {
                const { count: likeCount } = await exClient.from('likes').select('*', { count: 'exact', head: true }).eq('post_id', post.id);
                const { count: commentCount } = await exClient.from('comments').select('*', { count: 'exact', head: true }).eq('post_id', post.id);
                let isLiked = false; if (currentUser) { const { data: myLike }
                    = await exClient.from('likes').select('id').eq('post_id', post.id).eq('user_id', currentUser.id).maybeSingle(); if (myLike) isLiked = true; }
                extendedPosts.push({ ...post, likeCount: likeCount || 0, commentCount: commentCount || 0, isLiked });
            }
            if (currentTab === 'recommend') { extendedPosts.sort((a, b) => (b.likeCount !== a.likeCount) ? b.likeCount - a.likeCount : new Date(b.created_at) - new Date(a.created_at)); }

            timeline.innerHTML = '';
            extendedPosts.forEach(post => {
                const authorName = post.profiles?.username || "名無しユーザー";
                const authorAvatar = post.profiles?.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + authorName;
                const videoEmbedHtml = getYouTubeEmbedHtml(post.content);
                
                const postCard = document.createElement('div');
                postCard.id = `post-card-${post.id}`;
                postCard.className = "bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm mb-4 transition-all duration-500";
                
                let deleteBtn = "";
                if (currentUser && currentUser.id === post.user_id) {
                    deleteBtn = `<button onclick="deletePost(${post.id})" class="text-gray-400 hover:text-red-500 transition"><i class="fa-solid fa-trash-can"></i></button>`;
                }

                postCard.innerHTML = `
                    <div class="flex justify-between items-center p-3">
                        <div class="flex items-center cursor-pointer" onclick="viewUserProfile('${post.user_id}')">
                            <img src="${authorAvatar}" class="w-10 h-10 rounded-full border mr-3 object-cover">
                            <span class="font-bold text-gray-800 hover:underline">${authorName}</span>
                        </div>
                        ${deleteBtn}
                    </div>
                    <div class="px-3 pb-3 text-gray-800 text-sm whitespace-pre-wrap">${parseRichText(post.content)}</div>
                    ${videoEmbedHtml}
                    ${renderMediaAttachment(post.media_url)}
                    <div class="p-3 border-t border-gray-100 flex items-center space-x-6">
                        <button onclick="toggleLike(${post.id}, ${post.isLiked})" class="flex items-center space-x-1 ${post.isLiked ? 'text-red-500' : 'text-gray-400'} hover:scale-105 transition">
                            <i class="${post.isLiked ? 'fa-solid' : 'fa-regular'} fa-heart text-lg"></i>
                            <span class="text-xs font-bold">${post.likeCount}</span>
                        </button>
                        <button onclick="openCommentModal(${post.id})" class="flex items-center space-x-1 text-gray-400 hover:text-green-500 transition">
                            <i class="fa-regular fa-comment text-lg"></i>
                            <span class="text-xs font-bold">${post.commentCount}</span>
                        </button>
                        <button onclick="copyPostLink(${post.id})" class="text-gray-400 hover:text-blue-500 transition"><i class="fa-regular fa-share-from-square text-lg"></i></button>
                    </div>
                `;
                timeline.appendChild(postCard);
            });
        }

        // --- 共通モーダル開閉関数 ---
        function openAnnounceModal() { document.getElementById('announceModal').classList.remove('hidden'); }
        function closeAnnounceModal() { document.getElementById('announceModal').classList.add('hidden'); }
        function openPostModal() { document.getElementById('postModal').classList.remove('hidden'); }
        function closePostModal() { document.getElementById('postModal').classList.add('hidden'); }
        function openAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }
        function openProfileModal() { document.getElementById('profileModal').classList.remove('hidden'); }
        function closeProfileModal() { document.getElementById('profileModal').classList.add('hidden'); }
        function openUserSearchModal() { document.getElementById('userSearchModal').classList.remove('hidden'); }
        function closeUserSearchModal() { document.getElementById('userSearchModal').classList.add('hidden'); }
        
        function copyPostLink(postId) {
            const baseUrl = window.location.origin + window.location.pathname;
            const shareUrl = `${baseUrl}#/post/${postId}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert('投稿の個別リンクをコピーしました！');
            }).catch(err => {
                console.error('コピー失敗: ', err);
                alert('リンクのコピーに失敗しました。');
            });
        }
    </script>                                   
</body>
</html>
