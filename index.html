<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIJ！コミュニティ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .main-container { max-width: 500px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; }
    </style>
</head>
<body>

    <div class="main-container shadow-lg flex flex-col min-h-screen">
        
        <header class="sticky top-0 bg-white border-b border-gray-200 p-4 z-10 space-y-3">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold text-green-600 cursor-pointer" onclick="clearSearch()">SIJ!コミュニティ</h1>
                <div class="flex items-center space-x-2">
                    <div id="userInfo" class="hidden flex items-center space-x-2">
                        <img id="myAvatar" onclick="openProfileModal()" class="w-8 h-8 rounded-full border cursor-pointer hover:opacity-80 transition" src="" alt="my avatar">
                        <span id="myName" onclick="openProfileModal()" class="text-sm font-bold text-gray-700 cursor-pointer hover:underline"></span>
                    </div>
                    <button id="adminAnnounceBtn" onclick="openAnnounceModal()" class="hidden bg-red-500 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-red-600 animate-pulse">
                        <i class="fa-solid fa-bullhorn"></i> 告知
                    </button>
                    <button id="postBtn" onclick="openPostModal()" class="hidden bg-green-500 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-green-600">
                        <i class="fa-solid fa-pen"></i> 投稿
                    </button>
                    <button id="authBtn" onclick="openAuthModal()" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-gray-300">
                        ログイン/作成
                    </button>
                    <button id="logoutBtn" onclick="handleLogout()" class="hidden bg-red-100 text-red-600 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-red-200">
                        ログアウト
                    </button>
                </div>
            </div>

            <div class="flex items-center space-x-2 bg-gray-100 rounded-full px-3 py-1.5 border border-gray-200">
                <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
                <span class="text-gray-400 font-bold text-sm">#</span>
                <input id="searchInput" type="text" class="bg-transparent border-none outline-none text-sm w-full" placeholder="タグ名で検索（空欄で全表示）" onkeydown="if(event.key==='Enter') execSearch()">
                <button onclick="execSearch()" class="text-xs bg-green-600 text-white px-3 py-1 rounded-full font-bold hover:bg-green-700">検索</button>
            </div>
            <div id="searchBadge" class="hidden text-xs bg-green-50 text-green-700 px-3 py-1 rounded-md flex justify-between items-center">
                <span>検索中: <strong id="searchWord"></strong></span>
                <button onclick="clearSearch()" class="text-gray-400 hover:text-gray-600">&times; 解除</button>
            </div>
        </header>

        <div id="profileBar" class="hidden bg-gray-50 p-3 border-b border-gray-100 text-xs text-gray-600 flex justify-between items-center">
            <div>
                <span class="font-bold">自己紹介:</span> <span id="myBio">未設定</span>
            </div>
            <button onclick="openProfileModal()" class="text-green-600 hover:underline">編集</button>
        </div>

        <div id="announceArea" class="hidden bg-green-50 border-b border-green-200 p-4 space-y-2 text-sm text-green-800">
            <div class="flex items-center space-x-2 font-bold text-green-700">
                <i class="fa-solid fa-bullhorn animate-bounce"></i>
                <span>公式からのお知らせ</span>
            </div>
            <p id="announceText" class="whitespace-pre-wrap leading-relaxed font-semibold">現在お知らせはありません。</p>
        </div>

        <main id="timeline" class="flex-1 p-4 space-y-6 pb-24">
            <div class="text-center text-gray-500 py-10">読み込み中...</div>
        </main>

    </div>

    <div id="authModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 id="authTitle" class="text-lg font-bold">簡易アカウント作成</h3>
                <button onclick="closeAuthModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <div class="space-y-3">
                <input id="authUsername" type="text" class="w-full border p-2 rounded text-sm" placeholder="ユーザー名">
                <input id="authPassword" type="password" class="w-full border p-2 rounded text-sm" placeholder="パスワード（6文字以上）">
                <input id="authPasswordConfirm" type="password" class="w-full border p-2 rounded text-sm" placeholder="パスワード確認（もう一度入力）">
                <div class="flex flex-col gap-2 pt-2">
                    <button id="authSubmitBtn" onclick="handleAuthSubmit()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600 text-sm">アカウントを作成する</button>
                    <button id="authToggleBtn" onclick="toggleAuthMode()" class="text-xs text-gray-500 underline hover:text-gray-700">すでにアカウントをお持ちの方（ログイン）</button>
                </div>
            </div>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">プロフィール編集</h3>
                <button onclick="closeProfileModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">アイコン画像</label>
                    <input id="avatarFile" type="file" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">一言（自己紹介）</label>
                    <input id="editBio" type="text" class="w-full border p-2 rounded text-sm" placeholder="今の一言を入力してください">
                </div>
                <button onclick="saveProfile()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600 text-sm">保存する</button>
            </div>
        </div>
    </div>

    <div id="userViewModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-sm p-6 text-center">
            <div class="flex justify-end">
                <button onclick="closeUserViewModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <img id="viewAvatar" class="w-24 h-24 rounded-full border mx-auto mb-4 object-cover" src="" alt="avatar">
            <h3 id="viewName" class="text-xl font-bold text-gray-800 mb-2"></h3>
            <p id="viewBio" class="text-sm text-gray-600 bg-gray-50 p-3 rounded-lg min-h-[50px] flex items-center justify-center whitespace-pre-wrap"></p>
        </div>
    </div>

    <div id="postModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">新規投稿</h3>
                <button onclick="closePostModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <textarea id="postText" class="w-full border border-gray-300 rounded p-2 h-24 resize-none mb-4" placeholder="今なにしてる？ #ハッシュタグ も使えるよ！"></textarea>
            <label class="block text-xs font-bold text-gray-700 mb-1">画像を追加</label>
            <input id="postMediaFile" type="file" accept="image/*" class="w-full text-xs text-gray-500 mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
            <button onclick="submitPost()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600">投稿する</button>
        </div>
    </div>

    <div id="announceModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-red-600">公式お知らせを投稿</h3>
                <button onclick="closeAnnounceModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <textarea id="announceInputText" class="w-full border border-gray-300 rounded p-2 h-32 resize-none mb-4" placeholder="ユーザー全員に見せる重要なお知らせを入力..."></textarea>
            <button onclick="submitAnnouncement()" class="w-full bg-red-500 text-white py-2 rounded font-bold hover:bg-red-600">お知らせを更新する</button>
        </div>
    </div>

    <script>
        const EX_URL = "https://kdydbrscxrekivqmplyn.supabase.co";
        const EX_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkeWRicnNjeHJla2l2cW1wbHluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMDk0NjEsImV4cCI6MjA5OTY4NTQ2MX0._sqoMMFn5Zf1m4VarmbkjXpn0H3Tma5qmymI57JkOLA";
        
        const exClient = supabase.createClient(EX_URL, EX_KEY);

        let currentUser = null;
        let isSignUpMode = true;
        let currentSearchWord = ""; // 現在検索中のワードを保持する変数

        window.onload = async () => {
            await checkUser();
            await fetchAnnouncement();
            await fetchAndRenderPosts();
        };

        async function compressImage(file, maxWidth = 800, quality = 0.6) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            resolve(blob);
                        }, 'image/jpeg', quality);
                    };
                };
            });
        }

        async function checkUser() {
            const { data: { user } } = await exClient.auth.getUser();
            if (user) {
                currentUser = user;
                const { data: profile } = await exClient.from('profiles').select('*').eq('id', user.id).single();
                if (profile) {
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('profileBar').classList.remove('hidden');
                    document.getElementById('postBtn').classList.remove('hidden');
                    document.getElementById('logoutBtn').classList.remove('hidden');
                    document.getElementById('authBtn').classList.add('hidden');
                    
                    document.getElementById('myAvatar').src = profile.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + profile.username;
                    document.getElementById('myName').innerText = profile.username;
                    document.getElementById('myBio').innerText = profile.bio || "未設定";
                    document.getElementById('editBio').value = profile.bio || "";

                    if (profile.username === 'SIJ375') {
                        document.getElementById('adminAnnounceBtn').classList.remove('hidden');
                    }
                }
            } else {
                document.getElementById('userInfo').classList.add('hidden');
                document.getElementById('profileBar').classList.add('hidden');
                document.getElementById('postBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
                document.getElementById('authBtn').classList.remove('hidden');
                document.getElementById('adminAnnounceBtn').classList.add('hidden');
            }
        }

        async function fetchAnnouncement() {
            const { data, error } = await exClient.from('announcements').select('content').order('created_at', { ascending: false }).limit(1);
            if (!error && data && data.length > 0) {
                document.getElementById('announceText').innerText = data[0].content;
                document.getElementById('announceArea').classList.remove('hidden');
            } else {
                document.getElementById('announceArea').classList.add('hidden');
            }
        }

        async function submitAnnouncement() {
            const text = document.getElementById('announceInputText').value.trim();
            if (!text) return;
            const { error } = await exClient.from('announcements').insert([{ content: text }]);
            if (error) {
                alert('お知らせの更新に失敗しました: ' + error.message);
            } else {
                alert('公式お知らせを更新しました！');
                closeAnnounceModal();
                await fetchAnnouncement();
            }
        }

        // 🔍 検索を実行する関数
        async function execSearch() {
            const word = document.getElementById('searchInput').value.trim().replace(/^#/, ''); // 先頭の#は自動カット
            if (word) {
                currentSearchWord = word;
                document.getElementById('searchWord').innerText = '#' + word;
                document.getElementById('searchBadge').classList.remove('hidden');
            } else {
                clearSearch();
                return;
            }
            await fetchAndRenderPosts();
        }

        // ❌ 検索をクリアして全表示に戻す関数
        async function clearSearch() {
            currentSearchWord = "";
            document.getElementById('searchInput').value = "";
            document.getElementById('searchBadge').classList.add('hidden');
            await fetchAndRenderPosts();
        }

        // 🔗 ハッシュタグを青文字リンクに変換するヘルパー関数
        function parseHashtags(text) {
            if (!text) return "";
            // 全角・半角の「#文字」にマッチさせる正規表現
            return text.replace(/[#＃]([A-Za-z0-9_ぁ-んァ-ヶー一-龠々]+)/g, (match, tag) => {
                return `<span class="text-blue-500 font-semibold cursor-pointer hover:underline" onclick="clickHashtag('${tag}')">${match}</span>`;
            });
        }

        // 🏷️ 投稿内のハッシュタグをクリックしたときの動き
        function clickHashtag(tag) {
            document.getElementById('searchInput').value = tag;
            execSearch();
        }

        async function fetchAndRenderPosts() {
            const timeline = document.getElementById('timeline');
            
            // Supabaseからクエリをビルド
            let query = exClient
                .from('posts')
                .select(`id, content, media_url, user_id, created_at, profiles ( username, avatar_url )`);

            // ⭐ もしハッシュタグ検索中なら、そのキーワードが含まれるものだけに絞り込む
            if (currentSearchWord) {
                query = query.ilike('content', `%#${currentSearchWord}%`);
            }

            const { data: posts, error } = await query.order('created_at', { ascending: false });

            if (error || !posts) {
                timeline.innerHTML = `<div class="text-center text-red-500 py-10">データの読み込みに失敗しました</div>`;
                return;
            }
            if (posts.length === 0) {
                timeline.innerHTML = `<div class="text-center text-gray-400 py-10">該当する投稿がありません。</div>`;
                return;
            }

            timeline.innerHTML = '';
            posts.forEach(post => {
                const authorName = post.profiles?.username || "名無しユーザー";
                const authorAvatar = post.profiles?.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + authorName;
                const isMyPost = currentUser && currentUser.id === post.user_id;
                
                // 💡 本文の中のハッシュタグをリンク化する
                const formattedContent = parseHashtags(post.content);

                const postCard = document.createElement('div');
                postCard.className = "bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm relative";
                postCard.innerHTML = `
                    <div class="flex justify-between items-center p-3">
                        <div class="flex items-center cursor-pointer hover:opacity-80 transition" onclick="viewUserProfile('${post.user_id}')">
                            <img src="${authorAvatar}" class="w-10 h-10 rounded-full border mr-3 object-cover" alt="avatar">
                            <span class="font-bold text-gray-800 hover:underline">${authorName}</span>
                        </div>
                        ${isMyPost ? `
                            <button onclick="deletePost(${post.id})" class="text-gray-400 hover:text-red-500 text-lg px-2 py-1 transition" title="投稿を削除">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        ` : ''}
                    </div>
                    <div class="px-3 pb-3 text-gray-800 text-sm whitespace-pre-wrap">${formattedContent}</div>
                    ${post.media_url ? `
                        <div class="w-full bg-black flex justify-center">
                            <img src="${post.media_url}" class="max-h-96 w-full object-cover" alt="post media">
                        </div>
                    ` : ''}
                `;
                timeline.appendChild(postCard);
            });
        }

        async function deletePost(postId) {
            if (!confirm('この投稿を削除してもよろしいですか？')) return;
            const { error } = await exClient.from('posts').delete().eq('id', postId);
            if (error) {
                alert('削除に失敗しました: ' + error.message);
            } else {
                await fetchAndRenderPosts();
            }
        }

        async function viewUserProfile(userId) {
            const { data: profile, error } = await exClient
                .from('public_profiles')
                .select('*')
                .eq('id', userId)
                .single();

            if (error || !profile) {
                alert('プロフィールの取得に失敗しました。');
                return;
            }

            document.getElementById('viewAvatar').src = profile.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + profile.username;
            document.getElementById('viewName').innerText = profile.username;
            document.getElementById('viewBio').innerText = profile.bio || "自己紹介はまだありません。";
            document.getElementById('userViewModal').classList.remove('hidden');
        }

        async function handleAuthSubmit() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            if (!username || !password) {
                alert('すべての項目を入力してください！');
                return;
            }
            const dummyEmail = `${username}@gmail.com`;

            if (isSignUpMode) {
                const passwordConfirm = document.getElementById('authPasswordConfirm').value.trim();
                if (password !== passwordConfirm) {
                    alert('パスワード確認が一致しません！');
                    return;
                }
                const { data: authData, error: authError } = await exClient.auth.signUp({ email: dummyEmail, password });
                if (authError) {
                    alert('登録エラー: ' + authError.message);
                    return;
                }
                if (authData.user) {
                    const { error: profileError } = await exClient.from('profiles').insert([{ id: authData.user.id, username: username, bio: "", avatar_url: null }]);
                    if (profileError) {
                        alert('プロフィール登録エラー: ' + profileError.message);
                    } else {
                        alert('アカウントを作成しました！自動でログインします。');
                        location.reload();
                    }
                }
            } else {
                const { error } = await exClient.auth.signInWithPassword({ email: dummyEmail, password });
                if (error) {
                    alert('ログインエラー: パスワードまたはユーザー名が間違っています。');
                } else {
                    location.reload();
                }
            }
        }

        async function saveProfile() {
            if (!currentUser) return;
            const bioText = document.getElementById('editBio').value.trim();
            const avatarFileInput = document.getElementById('avatarFile');
            const avatarFile = avatarFileInput.files[0];
            let avatarUrl = document.getElementById('myAvatar').src;

            if (avatarFile) {
                const compressedBlob = await compressImage(avatarFile);
                const fileName = `${currentUser.id}_${Date.now()}.jpg`;
                const { error: uploadError } = await exClient.storage.from('avatars').upload(fileName, compressedBlob, { contentType: 'image/jpeg', upsert: true });
                if (uploadError) {
                    alert('画像の保存に失敗しました: ' + uploadError.message);
                    return;
                }
                const { data: { publicUrl } } = exClient.storage.from('avatars').getPublicUrl(fileName);
                avatarUrl = publicUrl;
            }

            const { error: updateError } = await exClient.from('profiles').update({ bio: bioText, avatar_url: avatarUrl }).eq('id', currentUser.id);
            if (updateError) {
                alert('保存に失敗しました: ' + updateError.message);
            } else {
                alert('プロフィールを更新しました！');
                closeProfileModal();
                location.reload();
            }
        }

        async function submitPost() {
            if (!currentUser) return;
            const text = document.getElementById('postText').value.trim();
            const mediaFileInput = document.getElementById('postMediaFile');
            const mediaFile = mediaFileInput.files[0];
            let mediaUrl = null;

            if (!text && !mediaFile) return;

            if (mediaFile) {
                const compressedBlob = await compressImage(mediaFile);
                const fileName = `${currentUser.id}_${Date.now()}.jpg`;
                const { error: uploadError } = await exClient.storage.from('posts').upload(fileName, compressedBlob, { contentType: 'image/jpeg' });
                if (uploadError) {
                    alert('画像の保存に失敗しました: ' + uploadError.message);
                    return;
                }
                const { data: { publicUrl } } = exClient.storage.from('posts').getPublicUrl(fileName);
                mediaUrl = publicUrl;
            }

            const { error } = await exClient.from('posts').insert([{ user_id: currentUser.id, content: text, media_url: mediaUrl }]);
            if (error) {
                alert('投稿に失敗しました: ' + error.message);
            } else {
                closePostModal();
                document.getElementById('postText').value = '';
                mediaFileInput.value = '';
                await fetchAndRenderPosts();
            }
        }

        async function handleLogout() {
            await exClient.auth.signOut();
            currentUser = null;
            alert('ログアウトしました');
            location.reload();
        }

        function openAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }
        function openPostModal() { document.getElementById('postModal').classList.remove('hidden'); }
        function closePostModal() { document.getElementById('postModal').classList.add('hidden'); }
        function openProfileModal() { document.getElementById('profileModal').classList.remove('hidden'); }
        function closeProfileModal() { document.getElementById('profileModal').classList.add('hidden'); }
        function openAnnounceModal() { document.getElementById('announceModal').classList.remove('hidden'); }
        function closeAnnounceModal() { document.getElementById('announceModal').classList.add('hidden'); }
        function closeUserViewModal() { document.getElementById('userViewModal').classList.add('hidden'); }

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            const title = document.getElementById('authTitle');
            const submitBtn = document.getElementById('authSubmitBtn');
            const toggleBtn = document.getElementById('authToggleBtn');
            const confirmInput = document.getElementById('authPasswordConfirm');

            if (isSignUpMode) {
                title.innerText = '簡易アカウント作成';
                submitBtn.innerText = 'アカウントを作成する';
                toggleBtn.innerText = 'すでにアカウントをお持ちの方（ログイン）';
                confirmInput.classList.remove('hidden');
            } else {
                title.innerText = 'ログイン';
                submitBtn.innerText = 'ログインする';
                toggleBtn.innerText = '新規アカウント作成はこちら';
                confirmInput.classList.add('hidden');
            }
        }
    </script>
