// YouTubeの埋め込みHTML生成
function getYouTubeEmbedHtml(text) {
    if (!text) return "";
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const matches = text.match(/(https?:\/\/[^\s]+)/g);
    if (!matches) return "";
    let embedHtml = "";
    matches.forEach(url => {
        const match = url.match(regExp);
        if (match && match[2].length === 11) {
            const videoId = match[2];
            embedHtml += `<div class="video-container bg-black"><iframe src="https://www.youtube.com/embed/${videoId}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>`;
        }
    });
    return embedHtml;
}

// 添付メディア（画像/動画）のレンダリング
function renderMediaAttachment(url) {
    if (!url) return "";
    const isVideo = url.toLowerCase().match(/\.(mp4|mov|webm|ogv|3gp|m4v)/) || url.includes('video');
    if (isVideo) {
        return `<div class="w-full bg-black flex justify-center"><video src="${url}" controls playsinline class="max-h-96 w-full object-contain"></video></div>`;
    } else {
        return `<div class="w-full bg-black flex justify-center"><img src="${url}" class="max-h-96 w-full object-cover"></div>`;
    }
}

// 画像の圧縮処理
async function compressImage(file, maxWidth = 800, quality = 0.6) {
    return new Promise((resolve) => {
        const reader = new FileReader(); 
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image(); 
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width; 
                let height = img.height;
                if (width > maxWidth) { 
                    height = Math.round((height * maxWidth) / width); 
                    width = maxWidth; 
                }
                canvas.width = width; 
                canvas.height = height;
                const ctx = canvas.getContext('2d'); 
                ctx.drawImage(img, 0, 0, width, height);
                canvas.toBlob((blob) => { resolve(blob); }, 'image/jpeg', quality);
            };
        };
    });
}

// リッチテキスト（ハッシュタグ、メンション、URLリンク）のパース
function parseRichText(text) {
    if (!text) return "";
    let formatted = text.replace(/[#＃]([A-Za-z0-9_ぁ-んァ-ヶー一-龠々]+)/g, (match, tag) => {
        return `<span class="text-blue-500 font-semibold cursor-pointer hover:underline" onclick="clickHashtag('${tag}')">${match}</span>`;
    });
    formatted = formatted.replace(/@([A-Za-z0-9_ぁ-んァ-ヶー一-龠々]+)/g, (match, username) => {
        return `<span class="text-blue-600 font-bold cursor-pointer hover:underline" onclick="clickMention('${username}')">${match}</span>`;
    });
    formatted = formatted.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="text-green-600 hover:underline break-all">$1</a>');
    return formatted;
}

function clickHashtag(tag) {

        div.innerHTML = `<div class="flex items-center"><img src="${avatar}" class="w-8 h-8 rounded-full border mr-2 object-cover"><span class="font-bold text-sm text-gray-800">${u.username}</span></div><i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>`;
        resultsArea.appendChild(div);
    });
}

// タイムライン投稿取得・描画
async function fetchAndRenderPosts() {
    const timeline = document.getElementById('timeline');
    let query = exClient.from('posts').select(`id, content, media_url, user_id, created_at, profiles ( username, avatar_url )`);
    if (currentSearchWord) query = query.ilike('content', `%#${currentSearchWord}%`);
    if (currentTab === 'follow' && currentUser) {
        const { data: follows } = await exClient.from('follows').select('following_id').eq('follower_id', currentUser.id);
        const followingIds = follows.map(f => f.following_id);
        if (followingIds.length === 0) { 
            timeline.innerHTML = `<div class="text-center text-gray-400 py-10">フォロー中のユーザーがいません。</div>`; 
            return; 
        }
        query = query.in('user_id', followingIds);
    }
    const { data: posts, error } = await query.order('created_at', { ascending: false });
    if (error || !posts) { timeline.innerHTML = `<div class="text-center text-red-500 py-10">読み込み失敗</div>`; return; }
    if (posts.length === 0) { timeline.innerHTML = `<div class="text-center text-gray-400 py-10">投稿がありません。</div>`; return; }

    let extendedPosts = [];
    for (const post of posts) {
        const { count: likeCount } = await exClient.from('likes').select('*', { count: 'exact', head: true }).eq('post_id', post.id);
        const { count: commentCount } = await exClient.from('comments').select('*', { count: 'exact', head: true }).eq('post_id', post.id);
        let isLiked = false; 
        if (currentUser) { 
            const { data: myLike } = await exClient.from('likes').select('id').eq('post_id', post.id).eq('user_id', currentUser.id).maybeSingle(); 
            if (myLike) isLiked = true; 
        }
        extendedPosts.push({ ...post, likeCount: likeCount || 0, commentCount: commentCount || 0, isLiked });
    }
    if (currentTab === 'recommend') { 
        extendedPosts.sort((a, b) => (b.likeCount !== a.likeCount) ? b.likeCount - a.likeCount : new Date(b.created_at) - new Date(a.created_at)); 
    }

    timeline.innerHTML = '';
    extendedPosts.forEach(post => {
        const authorName = post.profiles?.username || "名無しユーザー";
        const authorAvatar = post.profiles?.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + authorName;
        const videoEmbedHtml = getYouTubeEmbedHtml(post.content);

        const postCard = document.createElement('div');
        postCard.id = `post-card-${post.id}`;
        postCard.className = "bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm mb-4 transition-all duration-500";
        postCard.innerHTML = `
            <div class="flex justify-between items-center p-3">
                <div class="flex items-center cursor-pointer hover:opacity-80 transition" onclick="viewUserProfile('${post.user_id}')">
                    <img src="${authorAvatar}" class="w-10 h-10 rounded-full border mr-3 object-cover">
                    <span class="font-bold text-gray-800 text-sm">${authorName}</span>
                </div>
            </div>
            <div class="px-3 pb-3 text-gray-800 text-sm whitespace-pre-wrap">${parseRichText(post.content)}</div>
            ${videoEmbedHtml}
            ${renderMediaAttachment(post.media_url)}
            <div class="p-3 border-t border-gray-100 flex items-center space-x-6">
                <button onclick="toggleLike(${post.id}, ${post.isLiked})" class="flex items-center space-x-1 ${post.isLiked ? 'text-red-500' : 'text-gray-400'} hover:scale-105 transition"><i class="${post.isLiked ? 'fa-solid' : 'fa-regular'} fa-heart text-lg"></i><span class="text-xs font-bold">${post.likeCount}</span></button>
                <button onclick="openCommentModal(${post.id})" class="flex items-center space-x-1 text-gray-400 hover:text-green-500 transition"><i class="fa-regular fa-comment text-lg"></i><span class="text-xs font-bold">${post.commentCount}</span></button>
                <button onclick="copyPostLink(${post.id})" class="flex items-center space-x-1 text-gray-400 hover:text-blue-500 transition" title="リンクをコピー"><i class="fa-regular fa-share-from-square text-lg"></i><span class="text-xs font-bold">シェア</span></button>
            </div>
        `;
        timeline.appendChild(postCard);
    });
}

// いいねトグル機能
async function toggleLike(postId, liked) {
    if (!currentUser) return;
    if (liked) {
        await exClient.from('likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
    } else {
        await exClient.from('likes').insert([{ post_id: postId, user_id: currentUser.id }]);
        // 通知登録（自分の投稿に対するいいね以外）
        const { data: post } = await exClient.from('posts').select('user_id').eq('id', postId).single();
        if (post && post.user_id !== currentUser.id) {
            await exClient.from('notifications').insert([{ user_id: post.user_id, sender_id: currentUser.id, type: 'like', post_id: postId }]);
        }
    }
    if (currentTab === 'mypage') await renderMyPage(); else await fetchAndRenderPosts();
}

// 他ユーザーのプロフィール表示
async function viewUserProfile(userId, updateHash = true) {
    if (updateHash) window.history.pushState(null, null, `#/user/${userId}`);
    const { data: profile, error } = await exClient.from('public_profiles').select('*').eq('id', userId).single();
    if (error || !profile) return;

    document.getElementById('viewAvatar').src = profile.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + profile.username;
    document.getElementById('viewName').innerText = profile.username;
    document.getElementById('viewBio').innerText = profile.bio || "自己紹介はまだありません。";

    const followBtnArea = document.getElementById('followBtnArea');
    followBtnArea.innerHTML = '';

    if (currentUser && currentUser.id !== userId) {
        const { data: follow } = await exClient.from('follows').select('id').eq('follower_id', currentUser.id).eq('following_id', userId).maybeSingle();
        const isFollowing = !!follow;
        const btn = document.createElement('button');
        btn.className = `w-full py-2 rounded-xl font-bold text-sm transition ${isFollowing ? 'bg-gray-200 text-gray-700 hover:bg-gray-300' : 'bg-green-500 text-white hover:bg-green-600'}`;
        btn.innerText = isFollowing ? 'フォロー解除する' : 'フォローする';
        btn.onclick = () => toggleFollow(userId, isFollowing);
        followBtnArea.appendChild(btn);
    }
    document.getElementById('userViewModal').classList.remove('hidden');
}

// フォロー状態切り替え
async function toggleFollow(targetUserId, isFollowing) {
    if (isFollowing) {
        await exClient.from('follows').delete().eq('follower_id', currentUser.id).eq('following_id', targetUserId);
    } else {
        await exClient.from('follows').insert([{ follower_id: currentUser.id, following_id: targetUserId }]);
        await exClient.from('notifications').insert([{ user_id: targetUserId, sender_id: currentUser.id, type: 'follow' }]);
    }
    closeUserViewModal(false);
    await viewUserProfile(targetUserId, false);
}

// コメントモーダル展開
async function openCommentModal(postId, updateHash = true) {
    activePostIdForComment = postId;
    if (updateHash) window.history.pushState(null, null, `#/post/${postId}`);

    const { data: comments } = await exClient.from('comments').select(`id, content, user_id, parent_id, created_at, profiles ( username, avatar_url )`).eq('post_id', postId).order('created_at', { ascending: true });
    const listArea = document.getElementById('commentListArea');
    listArea.innerHTML = '';

    if (!comments || comments.length === 0) {
        listArea.innerHTML = '<p class="text-center text-gray-400 py-6 text-xs">コメントはまだありません。</p>';
    } else {
        comments.forEach(c => {
            const author = c.profiles?.username || "名無しユーザー";
            const avatar = c.profiles?.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + author;
            const div = document.createElement('div');
            div.className = `flex items-start space-x-2 p-2 rounded-lg hover:bg-gray-50 transition ${c.parent_id ? 'ml-8 bg-blue-50/30 border-l-2 border-blue-200' : ''}`;
            div.innerHTML = `
                <img src="${avatar}" class="w-6 h-6 rounded-full border mt-0.5 object-cover">
                <div class="flex-1">
                    <div class="flex items-center justify-between"><span class="font-bold text-gray-700 text-xs">${author}</span>
                    <button onclick="setReplyTarget(${c.id}, '${author}')" class="text-[10px] text-blue-500 hover:underline font-bold"><i class="fa-solid fa-reply"></i> 返信</button></div>
                    <p class="text-gray-600 mt-0.5 leading-relaxed break-all">${c.content}</p>
                </div>
            `;
            listArea.appendChild(div);
        });
    }

    document.getElementById('commentFormArea').innerHTML = `
        <div class="flex items-center space-x-2 border border-gray-200 rounded-full px-3 py-1.5 bg-gray-50">
            <input id="commentInput" type="text" class="bg-transparent border-none outline-none text-xs w-full" placeholder="コメントを入力...">
            <button onclick="submitComment()" class="text-xs bg-green-600 text-white px-3 py-1 rounded-full font-bold hover:bg-green-700">送信</button>
        </div>
    `;
    document.getElementById('commentModal').classList.remove('hidden');
    
    // 開いた投稿を目立たせるハイライト処理
    const card = document.getElementById(`post-card-${postId}`);
    if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.classList.add('highlight-post');
        setTimeout(() => card.classList.remove('highlight-post'), 2500);
    }
}

function setReplyTarget(commentId, authorName) {
    activeParentCommentId = commentId;
    document.getElementById('replyTargetName').innerText = authorName;
    document.getElementById('replyTargetBadge').classList.remove('hidden');
}

function cancelReplyTarget() {
    activeParentCommentId = null;
    document.getElementById('replyTargetBadge').classList.add('hidden');
}

// コメント送信処理
async function submitComment() {
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    if (!text || !currentUser) return;

    const { error } = await exClient.from('comments').insert([{ post_id: activePostIdForComment, user_id: currentUser.id, content: text, parent_id: activeParentCommentId }]);
    if (!error) {
        const { data: post } = await exClient.from('posts').select('user_id').eq('id', activePostIdForComment).single();
        if (post && post.user_id !== currentUser.id) {
            await exClient.from('notifications').insert([{ user_id: post.user_id, sender_id: currentUser.id, type: 'comment', post_id: activePostIdForComment }]);
        }
        input.value = '';
        cancelReplyTarget();
        await openCommentModal(activePostIdForComment, false);
        if (currentTab === 'mypage') await renderMyPage(); else await fetchAndRenderPosts();
    }
}

// 投稿送信処理
async function submitPost() {
    const text = document.getElementById('postText').value.trim();
    if (!text || !currentUser) return;
    
    const submitBtn = document.getElementById('realPostSubmitBtn');
    submitBtn.disabled = true;
    submitBtn.innerText = "投稿中...";

    let mediaUrl = null;
    const fileFile = document.getElementById('postMediaFile').files[0];
    if (fileFile) {
        let uploadBlob = fileFile;
        if (fileFile.type.startsWith('image/')) {
            uploadBlob = await compressImage(fileFile);
        }
        const fileExt = fileFile.name.split('.').pop();
        const fileName = `${Math.random()}_${Date.now()}.${fileExt}`;
        const filePath = `${currentUser.id}/${fileName}`;
        const { error: uploadError } = await exClient.storage.from('media').upload(filePath, uploadBlob);
        if (!uploadError) {
            const { data } = exClient.storage.from('media').getPublicUrl(filePath);
            if (data) mediaUrl = data.publicUrl;
        }
    }

    const { error } = await exClient.from('posts').insert([{ user_id: currentUser.id, content: text, media_url: mediaUrl }]);
    submitBtn.disabled = false;
    submitBtn.innerText = "投稿する";

    if (!error) {
        document.getElementById('postText').value = '';
        document.getElementById('postMediaFile').value = '';
        closePostModal();
        await fetchAndRenderPosts();
    } else {
        alert('投稿に失敗しました。');
    }
}

// 投稿削除
async function deletePost(postId) {
    if (confirm('この投稿を本当に削除しますか？')) {
        const { error } = await exClient.from('posts').delete().eq('id', postId);
        if (!error) {
            if (currentTab === 'mypage') await renderMyPage(); else await fetchAndRenderPosts();
        }
    }
}

// 通知一覧の描画
async function renderNotificationsList() {
    const timeline = document.getElementById('timeline');
    timeline.innerHTML = '<div class="text-center text-gray-500 py-10">通知を読み込み中...</div>';

    const { data: list, error } = await exClient.from('notifications').select(`id, type, post_id, is_read, created_at, sender:public_profiles!notifications_sender_id_fkey ( username, avatar_url )`).eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(30);
    if (error || !list) { 
        timeline.innerHTML = '<div class="text-center text-red-500 py-10">通知の取得に失敗しました</div>'; 
        return; 
    }
    if (list.length === 0) { 
        timeline.innerHTML = '<div class="text-center text-gray-400 py-10">通知はありません。</div>'; 
        return; 
    }

    timeline.innerHTML = '<h3 class="text-sm font-bold text-gray-700 border-b pb-2 mb-4"><i class="fa-solid fa-bell text-green-600 mr-1"></i> あなたへの通知</h3>';
    const unreadIds = [];

    list.forEach(n => {
        if (!n.is_read) unreadIds.push(n.id);
        const name = n.sender?.username || "名無しユーザー";
        const av = n.sender?.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + name;
        
        let msg = "";
        let icon = "";
        if (n.type === 'like') { msg = "あなたの投稿に「いいね！」しました。"; icon = "fa-heart text-red-500"; }
        else if (n.type === 'comment') { msg = "あなたの投稿にコメントしました。"; icon = "fa-comment text-green-500"; }
        else if (n.type === 'follow') { msg = "あなたをフォローしました。"; icon = "fa-user-plus text-blue-500"; }

        const div = document.createElement('div');
        div.className = `flex items-center justify-between p-3 rounded-xl border transition cursor-pointer ${n.is_read ? 'bg-white border-gray-100 text-gray-500' : 'bg-green-50/50 border-green-200 text-gray-800 font-semibold'}`;
        div.onclick = () => {
            if (n.post_id) openCommentModal(n.post_id);
            else switchTab('latest');
        };
        div.innerHTML = `<div class="flex items-center space-x-3"><img src="${av}" class="w-8 h-8 rounded-full border object-cover"><div class="text-xs"><span><strong>${name}</strong> さんが ${msg}</span></div></div><i class="fa-solid ${icon} text-sm"></i>`;
        timeline.appendChild(div);
    });

    if (unreadIds.length > 0) {
        await exClient.from('notifications').update({ is_read: true }).in('id', unreadIds);
        await checkUnreadNotifications();
    }
}

// 認証送信（ログイン/サインアップ）
async function handleAuthSubmit() {
    const u = document.getElementById('authUsername').value.trim();
    const p = document.getElementById('authPassword').value;
    const pc = document.getElementById('authPasswordConfirm').value;
    
    if (!u || p.length < 6) { alert('ユーザー名は必須、パスワードは6文字以上必要です。'); return; }
    if (isSignUpMode && p !== pc) { alert('パスワード確認が一致しません。'); return; }

    const email = `${u}@sij-community.local`;
    let result;

    if (isSignUpMode) {
        result = await exClient.auth.signUp({ email, password: p });
    } else {
        result = await exClient.auth.signInWithPassword({ email, password: p });
    }

    if (result.error) {
        alert('エラーが発生しました: ' + result.error.message);
    } else {
        if (isSignUpMode && result.data?.user) {
            await exClient.from('profiles').insert([{ id: result.data.user.id, username: u, bio: '' }]);
        }
        location.reload();
    }
}

function toggleAuthMode() {
    isSignUpMode = !isSignUpMode;
    document.getElementById('authTitle').innerText = isSignUpMode ? "簡易アカウント作成" : "ログイン";
    document.getElementById('authSubmitBtn').innerText = isSignUpMode ? "アカウントを作成する" : "ログインする";
    document.getElementById('authPasswordConfirm').classList.toggle('hidden', !isSignUpMode);
    document.getElementById('authToggleBtn').innerText = isSignUpMode ? "すでにアカウントをお持ちの方（ログイン）" : "新しくアカウントを作る（サインアップ）";
}

async function handleLogout() {
    await exClient.auth.signOut();
    location.reload();
}

async function saveProfile() {
    const bio = document.getElementById('editBio').value.trim();
    if (!currentUser) return;
    const { error } = await exClient.from('profiles').update({ bio }).eq('id', currentUser.id);
    if (!error) location.reload();
}
