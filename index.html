<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIJ!Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* スマホ向けのスクロール感を出すための調整 */
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .main-container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="main-container shadow-lg flex flex-col min-h-screen">
        
        <header class="sticky top-0 bg-white border-b border-gray-200 p-4 flex justify-between items-center z-10">
            <h1 class="text-xl font-bold text-green-600">VOOM Clone</h1>
            <button onclick="openPostModal()" class="bg-green-500 text-white px-4 py-2 rounded-full text-sm font-bold hover:bg-green-600 transition">
                <i class="fa-solid fa-pen mr-1"></i> 投稿する
            </button>
        </header>

        <main id="timeline" class="flex-1 p-4 space-y-6 pb-24">
            </main>

    </div>

    <div id="postModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">新規投稿</h3>
                <button onclick="closePostModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <textarea id="postText" class="w-full border border-gray-300 rounded p-2 h-24 resize-none mb-4" placeholder="今なにしてる？"></textarea>
            <input id="postMedia" type="text" class="w-full border border-gray-300 rounded p-2 mb-4 text-sm" placeholder="画像URL (空欄でもOK。例: https://picsum.photos/600/400)">
            <button onclick="submitPost()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600">投稿する</button>
        </div>
    </div>

    <script>
        // 初期ダミーデータ (LINE VOOM風)
        let posts = [
            {
                id: 1,
                author: "ケンタ",
                avatar: "https://api.dicebear.com/7.x/adventurer/svg?seed=Kenta",
                content: "今日のご飯！めちゃくちゃ美味しかった！！",
                media: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600&auto=format&fit=crop&q=60",
                likes: 12,
                hasLiked: false,
                comments: [
                    { author: "ミク", text: "おいしそう〜！どこ outlets？" }
                ]
            },
            {
                id: 2,
                author: "サクラ",
                avatar: "https://api.dicebear.com/7.x/adventurer/svg?seed=Sakura",
                content: "散歩中に綺麗な空が見えたのでシェアします ☁️",
                media: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&auto=format&fit=crop&q=60",
                likes: 45,
                hasLiked: false,
                comments: []
            }
        ];

        const timeline = document.getElementById('timeline');

        // タイムラインを描画する関数
        function renderTimeline() {
            timeline.innerHTML = '';
            
            posts.forEach(post => {
                const postCard = document.createElement('div');
                postCard.className = "bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm";
                
                // コメント一覧の生成
                const commentsHTML = post.comments.map(c => `
                    <div class="text-sm text-gray-700 bg-gray-50 p-2 rounded mb-1">
                        <span class="font-bold">${c.author}:</span> ${c.text}
                    </div>
                `).join('');

                postCard.innerHTML = `
                    <div class="flex items-center p-3">
                        <img src="${post.avatar}" class="w-10 h-10 rounded-full border mr-3" alt="avatar">
                        <span class="font-bold text-gray-800">${post.author}</span>
                    </div>

                    <div class="px-3 pb-3 text-gray-800 text-sm">
                        ${post.content}
                    </div>

                    ${post.media ? `
                        <div class="w-full bg-black flex justify-center">
                            <img src="${post.media}" class="max-h-96 w-full object-cover" alt="post media">
                        </div>
                    ` : ''}

                    <div class="flex items-center justify-around border-t border-b border-gray-100 py-2 my-2 text-gray-600">
                        <button onclick="toggleLike(${post.id})" class="flex items-center space-x-1 ${post.hasLiked ? 'text-red-500 font-bold' : 'hover:text-red-500'} transition">
                            <i class="${post.hasLiked ? 'fa-solid' : 'fa-regular'} fa-heart"></i>
                            <span>${post.likes}</span>
                        </button>
                        <div class="flex items-center space-x-1">
                            <i class="fa-regular fa-comment"></i>
                            <span>${post.comments.length}</span>
                        </div>
                    </div>

                    <div class="p-3">
                        <div class="space-y-1 mb-3 max-h-32 overflow-y-auto">
                            ${commentsHTML}
                        </div>
                        <div class="flex gap-2">
                            <input id="comment-input-${post.id}" type="text" placeholder="コメントを追加..." class="flex-1 border border-gray-200 rounded-full px-4 py-1 text-sm focus:outline-none focus:border-green-400">
                            <button onclick="addComment(${post.id})" class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-xs font-bold hover:bg-green-200">送信</button>
                        </div>
                    </div>
                `;
                timeline.appendChild(postCard);
            });
        }

        // いいね機能
        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                if (post.hasLiked) {
                    post.likes--;
                    post.hasLiked = false;
                } else {
                    post.likes++;
                    post.hasLiked = true;
                }
                renderTimeline();
            }
        }

        // コメント投稿機能
        function addComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value.trim();
            if (text === '') return;

            const post = posts.find(p => p.id === postId);
            if (post) {
                post.comments.push({
                    author: "あなた",
                    text: text
                });
                input.value = '';
                renderTimeline();
            }
        }

        // モーダルの開閉
        function openPostModal() {
            document.getElementById('postModal').classList.remove('hidden');
        }
        function closePostModal() {
            document.getElementById('postModal').classList.add('hidden');
            document.getElementById('postText').value = '';
            document.getElementById('postMedia').value = '';
        }

        // 新規投稿処理
        function submitPost() {
            const text = document.getElementById('postText').value.trim();
            const media = document.getElementById('postMedia').value.trim();

            if (text === '' && media === '') {
                alert('文字か画像のどちらかを入力してください！');
                return;
            }

            const newPost = {
                id: posts.length + 1,
                author: "あなた",
                avatar: "https://api.dicebear.com/7.x/adventurer/svg?seed=You",
                content: text,
                media: media || null,
                likes: 0,
                hasLiked: false,
                comments: []
            };

            posts.unshift(newPost); // タイムラインの先頭に追加
            closePostModal();
            renderTimeline();
        }

        // 起動時に初期描画
        renderTimeline();
        // Supabaseとの接続設定（プロジェクト設定画面から取得できるURLとキーを入力します）
const SUPABASE_URL = "あなたのSupabaseのURL";
const SUPABASE_ANON_KEY = "あなたのSupabaseのAnon Key";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
// 例：投稿をデータベースに保存するJSコード
async function submitPost() {
    const text = document.getElementById('postText').value;
    
    // データベースに挿入
    const { data, error } = await supabase

    if (!error) {
        // 成功したらタイムラインを再読み込みして表示
        fetchAndRenderPosts();
    }
}
    </script>
</body>
</html>
