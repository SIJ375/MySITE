<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIJ！コミュニティ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; padding-bottom: 80px; }
        .main-container { max-width: 500px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; }
        @keyframes highlight {
            0% { background-color: #fef08a; }
            100% { background-color: #ffffff; }
        }
        .highlight-post { animation: highlight 2.5s ease-out forwards; }
        /* 動画のレスポンシブアスペクト比維持用 */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="main-container relative min-h-screen flex flex-col">
        <header class="sticky top-0 bg-white border-b border-gray-200 p-4 z-10 space-y-3">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold text-green-600 cursor-pointer" onclick="clearSearchAndRoute()">SIJ!コミュニティ</h1>
                <div class="flex items-center space-x-2">
                    <div id="userInfo" class="hidden flex items-center space-x-2">
                        <img id="myAvatar" onclick="openProfileModal()" class="w-8 h-8 rounded-full border cursor-pointer hover:opacity-80 transition" src="" alt="my avatar">
                        <span id="myName" onclick="openProfileModal()" class="text-sm font-bold text-gray-700 cursor-pointer hover:underline"></span>
                    </div>
                    <button id="adminAnnounceBtn" onclick="openAnnounceModal()" class="hidden bg-red-500 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-red-600 animate-pulse">
                        <i class="fa-solid fa-bullhorn"></i> 告知
                    </button>
                    <button id="adminCloseBtn" onclick="toggleServerClose(true)" class="hidden bg-gray-800 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-black">
                        <i class="fa-solid fa-lock"></i> サーバー閉鎖
                    </button>
                    <button id="adminOpenBtn" onclick="toggleServerClose(false)" class="hidden bg-blue-500 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-blue-600">
                        <i class="fa-solid fa-lock-open"></i> 閉鎖解除
                    </button>
                    <button id="postBtn" onclick="openPostModal()" class="hidden bg-green-500 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-green-600">
                        <i class="fa-solid fa-pen"></i> 投稿
                    </button>
                    <button id="authBtn" onclick="openAuthModal()" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-gray-300">
                        ログイン/作成
                    </button>
                    <button id="logoutBtn" onclick="handleLogout()" class="hidden bg-red-100 text-red-600 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-red-200">
                        ログアウト
                    </button>
                </div>
            </div>

            <div class="flex items-center space-x-2">
                <div class="flex-1 flex items-center space-x-2 bg-gray-100 rounded-full px-3 py-1.5 border border-gray-200">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
                    <span class="text-gray-400 font-bold text-sm">#</span>
                    <input id="searchInput" type="text" class="bg-transparent border-none outline-none text-sm w-full" placeholder="タグ名で検索" onkeydown="if(event.key==='Enter') execSearch()">
                    <button onclick="execSearch()" class="text-xs bg-green-600 text-white px-3 py-1 rounded-full font-bold hover:bg-green-700">検索</button>
                </div>
                <button onclick="openUserSearchModal()" class="bg-gray-100 border border-gray-200 text-gray-600 p-2 rounded-full hover:bg-gray-200 transition" title="ユーザー検索">
                    <i class="fa-solid fa-user-gear"></i>
                </button>
            </div>

            <div id="searchBadge" class="hidden text-xs bg-green-50 text-green-700 px-3 py-1 rounded-md flex justify-between items-center">
                <span>検索中: <strong id="searchWord"></strong></span>
                <button onclick="clearSearch()" class="text-gray-400 hover:text-gray-600">&times; 解除</button>
            </div>
        </header>

        <div id="newPostAlert" class="hidden text-center my-3 transition-all duration-300">
            <button onclick="loadNewPosts()" class="bg-green-500 hover:bg-green-600 text-white text-xs font-bold px-4 py-2 rounded-full shadow-md animate-bounce">
                <i class="fa-solid fa-arrow-up mr-1"></i> 新しい投稿
            </button>
        </div>

        <div id="profileBar" class="hidden bg-gray-50 p-3 border-b border-gray-100 text-xs text-gray-600 flex justify-between items-center">
            <div>
                <span class="font-bold">自己紹介:</span> <span id="myBio">未設定</span>
            </div>
            <button onclick="openProfileModal()" class="text-green-600 hover:underline">編集</button>
        </div>

        <div id="announceArea" class="hidden bg-green-50 border-b border-green-200 p-4 space-y-2 text-sm text-green-800">
            <div class="flex items-center space-x-2 font-bold text-green-700">
                <i class="fa-solid fa-bullhorn animate-bounce"></i>
                <span>公式からのお知らせ</span>
            </div>
            <p id="announceText" class="whitespace-pre-wrap leading-relaxed font-semibold">現在お知らせはありません。</p>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 max-w-[500px] mx-auto bg-white border-t border-gray-200 flex justify-around py-3 z-10 shadow-lg">
            <button id="tabLatest" onclick="switchTab('latest')" class="flex flex-col items-center text-green-600 font-bold text-xs w-1/5">
                <i class="fa-solid fa-globe text-lg mb-0.5"></i>
                <span>最新</span>
            </button>
            <button id="tabRecommend" onclick="switchTab('recommend')" class="flex flex-col items-center text-gray-400 font-bold text-xs w-1/5">
                <i class="fa-solid fa-star text-lg mb-0.5"></i>
                <span>おすすめ</span>
            </button>
            <button id="tabFollow" onclick="switchTab('follow')" class="flex flex-col items-center text-gray-400 font-bold text-xs w-1/5">
                <i class="fa-solid fa-user-group text-lg mb-0.5"></i>
                <span>フォロー</span>
            </button>
            <button id="tabNotice" onclick="switchTab('notice')" class="flex flex-col items-center text-gray-400 font-bold text-xs w-1/5 relative">
                <i class="fa-solid fa-bell text-lg mb-0.5"></i>
                <span>通知</span>
                <span id="noticeBadge" class="absolute top-1 right-4 bg-red-500 text-white rounded-full text-[10px] px-1 hidden"></span>
            </button>
            <button id="tabMyPage" onclick="switchTab('mypage')" class="flex flex-col items-center text-gray-400 font-bold text-xs w-1/5">
                <i class="fa-solid fa-user text-lg mb-0.5"></i>
                <span>マイページ</span>
            </button>
        </nav>

        <main class="flex-1 p-4 pb-24">
            <div id="postsTimeline" class="space-y-4"></div>

            <div id="notificationsTimeline" class="hidden space-y-4">
                <h2 class="text-lg font-bold text-gray-800 mb-4">あなたへの通知</h2>
                <div id="notificationsList" class="space-y-3"></div>
            </div>

            <div id="myPageArea" class="hidden space-y-6">
                <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm flex flex-col items-center text-center relative">
                    <img id="myPageAvatar" class="w-24 h-24 rounded-full border-4 border-green-100 object-cover mb-4" src="https://placehold.co/150x150?text=Avatar">
                    <h2 id="myPageName" class="text-xl font-bold text-gray-800">ユーザー名</h2>
                    <p id="myPageBio" class="text-sm text-gray-500 mt-2 max-w-sm">自己紹介が設定されていません。</p>
                    <div class="flex space-x-6 mt-4">
                        <div class="text-center">
                            <span id="myFollowingCount" class="block text-lg font-bold text-gray-800">0</span>
                            <span class="text-xs text-gray-400">フォロー中</span>
                        </div>
                        <div class="text-center">
                            <span id="myFollowersCount" class="block text-lg font-bold text-gray-800">0</span>
                            <span class="text-xs text-gray-400">フォロワー</span>
                        </div>
                    </div>
                    <button onclick="openProfileModal()" class="mt-5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-bold px-4 py-2 rounded-full transition">
                        プロフィールを編集
                    </button>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">自分の投稿一覧</h3>
                    <div id="myPostsTimeline" class="space-y-4"></div>
                </div>
            </div>

            <div id="userProfileArea" class="hidden space-y-6">
                <button onclick="backToTimeline()" class="flex items-center text-sm font-bold text-green-600 hover:underline">
                    <i class="fa-solid fa-arrow-left mr-1"></i> タイムラインに戻る
                </button>
                <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm flex flex-col items-center text-center relative">
                    <img id="userProfileAvatar" class="w-24 h-24 rounded-full border-4 border-green-100 object-cover mb-4" src="">
                    <h2 id="userProfileName" class="text-xl font-bold text-gray-800">---</h2>
                    <p id="userProfileBio" class="text-sm text-gray-500 mt-2 max-w-sm">---</p>
                    <div class="flex space-x-6 mt-4">
                        <div class="text-center">
                            <span id="userFollowingCount" class="block text-lg font-bold text-gray-800">0</span>
                            <span class="text-xs text-gray-400">フォロー中</span>
                        </div>
                        <div class="text-center">
                            <span id="userFollowersCount" class="block text-lg font-bold text-gray-800">0</span>
                            <span class="text-xs text-gray-400">フォロワー</span>
                        </div>
                    </div>
                    <div class="flex space-x-3 mt-5">
                        <button id="followBtn" onclick="toggleFollow()" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold px-6 py-2 rounded-full transition shadow">
                            フォローする
                        </button>
                        <button id="unfollowBtn" onclick="toggleFollow()" class="hidden bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs font-bold px-6 py-2 rounded-full transition">
                            フォロー解除
                        </button>
                    </div>
                </div>
                <div>
                    <h3 id="userPostsTitle" class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">投稿一覧</h3>
                    <div id="userPostsTimeline" class="space-y-4"></div>
                </div>
            </div>
        </main>

        <div id="postModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl w-full max-w-md p-6 space-y-4 shadow-xl">
                <div class="flex justify-between items-center border-b pb-3">
                    <h3 class="font-bold text-gray-800">新しい投稿を作成</h3>
                    <button onclick="closePostModal()" class="text-gray-400 hover:text-gray-600 text-lg">&times;</button>
                </div>
                <textarea id="postText" class="w-full border rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" rows="5" placeholder="今なにしてる？（#ハッシュタグ も使えます）"></textarea>
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-gray-500">画像・動画・YouTubeのURL（任意）</label>
                    <input id="postMediaUrl" type="text" class="w-full border rounded-lg p-2 text-xs focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="https://example.com/image.jpg または YouTubeリンク">
                </div>
                <div class="flex justify-end space-x-3 pt-3 border-t">
                    <button onclick="closePostModal()" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">キャンセル</button>
                    <button onclick="submitPost()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold px-5 py-2 rounded-full shadow-md">投稿する</button>
                </div>
            </div>
        </div>

        <div id="editPostModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl w-full max-w-md p-6 space-y-4 shadow-xl">
                <div class="flex justify-between items-center border-b pb-3">
                    <h3 class="font-bold text-gray-800">投稿を編集</h3>
                    <button onclick="closeEditPostModal()" class="text-gray-400 hover:text-gray-600 text-lg">&times;</button>
                </div>
                <input type="hidden" id="editPostId">
                <textarea id="editPostText" class="w-full border rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" rows="5" placeholder="投稿内容を入力してください"></textarea>
                <div class="flex justify-end space-x-3 pt-3 border-t">
                    <button onclick="closeEditPostModal()" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">キャンセル</button>
                    <button onclick="submitEditPost()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-5 py-2 rounded-full shadow-md">更新する</button>
                </div>
            </div>
        </div>

        <div id="commentModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl w-full max-w-md p-6 space-y-4 shadow-xl flex flex-col max-h-[85vh]">
                <div class="flex justify-between items-center border-b pb-3 shrink-0">
                    <h3 class="font-bold text-gray-800">コメント</h3>
                    <button onclick="closeCommentModal()" class="text-gray-400 hover:text-gray-600 text-lg">&times;</button>
                </div>
                <div id="commentsList" class="flex-1 overflow-y-auto space-y-3 py-2 pr-1 text-sm">
                    <p class="text-gray-400 text-center py-4">コメントを読み込み中...</p>
                </div>
                <div class="border-t pt-3 shrink-0 space-y-2">
                    <textarea id="commentText" class="w-full border rounded-xl p-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-green-500" rows="2" placeholder="コメントを入力..."></textarea>
                    <div class="flex justify-end space-x-2">
                        <button onclick="closeCommentModal()" class="px-3 py-1.5 text-xs text-gray-500">閉じる</button>
                        <button onclick="submitComment()" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold px-4 py-1.5 rounded-full shadow">送信</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="announceModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl w-full max-w-md p-6 space-y-4 shadow-xl">
                <div class="flex justify-between items-center border-b pb-3">
                    <h3 class="font-bold text-gray-800">全体公式告知の作成</h3>
                    <button onclick="closeAnnounceModal()" class="text-gray-400 hover:text-gray-600 text-lg">&times;</button>
                </div>
                <textarea id="announceInput" class="w-full border rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-red-500" rows="4" placeholder="告知したい内容を入力..."></textarea>
                <div class="flex justify-end space-x-3 pt-3 border-t">
                    <button onclick="closeAnnounceModal()" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">キャンセル</button>
                    <button onclick="submitAnnouncement()" class="bg-red-600 hover:bg-red-700 text-white text-sm font-bold px-5 py-2 rounded-full shadow-md">告知を公開</button>
                </div>
            </div>
        </div>

        <div id="authModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl w-full max-w-md p-6 space-y-4 shadow-xl">
                <div class="flex justify-between items-center border-b pb-3">
                    <h3 id="authTitle" class="font-bold text-gray-800">アカウント作成</h3>
                    <button onclick="closeAuthModal()" class="text-gray-400 hover:text-gray-600 text-lg">&times;</button>
                </div>
                <div class="space-y-3">
                    <div id="usernameField">
                        <label class="block text-xs font-bold text-gray-500 mb-1">ユーザー名</label>
                        <input id="authUsername" type="text" class="w-full border rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="表示名（あとで変更可能）">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">メールアドレス</label>
                        <input id="authEmail" type="email" class="w-full border rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="your@email.com">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">パスワード</label>
                        <input id="authPassword" type="password" class="w-full border rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="6文字以上">
                    </div>
                </div>
                <div class="text-center text-xs">
                    <span id="authToggleText" class="text-gray-400">すでにアカウントをお持ちですか？</span>
                    <button id="authToggleBtn" onclick="toggleAuthMode()" class="text-green-600 font-bold hover:underline ml-1">ログインはこちら</button>
                </div>
                <div class="flex justify-end space-x-3 pt-3 border-t">
                    <button onclick="closeAuthModal()" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">キャンセル</button>
                    <button id="authSubmitBtn" onclick="handleAuth()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold px-5 py-2 rounded-full shadow-md">作成する</button>
                </div>
            </div>
        </div>

        <div id="userSearchModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl w-full max-w-md p-6 space-y-4 shadow-xl flex flex-col max-h-[80vh]">
                <div class="flex justify-between items-center border-b pb-3">
                    <h3 class="font-bold text-gray-800">ユーザーを探す</h3>
                    <button onclick="closeUserSearchModal()" class="text-gray-400 hover:text-gray-600 text-lg">&times;</button>
                </div>
                <div class="flex items-center space-x-2 bg-gray-100 rounded-full px-3 py-2 border">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
                    <input id="userSearchInput" type="text" class="bg-transparent border-none outline-none text-sm w-full" placeholder="ユーザー名で検索..." oninput="execUserSearch()">
                </div>
                <div id="userSearchResults" class="flex-1 overflow-y-auto space-y-3 py-2 pr-1 text-sm">
                    <p class="text-gray-400 text-center py-4">キーワードを入力して検索してください</p>
                </div>
            </div>
        </div>

        <div id="profileModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl w-full max-w-md p-6 space-y-4 shadow-xl">
                <div class="flex justify-between items-center border-b pb-3">
                    <h3 class="font-bold text-gray-800">プロフィール設定</h3>
                    <button onclick="closeProfileModal()" class="text-gray-400 hover:text-gray-600 text-lg">&times;</button>
                </div>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">ユーザー名</label>
                        <input id="profileNameInput" type="text" class="w-full border rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">アバター画像のURL</label>
                        <input id="profileAvatarInput" type="text" class="w-full border rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="https://example.com/avatar.png">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">自己紹介</label>
                        <textarea id="profileBioInput" class="w-full border rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" rows="3" placeholder="趣味や一言など"></textarea>
                    </div>
                </div>
                <div class="flex justify-end space-x-3 pt-3 border-t">
                    <button onclick="closeProfileModal()" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">キャンセル</button>
                    <button onclick="saveProfile()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold px-5 py-2 rounded-full shadow-md">保存する</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabaseクライアント初期化
        const SUPABASE_URL = "https://kntoxpwwpsbepmfeenmx.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtudG94cHd3cHNidXBtZmVlbm14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTY4ODQwOTQsImV4cCI6MjAzMjQ2MDA5NH0.3Z2D8g6q7q8p7q8p7q8p7q8p7q8p7q8p7q8p7q8p7q8"; // 実際のキー
        const exClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentTab = 'latest'; // latest, recommend, follow, notice, mypage
        let activeCommentPostId = null;
        let lastLoadedPostId = null; 
        let checkNewPostInterval = null;
        let isAuthSignUp = true; // true: 新規登録, false: ログイン
        let viewUserId = null; // 他ユーザープロフィール表示時の対象ID
        let searchQuery = ""; // タグ検索用クエリ
        let editingPostId = null; // 編集中の投稿ID

        // 起動時の初期設定
        async function checkUser() {
            const { data: { session } } = await exClient.auth.getSession();
            currentUser = session ? session.user : null;
            if (currentUser) {
                document.getElementById('authBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('postBtn').classList.remove('hidden');
                document.getElementById('myName').innerText = currentUser.raw_user_meta_data.username || currentUser.email;
                const avatar = currentUser.raw_user_meta_data.avatar_url || "https://placehold.co/100x100?text=NoImage";
                document.getElementById('myAvatar').src = avatar;
            } else {
                document.getElementById('authBtn').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
                document.getElementById('userInfo').classList.add('hidden');
                document.getElementById('postBtn').classList.add('hidden');
            }

            // 管理者判定をしてボタンの表示・非表示を制御する
            if (currentUser && currentUser.raw_user_meta_data && currentUser.raw_user_meta_data.isAdmin) {
                document.getElementById('adminAnnounceBtn').classList.remove('hidden');
                document.getElementById('adminCloseBtn').classList.remove('hidden');

        // メディア表示（画像、動画、YouTube対応）の生成
        function getMediaHtml(mediaUrl) {
            if (!mediaUrl) return "";
            const cleanUrl = mediaUrl.trim();
            if (!cleanUrl) return "";

            // YouTube判定
            const ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
            const ytMatch = cleanUrl.match(ytRegex);
            if (ytMatch && ytMatch[1]) {
                const videoId = ytMatch[1];
                return `
                    <div class="video-container rounded-xl overflow-hidden my-3 border border-gray-100">
                        <iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                `;
            }

            // 動画判定 (mp4, webm, ogg, mov)
            const videoRegex = /\.(mp4|webm|ogg|mov)(?:\?.*)?$/i;
            if (videoRegex.test(cleanUrl)) {
                return `
                    <div class="my-3 rounded-xl overflow-hidden border border-gray-100 bg-black">
                        <video src="${cleanUrl}" controls class="w-full max-h-[350px] object-contain"></video>
                    </div>
                `;
            }

            // その他は画像として処理
            return `
                <div class="my-3 rounded-xl overflow-hidden border border-gray-100 bg-gray-50 max-h-[400px]">
                    <img src="${cleanUrl}" class="w-full h-full object-cover cursor-pointer" onclick="window.open('${cleanUrl}', '_blank')">
                </div>
            `;
        }

        // テキストをパースしてハッシュタグにリンクを貼る
        function parseContent(text) {
            if (!text) return "";
            const escaped = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");

            const hashtagRegex = /#([a-zA-Z0-9ぁ-んァ-ヶー一-龠々〆〤]+)/g;
            return escaped.replace(hashtagRegex, (match, tag) => {
                return `<span class="text-green-600 font-bold hover:underline cursor-pointer" onclick="setSearchQuery('${tag}')">${match}</span>`;
            });
        }

        // タイムラインの投稿を取得＆描画（特定ID指定時は個別表示、通常は一覧表示）
        async function fetchAndRenderPosts(singlePostId = null) {
            const container = document.getElementById('postsTimeline');
            container.innerHTML = '<p class="text-gray-400 text-center py-12 text-sm">タイムラインを読み込み中...</p>';

            let postsQuery = exClient.from('posts').select('*, profiles(*)');

            if (singlePostId) {
                // 個別投稿表示
                postsQuery = postsQuery.eq('id', singlePostId);
            } else if (searchQuery) {
                // ハッシュタグ検索時
                postsQuery = postsQuery.ilike('content', `%#${searchQuery}%`);
            } else if (currentTab === 'follow') {
                // フォロータブ
                if (!currentUser) {
                    container.innerHTML = '<p class="text-gray-400 text-center py-12 text-sm">フォロー中の投稿を見るにはログインしてください。</p>';
                    return;
                }
                const { data: followings } = await exClient.from('follows').select('following_id').eq('follower_id', currentUser.id);
                const followingIds = followings ? followings.map(f => f.following_id) : [];
                if (followingIds.length === 0) {
                    container.innerHTML = '<p class="text-gray-400 text-center py-12 text-sm">フォローしているユーザーがまだいません。</p>';
                    return;
                }
                postsQuery = postsQuery.in('user_id', followingIds);
            } else if (currentTab === 'recommend') {
                // おすすめタブ（いいね数が多い順）
                postsQuery = postsQuery.order('likes_count', { ascending: false });

            if (currentTab !== 'recommend' && !singlePostId) {
                postsQuery = postsQuery.order('created_at', { ascending: false });
            }

            const { data: posts, error } = await postsQuery;

        }

        // 新規投稿の保存
        async function submitPost() {
            const content = document.getElementById('postText').value.trim();
            const mediaUrl = document.getElementById('postMediaUrl').value.trim();

            if (!content) {
                alert('投稿内容を入力してください。');
                return;
            }

            const { error } = await exClient.from('posts').insert([
                { user_id: currentUser.id, content: content, media_url: mediaUrl }
            ]);

            if (error) {
                alert('投稿に失敗しました。');
            } else {
                closePostModal();
                await fetchAndRenderPosts();
            }
        }

        // 投稿の削除
        async function deletePost(postId) {
            if (!confirm('本当にこの投稿を削除しますか？')) return;
            const { error } = await exClient.from('posts').delete().eq('id', postId);
            if (error) {
                alert('削除に失敗しました。');
            } else {
                if (currentTab === 'mypage') {
                    await loadMyPosts(currentUser.id);
                } else {
                    await fetchAndRenderPosts();
                }
            }
        }

        // 🆕 編集モーダルを開閉する関数
        function openEditPostModal(postId, currentContent) {
            editingPostId = postId;
            document.getElementById('editPostId').value = postId;
            document.getElementById('editPostText').value = currentContent;
            document.getElementById('editPostModal').classList.remove('hidden');
        }

        function closeEditPostModal() {
            document.getElementById('editPostModal').classList.add('hidden');
            editingPostId = null;
        }

        // 🆕 編集した内容をSupabaseに保存して反映する関数
        async function submitEditPost() {
            const postId = document.getElementById('editPostId').value;
            const newContent = document.getElementById('editPostText').value.trim();

            if (!newContent) {
                alert('投稿内容を入力してください。');
                return;
            }

            const { error } = await exClient
                .from('posts')
                .update({ content: newContent })
                .eq('id', postId);

            if (error) {
                alert('投稿の更新に失敗しました。');
                console.error(error);
            } else {
                closeEditPostModal();
                await fetchAndRenderPosts(); // タイムラインを再読込
            }
        }

        // コメントモーダル制御
        async function openCommentModal(postId) {
            activeCommentPostId = postId;
            document.getElementById('commentModal').classList.remove('hidden');
            await loadComments(postId);
        }

        function closeCommentModal() {
            document.getElementById('commentModal').classList.add('hidden');
            document.getElementById('commentText').value = '';
            activeCommentPostId = null;
        }

        // コメント読み込み
        async function loadComments(postId) {
            const container = document.getElementById('commentsList');
            container.innerHTML = '<p class="text-gray-400 text-center py-4 text-xs">コメントを読み込み中...</p>';

            const { data: comments, error } = await exClient
                .from('comments')
                .select('*, profiles(*)')
                .eq('post_id', postId)
                .order('created_at', { ascending: true });

            if (error) {
                container.innerHTML = '<p class="text-red-400 text-center py-4 text-xs">コメントの取得に失敗しました。</p>';
                return;
            }

            if (!comments || comments.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-4 text-xs">コメントはまだありません。</p>';
                return;
            }

            container.innerHTML = '';
            comments.forEach(comment => {
                const profile = comment.profiles || { username: "ゲスト", avatar_url: "https://placehold.co/100x100?text=NoImage" };
                const commentDiv = document.createElement('div');
                commentDiv.className = "flex space-x-3 items-start border-b border-gray-50 pb-2";
                commentDiv.innerHTML = `
                    <img src="${profile.avatar_url || 'https://placehold.co/100x100?text=NoImage'}" class="w-8 h-8 rounded-full border object-cover">
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-0.5">
                            <span class="font-bold text-gray-700 text-xs">${profile.username}</span>
                            <span class="text-[9px] text-gray-400">${new Date(comment.created_at).toLocaleString()}</span>
                        </div>
                        <p class="text-xs text-gray-600 whitespace-pre-wrap">${comment.content}</p>
                    </div>
                `;
                container.appendChild(commentDiv);
            });
        }

        // コメント送信
        async function submitComment() {
            if (!currentUser) {
                alert('コメントするにはログインが必要です。');
                openAuthModal();
                return;
            }
            const text = document.getElementById('commentText').value.trim();
            if (!text || !activeCommentPostId) return;

            const { error } = await exClient.from('comments').insert([
                { post_id: activeCommentPostId, user_id: currentUser.id, content: text }
            ]);

            if (error) {
                alert('コメントの送信に失敗しました。');
            } else {
                document.getElementById('commentText').value = '';
                
                const { data: post } = await exClient.from('posts').select('user_id').eq('id', activeCommentPostId).single();
                if (post && post.user_id !== currentUser.id) {
                    await createNotification(post.user_id, 'comment', activeCommentPostId);
                }

                await loadComments(activeCommentPostId);
                if (viewUserId) {
                    await loadUserPosts(viewUserId);
                } else if (currentTab === 'mypage') {
                    await loadMyPosts(currentUser.id);
                } else {
                    await fetchAndRenderPosts();
                }
            }
        }

        // 通知作成
        async function createNotification(targetUserId, type, postId) {
            await exClient.from('notifications').insert([
                { target_user_id: targetUserId, sender_id: currentUser.id, type: type, post_id: postId }
            ]);
        }

        // 未読通知バッジの更新
        async function checkUnreadNotifications() {
            if (!currentUser) return;
            const { count, error } = await exClient
                .from('notifications')
                .select('*', { count: 'exact', head: true })
                .eq('target_user_id', currentUser.id)
                .eq('is_read', false);
            
            const badge = document.getElementById('noticeBadge');
            if (!error && count > 0) {
                badge.innerText = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // 通知一覧のロード
        async function loadNotifications() {
            const listContainer = document.getElementById('notificationsList');
            listContainer.innerHTML = '<p class="text-gray-400 text-center py-12 text-sm">通知を読み込み中...</p>';

            if (!currentUser) {
                listContainer.innerHTML = '<p class="text-gray-400 text-center py-12 text-sm">通知を見るにはログインしてください。</p>';
                return;
            }

            const { data: notices, error } = await exClient
                .from('notifications')
                .select('*, sender:profiles!sender_id(*)')
                .eq('target_user_id', currentUser.id)
                .order('created_at', { ascending: false })
                .limit(40);

            if (error) {
                listContainer.innerHTML = '<p class="text-red-400 text-center py-12 text-sm">通知の取得に失敗しました。</p>';
                return;
            }

            if (!notices || notices.length === 0) {
                listContainer.innerHTML = '<p class="text-gray-400 text-center py-12 text-sm">通知はまだありません。</p>';
                return;
            }

            listContainer.innerHTML = '';
            notices.forEach(n => {
                const sender = n.sender || { username: "誰か", avatar_url: "https://placehold.co/100x100?text=NoImage" };
                const noticeCard = document.createElement('div');
                noticeCard.className = `flex items-center space-x-3 p-3 rounded-xl border transition cursor-pointer ${n.is_read ? 'bg-white border-gray-100' : 'bg-green-50/50 border-green-100 font-bold'}`;
                
                let text = "";
                let icon = "";
                if (n.type === 'like') {
                    text = "あなたの投稿に「いいね」しました。";
                    icon = '<i class="fa-solid fa-heart text-red-500 text-sm"></i>';
                } else if (n.type === 'comment') {
                    text = "あなたの投稿にコメントしました。";
                    icon = '<i class="fa-solid fa-comment text-green-500 text-sm"></i>';
                } else if (n.type === 'follow') {
                    text = "あなたをフォローしました。";
                    icon = '<i class="fa-solid fa-user-plus text-blue-500 text-sm"></i>';
                }

                noticeCard.innerHTML = `
                    <img src="${sender.avatar_url || 'https://placehold.co/100x100?text=NoImage'}" class="w-10 h-10 rounded-full border object-cover">
                    <div class="flex-1">
                        <p class="text-xs text-gray-800"><span class="font-bold text-gray-900">${sender.username}</span> さんが ${text}</p>
                        <span class="text-[9px] text-gray-400 block mt-1">${new Date(n.created_at).toLocaleString()}</span>
                    </div>
                    <div class="px-2">${icon}</div>
                `;

                noticeCard.onclick = async () => {
                    if (!n.is_read) {
                        await exClient.from('notifications').update({ is_read: true }).eq('id', n.id);
                        await checkUnreadNotifications();
                    }
                    if (n.type === 'follow') {
                        await viewUserProfile(n.sender_id);
                    } else if (n.post_id) {
                        currentTab = 'latest';
                        window.location.hash = `#/post/${n.post_id}`;
                        document.getElementById('notificationsTimeline').classList.add('hidden');
                        document.getElementById('postsTimeline').classList.remove('hidden');
                        await fetchAndRenderPosts(n.post_id);
                    }
                };
                listContainer.appendChild(noticeCard);
            });
        }

        // タグ検索実行
        function execSearch() {
            const q = document.getElementById('searchInput').value.trim().replace(/^#/, '');
            if (!q) {
                clearSearch();
                return;
            }
            searchQuery = q;
            document.getElementById('searchWord').innerText = `#${q}`;
            document.getElementById('searchBadge').classList.remove('hidden');
            fetchAndRenderPosts();
        }

        // タグ検索解除
        function clearSearch() {
            searchQuery = "";
            document.getElementById('searchInput').value = "";
            document.getElementById('searchBadge').classList.add('hidden');
            fetchAndRenderPosts();
        }

        // ユーザー検索表示
        function openUserSearchModal() {
            document.getElementById('userSearchModal').classList.remove('hidden');
            document.getElementById('userSearchInput').value = '';
            document.getElementById('userSearchResults').innerHTML = '<p class="text-gray-400 text-center py-4 text-xs">キーワードを入力して検索してください</p>';
        }

        function closeUserSearchModal() {
            document.getElementById('userSearchModal').classList.add('hidden');
        }

        async function execUserSearch() {
            const q = document.getElementById('userSearchInput').value.trim();
            const container = document.getElementById('userSearchResults');
            if (!q) {
                container.innerHTML = '<p class="text-gray-400 text-center py-4 text-xs">キーワードを入力して検索してください</p>';
                return;
            }

            const { data: users, error } = await exClient.from('profiles').select('*').ilike('username', `%${q}%`).limit(15);
            if (error || !users) {
                container.innerHTML = '<p class="text-red-400 text-center py-4 text-xs">検索に失敗しました。</p>';
                return;
            }

            if (users.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-4 text-xs">一致するユーザーが見つかりません。</p>';
                return;
            }

            container.innerHTML = '';
            users.forEach(u => {
                const userCard = document.createElement('div');
                userCard.className = "flex items-center justify-between p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition";
                userCard.onclick = () => {
                    closeUserSearchModal();
                    viewUserProfile(u.id);
                };
                userCard.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <img src="${u.avatar_url || 'https://placehold.co/100x100?text=NoImage'}" class="w-9 h-9 rounded-full border object-cover">
                        <div>
                            <span class="font-bold text-gray-800 text-xs block">${u.username}</span>
                            <span class="text-[10px] text-gray-400 line-clamp-1">${u.bio || "自己紹介なし"}</span>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                `;
                container.appendChild(userCard);
            });
        }

        // プロフィール編集表示
        async function openProfileModal() {
            if (!currentUser) return;
            const { data: profile } = await exClient.from('profiles').select('*').eq('id', currentUser.id).single();
            if (profile) {
                document.getElementById('profileNameInput').value = profile.username || '';
                document.getElementById('profileAvatarInput').value = profile.avatar_url || '';
                document.getElementById('profileBioInput').value = profile.bio || '';
            }
            document.getElementById('profileModal').classList.remove('hidden');
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.add('hidden');
        }

        async function saveProfile() {
            const name = document.getElementById('profileNameInput').value.trim();
            const avatar = document.getElementById('profileAvatarInput').value.trim();
            const bio = document.getElementById('profileBioInput').value.trim();

            if (!name) {
                alert('ユーザー名を入力してください。');
                return;
            }

            const { error } = await exClient.from('profiles').upsert({
                id: currentUser.id, username: name, avatar_url: avatar, bio: bio
            });

            if (error) {
                alert('プロフィールの保存に失敗しました。');
            } else {
                // Auth User Metadata同期
                await exClient.auth.updateUser({
                    data: { username: name, avatar_url: avatar }
                });

                closeProfileModal();
                await checkUser();
                if (currentTab === 'mypage') {
                    await loadMyPage();
                } else {
                    await fetchAndRenderPosts();
                }
            }
        }

        // 新しい投稿のロード
        async function loadNewPosts() {
            document.getElementById('newPostAlert').classList.add('hidden');
            await initLatestPostId();
            await fetchAndRenderPosts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 認証関係
        function openAuthModal() {
            document.getElementById('authModal').classList.remove('hidden');
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.add('hidden');
            document.getElementById('authUsername').value = '';
            document.getElementById('authEmail').value = '';
            document.getElementById('authPassword').value = '';
        }

        function toggleAuthMode() {
            isAuthSignUp = !isAuthSignUp;
            const title = document.getElementById('authTitle');
            const submitBtn = document.getElementById('authSubmitBtn');
            const toggleText = document.getElementById('authToggleText');
            const toggleBtn = document.getElementById('authToggleBtn');
            const usernameField = document.getElementById('usernameField');

            if (isAuthSignUp) {
                title.innerText = "アカウント作成";
                submitBtn.innerText = "作成する";
                toggleText.innerText = "すでにアカウントをお持ちですか？";
                toggleBtn.innerText = "ログインはこちら";
                usernameField.classList.remove('hidden');
            } else {
                title.innerText = "ログイン";
                submitBtn.innerText = "ログイン";
                toggleText.innerText = "アカウントをお持ちではありませんか？";
                toggleBtn.innerText = "アカウント作成はこちら";
                usernameField.classList.add('hidden');
            }
        }

        // 認証・登録の処理
        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            const username = document.getElementById('authUsername').value.trim();

            if (!email || !password) {
                alert('メールアドレスとパスワードを入力してください。');
                return;
            }

            if (isAuthSignUp) {
                if (!username) {
                    alert('ユーザー名を入力してください。');
                    return;
                }
                const { data, error } = await exClient.auth.signUp({
                    email, password, options: { data: { username: username } }
                });
                if (error) {
                    alert('アカウント作成に失敗: ' + error.message);
                } else {
                    alert('確認メールを送信しました（または作成が完了しました）。ログインしてください。');
                    toggleAuthMode();
                }
            } else {
                const { data, error } = await exClient.auth.signInWithPassword({ email, password });
                if (error) {
                    alert('ログインに失敗: ' + error.message);
                } else {
                    closeAuthModal();
                    await checkUser();
                    await fetchAndRenderPosts();
                }
            }
        }

        // ログアウト
        async function handleLogout() {
            if (!confirm('ログアウトしますか？')) return;
            await exClient.auth.signOut();
            currentUser = null;
            await checkUser();
            window.location.hash = '';
            switchTab('latest');
        }

        // 🆕 告知作成（管理者専用機能）
        function openAnnounceModal() {
            document.getElementById('announceModal').classList.remove('hidden');
        }

        function closeAnnounceModal() {
            document.getElementById('announceModal').classList.add('hidden');
            document.getElementById('announceInput').value = '';
        }

        async function submitAnnouncement() {
            const text = document.getElementById('announceInput').value.trim();
            if (!text) return;

            const { error } = await exClient.from('announcements').insert([{ content: text }]);
            if (error) {
                alert('告知の投稿に失敗しました。');
            } else {
                closeAnnounceModal();
                await fetchAnnouncement();
            }
        }

        // 🆕 投稿の個別リンクをクリップボードにコピーする関数
        async function sharePost(postId) {
            const shareUrl = `${window.location.origin}${window.location.pathname}#/post/${postId}`;
            try {
                await navigator.clipboard.writeText(shareUrl);
                alert('投稿のリンクをクリップボードにコピーしました！');
            } catch (err) {
                alert('コピーに失敗しました。');
            }
        }

        // 🆕 サーバー閉鎖・解除を切り替える関数
        async function toggleServerClose(shouldClose) {
            const confirmMsg = shouldClose 
                ? "サーバーを一時的に閉鎖（メンテナンスモード）にしますか？" 
                : "サーバーの閉鎖を解除して通常運転に戻しますか？";
                
            if (!confirm(confirmMsg)) return;

            const text = shouldClose 
                ? "[閉鎖中] 現在システムアップデート中です。終了までしばらくお待ちください。" 
                : "メンテナンスは無事終了しました！ご協力ありがとうございました。";

            // announcementsテーブルに最新状態として書き込み
            const { error } = await exClient
                .from('announcements')
                .insert([{ content: text }]);

            if (error) {
                alert('状態の切り替えに失敗しました。');
                console.error(error);
            } else {
                alert(shouldClose ? 'サーバーを閉鎖しました。' : '閉鎖を解除しました。');
                await fetchAnnouncement(); // 即時反映
            }
        }
    </script>
</body>
</html>
