<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIJ!コミュニティ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .main-container { max-width: 500px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; }
    </style>
</head>
<body>

    <div class="main-container shadow-lg flex flex-col min-h-screen">
        
        <header class="sticky top-0 bg-white border-b border-gray-200 p-4 flex justify-between items-center z-10">
            <h1 class="text-xl font-bold text-green-600">SIJ!コミュニティ</h1>
            <div class="flex items-center space-x-2">
                <div id="userInfo" class="hidden flex items-center space-x-2">
                    <img id="myAvatar" onclick="openProfileModal()" class="w-8 h-8 rounded-full border cursor-pointer hover:opacity-80 transition" src="" alt="my avatar">
                    <span id="myName" onclick="openProfileModal()" class="text-sm font-bold text-gray-700 cursor-pointer hover:underline"></span>
                </div>
                <button id="postBtn" onclick="openPostModal()" class="hidden bg-green-500 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-green-600">
                    <i class="fa-solid fa-pen"></i> 投稿
                </button>
                <button id="authBtn" onclick="openAuthModal()" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-gray-300">
                    ログイン/作成
                </button>
                <button id="logoutBtn" onclick="handleLogout()" class="hidden bg-red-100 text-red-600 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-red-200">
                    ログアウト
                </button>
            </div>
        </header>

        <div id="profileBar" class="hidden bg-gray-50 p-3 border-b border-gray-100 text-xs text-gray-600 flex justify-between items-center">
            <div>
                <span class="font-bold">自己紹介:</span> <span id="myBio">未設定</span>
            </div>
            <button onclick="openProfileModal()" class="text-green-600 hover:underline">編集</button>
        </div>

        <main id="timeline" class="flex-1 p-4 space-y-6 pb-24">
            </main>

    </div>

    <div id="authModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 id="authTitle" class="text-lg font-bold">簡易アカウント作成</h3>
                <button onclick="closeAuthModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            
            <div class="space-y-3">
                <input id="authUsername" type="text" class="w-full border p-2 rounded text-sm" placeholder="ユーザー名">
                <input id="authPassword" type="password" class="w-full border p-2 rounded text-sm" placeholder="パスワード（6文字以上）">
                <input id="authPasswordConfirm" type="password" class="w-full border p-2 rounded text-sm" placeholder="パスワード確認（もう一度入力）">

                <div class="flex flex-col gap-2 pt-2">
                    <button id="authSubmitBtn" onclick="handleAuthSubmit()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600 text-sm">アカウントを作成する</button>
                    <button id="authToggleBtn" onclick="toggleAuthMode()" class="text-xs text-gray-500 underline hover:text-gray-700">すでにアカウントをお持ちの方（ログイン）</button>
                </div>
            </div>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">プロフィール編集</h3>
                <button onclick="closeProfileModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">アイコン画像</label>
                    <input id="avatarFile" type="file" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">一言（自己紹介）</label>
                    <input id="editBio" type="text" class="w-full border p-2 rounded text-sm" placeholder="今の一言を入力してください">
                </div>

                <button onclick="saveProfile()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600 text-sm">保存する</button>
            </div>
        </div>
    </div>

    <div id="postModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">新規投稿</h3>
                <button onclick="closePostModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <textarea id="postText" class="w-full border border-gray-300 rounded p-2 h-24 resize-none mb-4" placeholder="今なにしてる？"></textarea>
            
            <label class="block text-xs font-bold text-gray-700 mb-1">画像を追加</label>
            <input id="postMediaFile" type="file" accept="image/*" class="w-full text-xs text-gray-500 mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
            
            <button onclick="submitPost()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600">投稿する</button>
        </div>
    </div>

    <script>
        // ブラウザのLocalStorageを使ってデータをローカルに保存する仕組み
        let users = JSON.parse(localStorage.getItem('sij_users')) || [];
        let posts = JSON.parse(localStorage.getItem('sij_posts')) || [];
        let currentUser = JSON.parse(localStorage.getItem('sij_current_user')) || null;

        let isSignUpMode = true;

        window.onload = () => {
            // 最初期のみダミーの投稿を入れておく
            if (posts.length === 0) {
                posts = [
                    {
                        id: 1,
                        username: "管理人ケンタ",
                        avatar: "https://api.dicebear.com/7.x/adventurer/svg?seed=Kenta",
                        content: "SIJ!コミュニティへようこそ！ここがみんなの新しい遊び場です！",
                        media: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600&auto=format&fit=crop&q=60",
                        created_at: new Date().toISOString()
                    }
                ];
                localStorage.setItem('sij_posts', JSON.stringify(posts));
            }
            updateUserUI();
            renderTimeline();
        };

        // UIをログイン状態に合わせて更新する
        function updateUserUI() {
            if (currentUser) {
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('profileBar').classList.remove('hidden');
                document.getElementById('postBtn').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('authBtn').classList.add('hidden');
                
                document.getElementById('myAvatar').src = currentUser.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + currentUser.username;
                document.getElementById('myName').innerText = currentUser.username;
                document.getElementById('myBio').innerText = currentUser.bio || "未設定";
                document.getElementById('editBio').value = currentUser.bio || "";
            } else {
                document.getElementById('userInfo').classList.add('hidden');
                document.getElementById('profileBar').classList.add('hidden');
                document.getElementById('postBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
                document.getElementById('authBtn').classList.remove('hidden');
            }
        }

        // タイムライン描画
        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            // 最新の投稿が上にくるように並び替える
            const sortedPosts = [...posts].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            sortedPosts.forEach(post => {
                const postCard = document.createElement('div');
                postCard.className = "bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm";
                postCard.innerHTML = `
                    <div class="flex items-center p-3">
                        <img src="${post.avatar}" class="w-10 h-10 rounded-full border mr-3" alt="avatar">
                        <span class="font-bold text-gray-800">${post.username}</span>
                    </div>
                    <div class="px-3 pb-3 text-gray-800 text-sm">${post.content}</div>
                    ${post.media ? `
                        <div class="w-full bg-black flex justify-center">
                            <img src="${post.media}" class="max-h-96 w-full object-cover" alt="post media">
                        </div>
                    ` : ''}
                `;
                timeline.appendChild(postCard);
            });
        }

        // 画像ファイルをテキストデータ（Base64URL）に変換する関数
        function convertFileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // アカウント登録 or ログイン処理
        async function handleAuthSubmit() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value.trim();

            if (!username || !password) {
                alert('すべての項目を入力してください！');
                return;
            }

            if (isSignUpMode) {
                const passwordConfirm = document.getElementById('authPasswordConfirm').value.trim();
                
                if (password !== passwordConfirm) {
                    alert('パスワード確認が一致しません！');
                    return;
                }

                // すでに同じ名前のユーザーがいるか確認
                const existUser = users.find(u => u.username === username);
                if (existUser) {
                    alert('このユーザー名はすでに使用されています。');
                    return;
                }

                // 新規ユーザー追加
                const newUser = {
                    username: username,
                    password: password,
                    bio: "",
                    avatar_url: ""
                };
                users.push(newUser);
                localStorage.setItem('sij_users', JSON.stringify(users));

                currentUser = newUser;
                localStorage.setItem('sij_current_user', JSON.stringify(currentUser));

                alert('アカウント作成＆ログインが成功しました！');
                closeAuthModal();
                updateUserUI();
                location.reload();
            } else {
                // ログイン処理
                const foundUser = users.find(u => u.username === username && u.password === password);
                if (!foundUser) {
                    alert('ユーザー名、またはパスワードが間違っています。');
                    return;
                }

                currentUser = foundUser;
                localStorage.setItem('sij_current_user', JSON.stringify(currentUser));

                alert('ログインしました！');
                closeAuthModal();
                updateUserUI();
                location.reload();
            }
        }

        // プロフィール保存
        async function saveProfile() {
            if (!currentUser) return;

            const bioText = document.getElementById('editBio').value.trim();
            const avatarFile = document.getElementById('avatarFile').files[0];
            
            // アイコン画像ファイルがある場合、Base64形式に変換して保存
            if (avatarFile) {
                try {
                    currentUser.avatar_url = await convertFileToBase64(avatarFile);
                } catch (e) {
                    alert('画像の読み込みに失敗しました。');
                    return;
                }
            }

            currentUser.bio = bioText;

            // ローカルの全ユーザーリスト内にある自分自身の情報も更新
            users = users.map(u => u.username === currentUser.username ? currentUser : u);
            localStorage.setItem('sij_users', JSON.stringify(users));
            localStorage.setItem('sij_current_user', JSON.stringify(currentUser));

            // すでに自分が投稿した過去の投稿アイコンも、今回の新しい画像に更新する
            posts = posts.map(p => {
                if (p.username === currentUser.username) {
                    p.avatar = currentUser.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + currentUser.username;
                }
                return p;
            });
            localStorage.setItem('sij_posts', JSON.stringify(posts));

            alert('プロフィールを保存しました！');
            closeProfileModal();
            updateUserUI();
            renderTimeline();
        }

        // 新規投稿をローカルに保存
        async function submitPost() {
            if (!currentUser) return;

            const text = document.getElementById('postText').value.trim();
            const mediaFile = document.getElementById('postMediaFile').files[0];
            let mediaUrl = "";

            if (!text && !mediaFile) {
                alert('投稿内容を入力するか、画像を選択してください！');
                return;
            }

            // 投稿に画像ファイルが添付されている場合
            if (mediaFile) {
                try {
                    mediaUrl = await convertFileToBase64(mediaFile);
                } catch (e) {
                    alert('画像のアップロードに失敗しました。');
                    return;
                }
            }

            const newPost = {
                id: Date.now(),
                username: currentUser.username,
                avatar: currentUser.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + currentUser.username,
                content: text,
                media: mediaUrl || null,
                created_at: new Date().toISOString()
            };

            posts.push(newPost);
            localStorage.setItem('sij_posts', JSON.stringify(posts));

            // 入力欄をリセット
            document.getElementById('postText').value = '';
            document.getElementById('postMediaFile').value = '';

            closePostModal();
            renderTimeline();
        }

        // ログアウト処理
        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('sij_current_user');
            alert('ログアウトしました');
            updateUserUI();
        }

        // 各ポップアップ（モーダル）切り替えの関数
        function openAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }
        function openPostModal() { document.getElementById('postModal').classList.remove('hidden'); }
        function closePostModal() { document.getElementById('postModal').classList.add('hidden'); }
        function openProfileModal() { document.getElementById('profileModal').classList.remove('hidden'); }
        function closeProfileModal() { document.getElementById('profileModal').classList.add('hidden'); }

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            const title = document.getElementById('authTitle');
            const submitBtn = document.getElementById('authSubmitBtn');
            const toggleBtn = document.getElementById('authToggleBtn');
            const confirmInput = document.getElementById('authPasswordConfirm');

            if (isSignUpMode) {
                title.innerText = '簡易アカウント作成';
                submitBtn.innerText = 'アカウントを作成する';
                toggleBtn.innerText = 'すでにアカウントをお持ちの方（ログイン）';
                confirmInput.classList.remove('hidden');
            } else {
                title.innerText = 'ログイン';
                submitBtn.innerText = 'ログインする';
                toggleBtn.innerText = '新規アカウント作成はこちら';
                confirmInput.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
