<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIJ!コミュニティ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .main-container { max-width: 500px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; }
    </style>
</head>
<body>

    <div class="main-container shadow-lg flex flex-col min-h-screen">
        
        <header class="sticky top-0 bg-white border-b border-gray-200 p-4 flex justify-between items-center z-10">
            <h1 class="text-xl font-bold text-green-600">SIJ!コミュニティ</h1>
            <div class="flex items-center space-x-2">
                <div id="userInfo" class="hidden flex items-center space-x-2">
                    <img id="myAvatar" class="w-8 h-8 rounded-full border" src="" alt="my avatar">
                    <span id="myName" class="text-sm font-bold text-gray-700"></span>
                </div>
                <button id="postBtn" onclick="openPostModal()" class="hidden bg-green-500 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-green-600">
                    <i class="fa-solid fa-pen"></i> 投稿
                </button>
                <button id="authBtn" onclick="openAuthModal()" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-gray-300">
                    ログイン/作成
                </button>
            </div>
        </header>

        <div id="profileBar" class="hidden bg-gray-50 p-3 border-b border-gray-100 text-xs text-gray-600">
            <span class="font-bold">自己紹介:</span> <span id="myBio">未設定</span>
        </div>

        <main id="timeline" class="flex-1 p-4 space-y-6 pb-24">
            <div class="text-center text-gray-500 py-10">読み込み中...</div>
        </main>

    </div>

    <div id="authModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 id="authTitle" class="text-lg font-bold">簡易アカウント作成</h3>
                <button onclick="closeAuthModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            
            <div class="space-y-3">
                <input id="authEmail" type="email" class="w-full border p-2 rounded text-sm" placeholder="メールアドレス（ログイン用）">
                <input id="authPassword" type="password" class="w-full border p-2 rounded text-sm" placeholder="パスワード（6文字以上）">
                
                <div id="profileFields" class="space-y-3 border-t pt-3">
                    <p class="text-xs text-gray-500 font-bold">プロフィール設定</p>
                    <input id="profileName" type="text" class="w-full border p-2 rounded text-sm" placeholder="表示されるユーザー名">
                    <input id="profileBio" type="text" class="w-full border p-2 rounded text-sm" placeholder="自己紹介（一言）">
                    <input id="profileAvatar" type="text" class="w-full border p-2 rounded text-sm" placeholder="アイコン画像URL (空欄なら初期画像)">
                </div>

                <div class="flex flex-col gap-2 pt-2">
                    <button id="authSubmitBtn" onclick="handleAuthSubmit()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600 text-sm">アカウントを作成する</button>
                    <button id="authToggleBtn" onclick="toggleAuthMode()" class="text-xs text-gray-500 underline hover:text-gray-700">すでにアカウントをお持ちの方（ログイン）</button>
                </div>
            </div>
        </div>
    </div>

    <div id="postModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">新規投稿</h3>
                <button onclick="closePostModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <textarea id="postText" class="w-full border border-gray-300 rounded p-2 h-24 resize-none mb-4" placeholder="今なにしてる？"></textarea>
            <input id="postMedia" type="text" class="w-full border border-gray-300 rounded p-2 mb-4 text-sm" placeholder="画像URL (空欄OK)">
            <button onclick="submitPost()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600">投稿する</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 【重要】例のキーをここに貼り付けてください！
        // ==========================================
        const EX_URL = "https://あなたのプロジェクトID.supabase.co";
        const EX_KEY = "あなたのanonキー";
        
        // 例のシステムを立ち上げる
        const exClient = supabase.createClient(EX_URL, EX_KEY);

        let currentUser = null;
        let isSignUpMode = true;

        window.onload = async () => {
            checkUser();
            fetchAndRenderPosts();
        };

        // ログイン状態の確認
        async function checkUser() {
            const { data: { user } } = await exClient.auth.getUser();
            if (user) {
                currentUser = user;
                
                const { data: profile } = await exClient
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .single();

                if (profile) {
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('profileBar').classList.remove('hidden');
                    document.getElementById('postBtn').classList.remove('hidden');
                    document.getElementById('authBtn').classList.add('hidden');
                    
                    document.getElementById('myAvatar').src = profile.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + profile.username;
                    document.getElementById('myName').innerText = profile.username;
                    document.getElementById('myBio').innerText = profile.bio || "未設定";
                }
            }
        }

        // 投稿一覧を表示する
        async function fetchAndRenderPosts() {
            const timeline = document.getElementById('timeline');
            
            const { data: posts, error } = await exClient
                .from('posts')
                .select(`
                    id, content, media_url, created_at,
                    profiles ( username, avatar_url )
                `)
                .order('created_at', { ascending: false });

            if (error || !posts) {
                timeline.innerHTML = `<div class="text-center text-red-500 py-10">データの読み込みに失敗しました</div>`;
                return;
            }

            timeline.innerHTML = '';
            
            posts.forEach(post => {
                const authorName = post.profiles?.username || "名無しユーザー";
                const authorAvatar = post.profiles?.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + authorName;
                
                const postCard = document.createElement('div');
                postCard.className = "bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm";
                postCard.innerHTML = `
                    <div class="flex items-center p-3">
                        <img src="${authorAvatar}" class="w-10 h-10 rounded-full border mr-3" alt="avatar">
                        <span class="font-bold text-gray-800">${authorName}</span>
                    </div>
                    <div class="px-3 pb-3 text-gray-800 text-sm">${post.content}</div>
                    ${post.media_url ? `
                        <div class="w-full bg-black flex justify-center">
                            <img src="${post.media_url}" class="max-h-96 w-full object-cover" alt="post media">
                        </div>
                    ` : ''}
                `;
                timeline.appendChild(postCard);
            });
        }

        // アカウント作成・ログイン処理
        async function handleAuthSubmit() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value.trim();

            if (isSignUpMode) {
                const username = document.getElementById('profileName').value.trim();
                const bio = document.getElementById('profileBio').value.trim();
                const avatar = document.getElementById('profileAvatar').value.trim();

                if (!email || !password || !username) {
                    alert('必須項目を入力してください！');
                    return;
                }

                const { data: authData, error: authError } = await exClient.auth.signUp({ email, password });
                if (authError) {
                    alert('登録エラー: ' + authError.message);
                    return;
                }

                if (authData.user) {
                    const { error: profileError } = await exClient
                        .from('profiles')
                        .insert([{
                            id: authData.user.id,
                            username: username,
                            bio: bio,
                            avatar_url: avatar || null
                        }]);

                    if (profileError) {
                        alert('プロフィール作成エラー: ' + profileError.message);
                    } else {
                        alert('アカウントを作成しました！リロードしてログインしてください。');
                        location.reload();
                    }
                }
            } else {
                const { error } = await exClient.auth.signInWithPassword({ email, password });
                if (error) {
                    alert('ログインエラー: ' + error.message);
                } else {
                    location.reload();
                }
            }
        }

        // 投稿を保存する処理
        async function submitPost() {
            if (!currentUser) return;
            const text = document.getElementById('postText').value.trim();
            const media = document.getElementById('postMedia').value.trim();

            if (!text && !media) return;

            const { error } = await exClient
                .from('posts')
                .insert([{
                    id: Math.floor(Math.random() * 10000000),
                    user_id: currentUser.id,
                    content: text,
                    media_url: media || null
                }]);

            if (error) {
                alert('投稿に失敗しました: ' + error.message);
            } else {
                closePostModal();
                fetchAndRenderPosts();
            }
        }

        function openAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }
        function openPostModal() { document.getElementById('postModal').classList.remove('hidden'); }
        function closePostModal() { document.getElementById('postModal').classList.add('hidden'); }

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            const title = document.getElementById('authTitle');
            const submitBtn = document.getElementById('authSubmitBtn');
            const toggleBtn = document.getElementById('authToggleBtn');
            const profileFields = document.getElementById('profileFields');

            if (isSignUpMode) {
                title.innerText = '簡易アカウント作成';
                submitBtn.innerText = 'アカウントを作成する';
                toggleBtn.innerText = 'すでにアカウントをお持ちの方（ログイン）';
                profileFields.classList.remove('hidden');
            } else {
                title.innerText = 'ログイン';
                submitBtn.innerText = 'ログインする';
                toggleBtn.innerText = '新規アカウント作成はこちら';
                profileFields.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
