        // 🎥 YouTubeのURLから動画IDを抽出して埋め込みHTMLを作る関数
        function getYouTubeEmbedHtml(text) {
            if (!text) return "";
            // 通常URL (watch?v=) と 短縮URL (youtu.be/) の両方に対応する正規表現
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const matches = text.match(/(https?:\/\/[^\s]+)/g);
            
            if (!matches) return "";
            
            let embedHtml = "";
            matches.forEach(url => {
                const match = url.match(regExp);
                if (match && match[2].length === 11) {
                    const videoId = match[2];
                    embedHtml += `
                        <div class="video-container bg-black">
                            <iframe src="https://www.youtube.com/embed/${videoId}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                        </div>
                    `;
                }
            });
            return embedHtml;
        }

        async function compressImage(file, maxWidth = 800, quality = 0.6) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height;
                        if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => { resolve(blob); }, 'image/jpeg', quality);
                    };
                };
            });
        }

        function parseRichText(text) {
            if (!text) return "";
            let formatted = text.replace(/[#＃]([A-Za-z0-9_ぁ-んァ-ヶー一-龠々]+)/g, (match, tag) => {
                return `<span class="text-blue-500 font-semibold cursor-pointer hover:underline" onclick="clickHashtag('${tag}')">${match}</span>`;
            });
            formatted = formatted.replace(/@([A-Za-z0-9_ぁ-んァ-ヶー一-龠々]+)/g, (match, username) => {
                return `<span class="text-blue-600 font-bold cursor-pointer hover:underline" onclick="clickMention('${username}')">${match}</span>`;
            });
            // URLをハイパーリンク化
            formatted = formatted.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="text-green-600 hover:underline break-all">$1</a>');
            return formatted;
        }

       async function submitPost() {
            // 🔧 メンテナンス中のブロックを追加
            if (isMaintenanceActive && (!currentUser || currentUser.username !== allowedAdminUser)) {
                alert('ただいまメンテナンス中のため、この操作は行えません。');
                return;
            }

            const text = document.getElementById('postText').value.trim();
            // ... (これ以降は元のコードのまま)
            if (!currentUser) return; const text = document.getElementById('postText').value.trim(); const mediaFileInput = document.getElementById('postMediaFile'); const mediaFile = mediaFileInput.files[0]; let mediaUrl = null; if (!text && !mediaFile) return;
            if (mediaFile) { const compressedBlob = await compressImage(mediaFile); const fileName = `${currentUser.id}_${Date.now()}.jpg`; await exClient.storage.from('posts').upload(fileName, compressedBlob, { contentType: 'image/jpeg' }); const { data: { publicUrl } } = exClient.storage.from('posts').getPublicUrl(fileName); mediaUrl = publicUrl; }
            const { data: newPost, error } = await exClient.from('posts').insert([{ user_id: currentUser.id, content: text, media_url: mediaUrl }]).select().single();

                if (mentionMatches) {
                    for (const match of mentionMatches) {
                        const targetName = match.replace('@', ''); if (targetName === myProfileName) continue;
                        const { data: targetUser } = await exClient.from('public_profiles').select('id').eq('username', targetName).maybeSingle();
                        if (targetUser) { await exClient.from('notifications').insert([{ user_id: targetUser.id, type: 'mention', sender_name: myProfileName, source_id: newPost.id }]); }
                    }
                }
            }
            closePostModal(); document.getElementById('postText').value = ''; mediaFileInput.value = ''; 
            if (currentTab === 'mypage') await renderMyPage(); else await fetchAndRenderPosts();
        }

            // 🔧 メンテナンス中のブロックを追加
            if (isMaintenanceActive && (!currentUser || currentUser.username !== allowedAdminUser)) {
                alert('ただいまメンテナンス中のため、この操作は行えません。');
                return;
            }

            const text = document.getElementById('commentText').value.trim();
            // ... (これ以降は元のコードのまま)
            const input = document.getElementById('modalCommentInput'); const text = input.value.trim(); if (!text || !activePostIdForComment) return;
            const { error } = await exClient.from('comments').insert([{ post_id: activePostIdForComment, user_id: currentUser.id, content: text, parent_id: activeParentCommentId }]);
            if (!error) {
                const mentionMatches = text.match(/@([A-Za-z0-9_ぁ-んァ-ヶー一-龠々]+)/g);
                if (mentionMatches) {
                    for (const match of mentionMatches) {
                        const targetName = match.replace('@', ''); if (targetName === myProfileName) continue;
                        const { data: targetUser } = await exClient.from('public_profiles').select('id').eq('username', targetName).maybeSingle();
                        if (targetUser) { await exClient.from('notifications').insert([{ user_id: targetUser.id, type: 'mention', sender_name: myProfileName, source_id: activePostIdForComment }]); }
                    }
                }
                input.value = ''; cancelReplyTarget(); await renderComments(); 
                if (currentTab === 'mypage') await renderMyPage(); else await fetchAndRenderPosts();
            }
        }

        async function toggleCommentLike(commentId, isLiked) { if (!currentUser) { alert('ログインが必要です'); return; } if (isLiked) { await exClient.from('comment_likes').delete().eq('comment_id', commentId).eq('user_id', currentUser.id); } else { await exClient.from('comment_likes').insert([{ comment_id: commentId, user_id: currentUser.id }]); } await renderComments(); }
        async function toggleLike(postId, isLiked) { 
           
            if (isMaintenanceActive && (!currentUser || currentUser.username !== allowedAdminUser)) {
                alert('ただいまメンテナンス中のため、この操作は行えません。');
                return;
            }

            // ... (これ以降は元のコードのまま)
            if (!currentUser) { alert('ログインが必要です'); return; } 
            if (isLiked) { await exClient.from('likes').delete().eq('post_id', postId).eq('user_id', currentUser.id); } 
            else { await exClient.from('likes').insert([{ post_id: postId, user_id: currentUser.id }]); } 
            if (currentTab === 'mypage') await renderMyPage(); else await fetchAndRenderPosts(); 
        }

        async function viewUserProfile(userId, updateHistory = true) {
            const { data: profile } = await exClient.from('public_profiles').select('*').eq('id', userId).single(); if (!profile) return;
            document.getElementById('viewAvatar').src = profile.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + profile.username;
            document.getElementById('viewName').innerText = profile.username; document.getElementById('viewBio').innerText = profile.bio || "自己紹介はまだありません。";
            const btnArea = document.getElementById('followBtnArea'); btnArea.innerHTML = '';
            if (currentUser && currentUser.id !== userId) {
                const { data: follow } = await exClient.from('follows').select('id').eq('follower_id', currentUser.id).eq('following_id', userId).maybeSingle();
                if (follow) { btnArea.innerHTML = `<button onclick="toggleFollow('${userId}', true)" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-full font-bold text-sm hover:bg-gray-300 w-full">フォロー解除する</button>`; }
                else { btnArea.innerHTML = `<button onclick="toggleFollow('${userId}', false)" class="bg-green-50 text-white px-6 py-2 rounded-full font-bold text-sm hover:bg-green-600 w-full">フォローする</button>`; }
            }
            document.getElementById('userViewModal').classList.remove('hidden');
            if (updateHistory) { window.history.pushState({type: 'user', id: userId}, null, `#/user/${userId}`); }
        }

        function closeUserViewModal(updateHistory = false) {
            document.getElementById('userViewModal').classList.add('hidden');
            if (updateHistory) {
                if (currentTab === 'mypage') window.history.pushState(null, null, '#/mypage');
                else window.history.pushState(null, null, ' ');
            }
        }

        async function toggleFollow(targetUserId, isFollowing) { if (isFollowing) { await exClient.from('follows').delete().eq('follower_id', currentUser.id).eq('following_id', targetUserId); } else { await exClient.from('follows').insert([{ follower_id: currentUser.id, following_id: targetUserId }]); } closeUserViewModal(true); if (currentTab === 'mypage') await renderMyPage(); else await fetchAndRenderPosts(); }
        async function deletePost(postId) { if (confirm('削除しますか？')) { await exClient.from('posts').delete().eq('id', postId); if (currentTab === 'mypage') await renderMyPage(); else await fetchAndRenderPosts(); } }

        async function handleAuthSubmit() {
            const username = document.getElementById('authUsername').value.trim(); const password = document.getElementById('authPassword').value.trim(); if (!username || !password) return; const dummyEmail = `${username}@gmail.com`;
            if (isSignUpMode) {
                const { data: authData } = await exClient.auth.signUp({ email: dummyEmail, password });
                if (authData.user) { await exClient.from('profiles').insert([{ id: authData.user.id, username: username, bio: "", avatar_url: null }]); location.reload(); }
            } else { const { error } = await exClient.auth.signInWithPassword({ email: dummyEmail, password }); if (!error) location.reload(); }
        }

        async function saveProfile() {
            if (!currentUser) return; const bioText = document.getElementById('editBio').value.trim(); const avatarFileInput = document.getElementById('avatarFile'); const avatarFile = avatarFileInput.files[0]; let avatarUrl = document.getElementById('myAvatar').src;
            if (avatarFile) { const compressedBlob = await compressImage(avatarFile); const fileName = `${currentUser.id}_${Date.now()}.jpg`; await exClient.storage.from('avatars').upload(fileName, compressedBlob, { contentType: 'image/jpeg', upsert: true }); const { data: { publicUrl } } = exClient.storage.from('avatars').getPublicUrl(fileName); avatarUrl = publicUrl; }
            await exClient.from('profiles').update({ bio: bioText, avatar_url: avatarUrl }).eq('id', currentUser.id); 
            if (currentTab === 'mypage') await renderMyPage(); else location.reload();
        }

        async function handleLogout() { await exClient.auth.signOut(); location.reload(); }
        function openAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }
        function openPostModal() { document.getElementById('postModal').classList.remove('hidden'); }
        function closePostModal() { document.getElementById('postModal').classList.add('hidden'); }
        function openProfileModal() { document.getElementById('profileModal').classList.remove('hidden'); }
        function closeProfileModal() { document.getElementById('profileModal').classList.add('hidden'); }
        function openAnnounceModal() { document.getElementById('announceModal').classList.remove('hidden'); }
        function closeAnnounceModal() { document.getElementById('announceModal').classList.add('hidden'); }
        function openUserSearchModal() { document.getElementById('userSearchModal').classList.remove('hidden'); document.getElementById('userQueryInput').value = ''; searchUsers(); }
        function closeUserSearchModal() { document.getElementById('userSearchModal').classList.add('hidden'); }
        function toggleAuthMode() { isSignUpMode = !isSignUpMode; document.getElementById('authTitle').innerText = isSignUpMode ? '簡易アカウント作成' : 'ログイン'; document.getElementById('authSubmitBtn').innerText = isSignUpMode ? 'アカウントを作成する' : 'ログインする'; document.getElementById('authPasswordConfirm').classList.toggle('hidden', !isSignUpMode); }

        // 🆕 投稿の個別リンクをクリップボードにコピーする関数
        async function sharePost(postId) {
            // 現在のページのURLの末尾に「#/post/投稿ID」をくっつける
            const shareUrl = `${window.location.origin}${window.location.pathname}#/post/${postId}`;
            
            try {
                await navigator.clipboard.writeText(shareUrl);
                alert('投稿のリンクをクリップボードにコピーしました！');
            } catch (err) {
                alert('コピーに失敗しました。');
            }
        }
        // 🆕 最新の投稿IDを取得する関数
        async function initLatestPostId() {
            const { data, error } = await exClient.from('posts').select('id').order('created_at', { ascending: false }).limit(1).maybeSingle();
            if (!error && data) { latestPostId = data.id; }
        }

        // 🆕 5秒ごとに新しい投稿があるか調べる関数
        async function checkNewPosts() {
            // 最新タブかつ検索中でない場合のみチェック
            if (currentTab !== 'latest' || currentSearchWord) return;
            
            const { data, error } = await exClient.from('posts').select('id').order('created_at', { ascending: false }).limit(1).maybeSingle();
            if (!error && data && latestPostId) {
                if (data.id > latestPostId) {
                    document.getElementById('newPostAlert').classList.remove('hidden');
                }
            }
        }

        // 🆕 「新しい投稿」ボタンが押された時の更新処理
        async function loadNewPosts() {
            document.getElementById('newPostAlert').classList.add('hidden');
            await initLatestPostId();
            await fetchAndRenderPosts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        // 🆕 編集モーダルを開閉する関数
        function openEditPostModal(postId, currentContent) {
            editingPostId = postId;
            document.getElementById('editPostId').value = postId;
            document.getElementById('editPostText').value = currentContent;
            document.getElementById('editPostModal').classList.remove('hidden');
        }

        function closeEditPostModal() {
            document.getElementById('editPostModal').classList.add('hidden');
            editingPostId = null;
        }
        // 🆕 編集した内容をSupabaseに保存して反映する関数
        async function submitEditPost() {
            // 🔧 メンテナンス中のブロックを追加
            if (isMaintenanceActive && (!currentUser || currentUser.username !== allowedAdminUser)) {
                alert('ただいまメンテナンス中のため、この操作は行えません。');
                return;
            }

            const postId = document.getElementById('editPostId').value;
            // ... (これ以降は元のコードのまま)
            const postId = document.getElementById('editPostId').value;
            const newContent = document.getElementById('editPostText').value.trim();

            if (!newContent) {
                alert('投稿内容を入力してください。');
                return;
            }

            const { error } = await exClient
                .from('posts')
                .update({ content: newContent })
                .eq('id', postId);

            if (error) {
                alert('投稿の更新に失敗しました。');
                console.error(error);
            } else {
                closeEditPostModal();
                await fetchAndRenderPosts(); // タイムラインを再読込
            }
        }
    </script>
