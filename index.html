<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIJ！コミュニティ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; padding-bottom: 80px; }
        .main-container { max-width: 500px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; }
        @keyframes highlight {
            0% { background-color: #fef08a; }
            100% { background-color: #ffffff; }
        }
        .highlight-post { animation: highlight 2.5s ease-out-forward; }
    </style>
</head>
<body>

    <div class="main-container shadow-lg flex flex-col min-h-screen">
        
        <header class="sticky top-0 bg-white border-b border-gray-200 p-4 z-10 space-y-3">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold text-green-600 cursor-pointer" onclick="clearSearch()">SIJ!コミュニティ</h1>
                <div class="flex items-center space-x-2">
                    <div id="userInfo" class="hidden flex items-center space-x-2">
                        <img id="myAvatar" onclick="openProfileModal()" class="w-8 h-8 rounded-full border cursor-pointer hover:opacity-80 transition" src="" alt="my avatar">
                        <span id="myName" onclick="openProfileModal()" class="text-sm font-bold text-gray-700 cursor-pointer hover:underline"></span>
                    </div>
                    <button id="adminAnnounceBtn" onclick="openAnnounceModal()" class="hidden bg-red-500 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-red-600 animate-pulse">
                        <i class="fa-solid fa-bullhorn"></i> 告知
                    </button>
                    <button id="postBtn" onclick="openPostModal()" class="hidden bg-green-500 text-white px-3 py-1.5 rounded-full text-xs font-bold hover:bg-green-600">
                        <i class="fa-solid fa-pen"></i> 投稿
                    </button>
                    <button id="authBtn" onclick="openAuthModal()" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-gray-300">
                        ログイン/作成
                    </button>
                    <button id="logoutBtn" onclick="handleLogout()" class="hidden bg-red-100 text-red-600 px-3 py-1.5 rounded-full text-xs font-bold hover:bg-red-200">
                        ログアウト
                    </button>
                </div>
            </div>

            <div class="flex items-center space-x-2">
                <div class="flex-1 flex items-center space-x-2 bg-gray-100 rounded-full px-3 py-1.5 border border-gray-200">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
                    <span class="text-gray-400 font-bold text-sm">#</span>
                    <input id="searchInput" type="text" class="bg-transparent border-none outline-none text-sm w-full" placeholder="タグ名で検索" onkeydown="if(event.key==='Enter') execSearch()">
                    <button onclick="execSearch()" class="text-xs bg-green-600 text-white px-3 py-1 rounded-full font-bold hover:bg-green-700">検索</button>
                </div>
                <button onclick="openUserSearchModal()" class="bg-gray-100 border border-gray-200 text-gray-600 p-2 rounded-full hover:bg-gray-200 transition" title="ユーザー検索">
                    <i class="fa-solid fa-user-gear"></i>
                </button>
            </div>

            <div id="searchBadge" class="hidden text-xs bg-green-50 text-green-700 px-3 py-1 rounded-md flex justify-between items-center">
                <span>検索中: <strong id="searchWord"></strong></span>
                <button onclick="clearSearch()" class="text-gray-400 hover:text-gray-600">&times; 解除</button>
            </div>
        </header>

        <div id="profileBar" class="hidden bg-gray-50 p-3 border-b border-gray-100 text-xs text-gray-600 flex justify-between items-center">
            <div>
                <span class="font-bold">自己紹介:</span> <span id="myBio">未設定</span>
            </div>
            <button onclick="openProfileModal()" class="text-green-600 hover:underline">編集</button>
        </div>

        <div id="announceArea" class="hidden bg-green-50 border-b border-green-200 p-4 space-y-2 text-sm text-green-800">
            <div class="flex items-center space-x-2 font-bold text-green-700">
                <i class="fa-solid fa-bullhorn animate-bounce"></i>
                <span>公式からのお知らせ</span>
            </div>
            <p id="announceText" class="whitespace-pre-wrap leading-relaxed font-semibold">現在お知らせはありません。</p>
        </div>

        <main id="timeline" class="flex-1 p-4 space-y-6 pb-24">
            <div class="text-center text-gray-500 py-10">読み込み中...</div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 max-w-[500px] mx-auto bg-white border-t border-gray-200 flex justify-around py-3 z-10 shadow-lg">
            <button id="tabLatest" onclick="switchTab('latest')" class="flex flex-col items-center text-green-600 font-bold text-xs w-1/4">
                <i class="fa-solid fa-globe text-lg mb-0.5"></i>
                <span>最新</span>
            </button>
            <button id="tabRecommend" onclick="switchTab('recommend')" class="flex flex-col items-center text-gray-400 font-bold text-xs w-1/4">
                <i class="fa-solid fa-fire text-lg mb-0.5"></i>
                <span>おすすめ</span>
            </button>
            <button id="tabFollow" onclick="switchTab('follow')" class="flex flex-col items-center text-gray-400 font-bold text-xs w-1/4">
                <i class="fa-solid fa-user-group text-lg mb-0.5"></i>
                <span>フォロー中</span>
            </button>
            <button id="tabNotification" onclick="switchTab('notification')" class="flex flex-col items-center text-gray-400 font-bold text-xs w-1/4 relative">
                <i class="fa-solid fa-bell text-lg mb-0.5"></i>
                <span>通知</span>
                <span id="navNotifyBadge" class="hidden absolute top-2 right-6 bg-red-500 text-white rounded-full text-[10px] w-4 h-4 flex items-center justify-center font-bold">0</span>
            </button>
        </nav>

    </div>

    <div id="commentModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-md p-6 flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-lg font-bold text-gray-800"><i class="fa-regular fa-comments text-green-600 mr-1"></i> コメント</h3>
                <button onclick="closeCommentModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
            </div>
            <div id="commentListArea" class="flex-1 overflow-y-auto space-y-4 pr-1 mb-4 text-sm"></div>
            <div id="replyTargetBadge" class="hidden text-xs bg-blue-50 text-blue-700 p-2 rounded mb-2 flex justify-between items-center">
                <span><strong id="replyTargetName"></strong> さんに返信中...</span>
                <button onclick="cancelReplyTarget()" class="text-gray-400 hover:text-gray-600">&times; 取消</button>
            </div>
            <div id="commentFormArea"></div>
        </div>
    </div>

    <div id="userSearchModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-sm p-6">
            <div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold">ユーザーを探す</h3><button onclick="closeUserSearchModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button></div>
            <input id="userQueryInput" type="text" class="border rounded-full px-3 py-1.5 text-sm w-full outline-none mb-4" placeholder="ユーザー名を入力..." oninput="searchUsers()">
            <div id="userSearchResults" class="space-y-2 max-h-60 overflow-y-auto"></div>
        </div>
    </div>

    <div id="userViewModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-lg w-full max-w-sm p-6 text-center">
            <div class="flex justify-end"><button onclick="closeUserViewModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button></div>
            <img id="viewAvatar" class="w-24 h-24 rounded-full border mx-auto mb-4 object-cover" src="">
            <h3 id="viewName" class="text-xl font-bold text-gray-800 mb-2"></h3>
            <p id="viewBio" class="text-sm text-gray-600 bg-gray-50 p-3 rounded-lg min-h-[50px] flex items-center justify-center whitespace-pre-wrap mb-4"></p>
            <div id="followBtnArea"></div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4"><div class="bg-white rounded-lg w-full max-w-md p-6"><div class="flex justify-between items-center mb-4"><h3 id="authTitle" class="text-lg font-bold">簡易アカウント作成</h3><button onclick="closeAuthModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button></div><div class="space-y-3"><input id="authUsername" type="text" class="w-full border p-2 rounded text-sm" placeholder="ユーザー名"><input id="authPassword" type="password" class="w-full border p-2 rounded text-sm" placeholder="パスワード（6文字以上）"><input id="authPasswordConfirm" type="password" class="w-full border p-2 rounded text-sm" placeholder="パスワード確認（もう一度入力）"><div class="flex flex-col gap-2 pt-2"><button id="authSubmitBtn" onclick="handleAuthSubmit()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600 text-sm">アカウントを作成する</button><button id="authToggleBtn" onclick="toggleAuthMode()" class="text-xs text-gray-500 underline hover:text-gray-700">すでにアカウントをお持ちの方（ログイン）</button></div></div></div></div>
    <div id="profileModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4"><div class="bg-white rounded-lg w-full max-w-md p-6"><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold">プロフィール編集</h3><button onclick="closeProfileModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button></div><div class="space-y-4"><div><label class="block text-xs font-bold text-gray-700 mb-1">アイコン画像</label><input id="avatarFile" type="file" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100"></div><div><label class="block text-xs font-bold text-gray-700 mb-1">一言（自己紹介）</label><input id="editBio" type="text" class="w-full border p-2 rounded text-sm" placeholder="今の一言を入力してください"></div><button onclick="saveProfile()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600 text-sm">保存する</button></div></div></div>
    <div id="postModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4"><div class="bg-white rounded-lg w-full max-w-md p-6"><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold">新規投稿</h3><button onclick="closePostModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button></div><textarea id="postText" class="w-full border border-gray-300 rounded p-2 h-24 resize-none mb-4" placeholder="今なにしてる？ #ハッシュタグ も使えるよ！"></textarea><label class="block text-xs font-bold text-gray-700 mb-1">画像を追加</label><input id="postMediaFile" type="file" accept="image/*" class="w-full text-xs text-gray-500 mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100"><button onclick="submitPost()" class="w-full bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600">投稿する</button></div></div>
    <div id="announceModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4"><div class="bg-white rounded-lg w-full max-w-md p-6"><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold text-red-600">公式お知らせを投稿</h3><button onclick="closeAnnounceModal()" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button></div><textarea id="announceInputText" class="w-full border border-gray-300 rounded p-2 h-32 resize-none mb-4" placeholder="ユーザー全員に見せる重要なお知らせを入力..."></textarea><button onclick="submitAnnouncement()" class="w-full bg-red-500 text-white py-2 rounded font-bold hover:bg-red-600">お知らせを更新する</button></div></div>

    <script>
        const EX_URL = "https://kdydbrscxrekivqmplyn.supabase.co";
        const EX_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkeWRicnNjeHJla2l2cW1wbHluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMDk0NjEsImV4cCI6MjA5OTY4NTQ2MX0._sqoMMFn5Zf1m4VarmbkjXpn0H3Tma5qmymI57JkOLA";
        
        const exClient = supabase.createClient(EX_URL, EX_KEY);

        let currentUser = null;
        let myProfileName = "";
        let isSignUpMode = true;
        let currentSearchWord = "";
        let currentTab = "latest"; 
        
        let activePostIdForComment = null;
        let activeParentCommentId = null;

        window.onload = async () => {
            await checkUser();
            await fetchAnnouncement();
            await fetchAndRenderPosts();
            if (currentUser) {
                await checkUnreadNotifications();
                // 3秒ごとに新着通知がないか定期チェック
                setInterval(checkUnreadNotifications, 3000);
            }
        };

        async function compressImage(file, maxWidth = 800, quality = 0.6) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height;
                        if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => { resolve(blob); }, 'image/jpeg', quality);
                    };
                };
            });
        }

        async function checkUser() {
            const { data: { user } } = await exClient.auth.getUser();
            if (user) {
                currentUser = user;
                const { data: profile } = await exClient.from('profiles').select('*').eq('id', user.id).single();
                if (profile) {
                    myProfileName = profile.username;
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('profileBar').classList.remove('hidden');
                    document.getElementById('postBtn').classList.remove('hidden');
                    document.getElementById('logoutBtn').classList.remove('hidden');
                    document.getElementById('authBtn').classList.add('hidden');
                    document.getElementById('myAvatar').src = profile.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + profile.username;
                    document.getElementById('myName').innerText = profile.username;
                    document.getElementById('myBio').innerText = profile.bio || "未設定";
                    document.getElementById('editBio').value = profile.bio || "";
                    if (profile.username === 'SIJ375') document.getElementById('adminAnnounceBtn').classList.remove('hidden');
                }
            }
        }

        // 🔔 未読通知件数の取得とバッジ表示
        async function checkUnreadNotifications() {
            if (!currentUser) return;
            const { count } = await exClient.from('notifications').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id).eq('is_read', false);
            const badge = document.getElementById('navNotifyBadge');
            if (count > 0) {
                badge.innerText = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        async function fetchAnnouncement() {
            const { data, error } = await exClient.from('announcements').select('content').order('created_at', { ascending: false }).limit(1);
            if (!error && data && data.length > 0) document.getElementById('announceText').innerText = data[0].content;
        }

        async function submitAnnouncement() {
            const text = document.getElementById('announceInputText').value.trim(); if (!text) return;
            const { error } = await exClient.from('announcements').insert([{ content: text }]);
            if (!error) { alert('お知らせを更新しました！'); closeAnnounceModal(); await fetchAnnouncement(); }
        }

        // 🧭 タブ切り替え（通知一覧の描画対応）
        async function switchTab(tabName) {
            currentTab = tabName;
            const tabs = { 
                latest: document.getElementById('tabLatest'), 
                recommend: document.getElementById('tabRecommend'), 
                follow: document.getElementById('tabFollow'),
                notification: document.getElementById('tabNotification')
            };
            Object.keys(tabs).forEach(k => { tabs[k].className = (k === tabName) ? "flex flex-col items-center text-green-600 font-bold text-xs w-1/4 relative" : "flex flex-col items-center text-gray-400 font-bold text-xs w-1/4 relative"; });
            
            if ((tabName === 'follow' || tabName === 'notification') && !currentUser) { 
                alert('ログインが必要です'); 
                switchTab('latest'); 
                return; 
            }

            if (tabName === 'notification') {
                await renderNotificationsList();
            } else {
                await fetchAndRenderPosts();
            }
        }

        async function execSearch() {
            const word = document.getElementById('searchInput').value.trim().replace(/^#/, '');
            if (word) { currentSearchWord = word; document.getElementById('searchWord').innerText = '#' + word; document.getElementById('searchBadge').classList.remove('hidden'); }
            else { clearSearch(); return; }
            await fetchAndRenderPosts();
        }

        async function clearSearch() { currentSearchWord = ""; document.getElementById('searchInput').value = ""; document.getElementById('searchBadge').classList.add('hidden'); await fetchAndRenderPosts(); }

        function parseRichText(text) {
            if (!text) return "";
            let formatted = text.replace(/[#＃]([A-Za-z0-9_ぁ-んァ-ヶー一-龠々]+)/g, (match, tag) => {
                return `<span class="text-blue-500 font-semibold cursor-pointer hover:underline" onclick="clickHashtag('${tag}')">${match}</span>`;
            });
            formatted = formatted.replace(/@([A-Za-z0-9_ぁ-んァ-ヶー一-龠々]+)/g, (match, username) => {
                return `<span class="text-blue-600 font-bold cursor-pointer hover:underline" onclick="clickMention('${username}')">${match}</span>`;
            });
            return formatted;
        }

        function clickHashtag(tag) { document.getElementById('searchInput').value = tag; execSearch(); }
        
        async function clickMention(username) {
            const { data } = await exClient.from('public_profiles').select('id').eq('username', username).maybeSingle();
            if (data) viewUserProfile(data.id);
            else alert('ユーザーが見つかりませんでした');
        }

        async function searchUsers() {
            const query = document.getElementById('userQueryInput').value.trim();
            const resultsArea = document.getElementById('userSearchResults');
            if (!query) { resultsArea.innerHTML = ''; return; }
            const { data: users } = await exClient.from('public_profiles').select('*').ilike('username', `%${query}%`).limit(10);
            if (!users || users.length === 0) { resultsArea.innerHTML = '<p class="text-center text-xs text-gray-400">見つかりませんでした</p>'; return; }
            resultsArea.innerHTML = '';
            users.forEach(u => {
                const avatar = u.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + u.username;
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-2 hover:bg-gray-50 rounded-lg cursor-pointer transition";
                div.onclick = () => { closeUserSearchModal(); viewUserProfile(u.id); };
                div.innerHTML = `<div class="flex items-center"><img src="${avatar}" class="w-8 h-8 rounded-full border mr-2 object-cover"><span class="font-bold text-sm text-gray-800">${u.username}</span></div><i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>`;
                resultsArea.appendChild(div);
            });
        }

        // 📝 タイムライン表示
        async function fetchAndRenderPosts() {
            const timeline = document.getElementById('timeline');
            let query = exClient.from('posts').select(`id, content, media_url, user_id, created_at, profiles ( username, avatar_url )`);
            if (currentSearchWord) query = query.ilike('content', `%#${currentSearchWord}%`);
            if (currentTab === 'follow' && currentUser) {
                const { data: follows } = await exClient.from('follows').select('following_id').eq('follower_id', currentUser.id);
                const followingIds = follows.map(f => f.following_id);
                if (followingIds.length === 0) { timeline.innerHTML = `<div class="text-center text-gray-400 py-10">フォロー中のユーザーがいません。</div>`; return; }
                query = query.in('user_id', followingIds);
            }
            const { data: posts, error } = await query.order('created_at', { ascending: false });
            if (error || !posts) { timeline.innerHTML = `<div class="text-center text-red-500 py-10">読み込み失敗</div>`; return; }
            if (posts.length === 0) { timeline.innerHTML = `<div class="text-center text-gray-400 py-10">投稿がありません。</div>`; return; }

            let extendedPosts = [];
            for (const post of posts) {
                const { count: likeCount } = await exClient.from('likes').select('*', { count: 'exact', head: true }).eq('post_id', post.id);
                const { count: commentCount } = await exClient.from('comments').select('*', { count: 'exact', head: true }).eq('post_id', post.id);
                let isLiked = false;
                if (currentUser) {
                    const { data: myLike } = await exClient.from('likes').select('id').eq('post_id', post.id).eq('user_id', currentUser.id).maybeSingle();
                    if (myLike) isLiked = true;
                }
                extendedPosts.push({ ...post, likeCount: likeCount || 0, commentCount: commentCount || 0, isLiked });
            }

            if (currentTab === 'recommend') {
                extendedPosts.sort((a, b) => (b.likeCount !== a.likeCount) ? b.likeCount - a.likeCount : new Date(b.created_at) - new Date(a.created_at));
            }

            timeline.innerHTML = '';
            extendedPosts.forEach(post => {
                const authorName = post.profiles?.username || "名無しユーザー";
                const authorAvatar = post.profiles?.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + authorName;
                const isMyPost = currentUser && currentUser.id === post.user_id;

                const postCard = document.createElement('div');
                postCard.id = `post-card-${post.id}`; // 通知からのジャンプ用ID
                postCard.className = "bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm mb-4 transition-all duration-500";
                postCard.innerHTML = `
                    <div class="flex justify-between items-center p-3">
                        <div class="flex items-center cursor-pointer hover:opacity-80 transition" onclick="viewUserProfile('${post.user_id}')">
                            <img src="${authorAvatar}" class="w-10 h-10 rounded-full border mr-3 object-cover">
                            <span class="font-bold text-gray-800 hover:underline">${authorName}</span>
                        </div>
                        ${isMyPost ? `<button onclick="deletePost(${post.id})" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                    </div>
                    <div class="px-3 pb-3 text-gray-800 text-sm whitespace-pre-wrap">${parseRichText(post.content)}</div>
                    ${post.media_url ? `<div class="w-full bg-black flex justify-center"><img src="${post.media_url}" class="max-h-96 w-full object-cover"></div>` : ''}
                    
                    <div class="p-3 border-t border-gray-100 flex items-center space-x-6">
                        <button onclick="toggleLike(${post.id}, ${post.isLiked})" class="flex items-center space-x-1 ${post.isLiked ? 'text-red-500' : 'text-gray-400'} hover:scale-105 transition">
                            <i class="${post.isLiked ? 'fa-solid' : 'fa-regular'} fa-heart text-lg"></i>
                            <span class="text-xs font-bold">${post.likeCount}</span>
                        </button>
                        <button onclick="openCommentModal(${post.id})" class="flex items-center space-x-1 text-gray-400 hover:text-green-500 transition">
                            <i class="fa-regular fa-comment text-lg"></i>
                            <span class="text-xs font-bold">${post.commentCount}</span>
                        </button>
                    </div>
                `;
                timeline.appendChild(postCard);
            });
        }

        // 📝 新着ポスト作成時に「フォロワーへの通知」と「@メンション検知」を飛ばす処理
        async function submitPost() {
            if (!currentUser) return;
            const text = document.getElementById('postText').value.trim();
            const mediaFileInput = document.getElementById('postMediaFile');
            const mediaFile = mediaFileInput.files[0]; let mediaUrl = null;
            if (!text && !mediaFile) return;

            if (mediaFile) {
                const compressedBlob = await compressImage(mediaFile);
                const fileName = `${currentUser.id}_${Date.now()}.jpg`;
                await exClient.storage.from('posts').upload(fileName, compressedBlob, { contentType: 'image/jpeg' });
                const { data: { publicUrl } } = exClient.storage.from('posts').getPublicUrl(fileName);
                mediaUrl = publicUrl;
            }

            // 1. 投稿を送信
            const { data: newPost, error } = await exClient.from('posts').insert([{ user_id: currentUser.id, content: text, media_url: mediaUrl }]).select().single();
            
            if (!error && newPost) {
                // 2. 🔔 フォロワー全員に「新規投稿通知」を送信
                const { data: followers } = await exClient.from('follows').select('follower_id').eq('following_id', currentUser.id);
                if (followers && followers.length > 0) {
                    const notifyRecords = followers.map(f => ({
                        user_id: f.follower_id,
                        type: 'follow_post',
                        sender_name: myProfileName,
                        source_id: newPost.id
                    }));
                    await exClient.from('notifications').insert(notifyRecords);
                }

                // 3. 🔔 @メンションされた人に通知を送信
                const mentionMatches = text.match(/@([A-Za-z0-9_ぁ-んァ-ヶー一-龠々]+)/g);
                if (mentionMatches) {
                    for (const match of mentionMatches) {
                        const targetName = match.replace('@', '');
                        if (targetName === myProfileName) continue; // 自分自身へのメンションは通知しない
                        const { data: targetUser } = await exClient.from('public_profiles').select('id').eq('username', targetName).maybeSingle();
                        if (targetUser) {
                            await exClient.from('notifications').insert([{
                                user_id: targetUser.id,
                                type: 'mention',
                                sender_name: myProfileName,
                                source_id: newPost.id
                            }]);
                        }
                    }
                }
            }

            closePostModal(); document.getElementById('postText').value = ''; mediaFileInput.value = ''; await fetchAndRenderPosts();
        }

        // 🔔 通知タブの一覧表示
        async function renderNotificationsList() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '<div class="text-center text-gray-500 py-10">通知を読み込み中...</div>';

            const { data: list, error } = await exClient.from('notifications').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(40);
            
            if (error) { timeline.innerHTML = '<div class="text-center text-red-500 py-10">通知の取得に失敗しました</div>'; return; }
            if (!list || list.length === 0) { timeline.innerHTML = '<div class="text-center text-gray-400 py-10"><i class="fa-regular fa-bell-slash text-3xl mb-2 block"></i>通知はまだありません。</div>'; return; }

            timeline.innerHTML = '<h2 class="text-md font-bold text-gray-700 px-1 mb-2"><i class="fa-solid fa-bell text-green-600 mr-1"></i> あなたへの通知</h2>';
            
            list.forEach(n => {
                const item = document.createElement('div');
                item.className = `p-4 rounded-xl border transition cursor-pointer flex justify-between items-center ${n.is_read ? 'bg-white text-gray-600 border-gray-100' : 'bg-green-50/70 border-green-200 text-gray-900 font-semibold shadow-sm'}`;
                item.onclick = () => clickNotificationItem(n.id, n.source_id);

                let textStr = "";
                let iconStr = "";
                if (n.type === 'mention') {
                    iconStr = '<i class="fa-solid fa-at text-blue-500 text-lg mr-3"></i>';
                    textStr = `💬 ${n.sender_name} さんがあなたをメンションしました！`;
                } else if (n.type === 'follow_post') {
                    iconStr = '<i class="fa-solid fa-user-plus text-green-500 text-lg mr-3"></i>';
                    textStr = `✨ フォロー中の ${n.sender_name} さんの新規投稿があります!!`;
                }

                item.innerHTML = `
                    <div class="flex items-center">
                        ${iconStr}
                        <span class="text-sm">${textStr}</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                `;
                timeline.appendChild(item);
            });
        }

        // 🔔 通知クリック時に既読にして対象投稿にジャンプ
        async function clickNotificationItem(notificationId, postId) {
            // 既読にする
            await exClient.from('notifications').update({ is_read: true }).eq('id', notificationId);
            await checkUnreadNotifications();

            // タイムライン画面（最新タブ）に切り替えてスクロール
            currentTab = "latest";
            const tabs = { latest: document.getElementById('tabLatest'), recommend: document.getElementById('tabRecommend'), follow: document.getElementById('tabFollow'), notification: document.getElementById('tabNotification') };
            Object.keys(tabs).forEach(k => { tabs[k].className = (k === "latest") ? "flex flex-col items-center text-green-600 font-bold text-xs w-1/4 relative" : "flex flex-col items-center text-gray-400 font-bold text-xs w-1/4 relative"; });

            await fetchAndRenderPosts();

            // 対象の投稿カードまでスクロールして光らせる
            setTimeout(() => {
                const targetCard = document.getElementById(`post-card-${postId}`);
                if (targetCard) {
                    targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    targetCard.classList.add('highlight-post');
                    // 3秒後にハイライトクラスを外す
                    setTimeout(() => targetCard.classList.remove('highlight-post'), 3000);
                } else {
                    alert('該当の投稿は削除されたか、見つかりません。');
                }
            }, 300);
        }

        // 💬 コメントエリア表示用関数
        async function openCommentModal(postId) {
            activePostIdForComment = postId; activeParentCommentId = null; 
            document.getElementById('replyTargetBadge').classList.add('hidden');
            document.getElementById('commentModal').classList.remove('hidden');
            await renderComments();
        }

        function closeCommentModal() { document.getElementById('commentModal').classList.add('hidden'); activePostIdForComment = null; activeParentCommentId = null; }

        async function renderComments() {
            const listArea = document.getElementById('commentListArea'); const formArea = document.getElementById('commentFormArea');
            if (!activePostIdForComment) return;
            const { data: comments } = await exClient.from('comments').select(`id, content, user_id, parent_id, created_at, profiles(username, avatar_url)`).eq('post_id', activePostIdForComment).order('created_at', { ascending: true });
            if (!comments || comments.length === 0) { listArea.innerHTML = '<p class="text-gray-400 text-center py-4">コメントはまだありません。</p>'; }
            else {
                listArea.innerHTML = ''; const parentComments = comments.filter(c => !c.parent_id); const replies = comments.filter(c => c.parent_id);
                for (const pc of parentComments) {
                    const pcAvatar = pc.profiles?.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + pc.profiles?.username;
                    const { count: cLikeCount } = await exClient.from('comment_likes').select('*', { count: 'exact', head: true }).eq('comment_id', pc.id);
                    let isCLiked = false; if (currentUser) { const { data: myCLike } = await exClient.from('comment_likes').select('id').eq('comment_id', pc.id).eq('user_id', currentUser.id).maybeSingle(); if (myCLike) isCLiked = true; }
                    const commentDiv = document.createElement('div'); commentDiv.className = "border-b border-gray-100 pb-3";
                    let html = `<div class="flex items-start justify-between"><div class="flex items-start space-x-2"><img src="${pcAvatar}" class="w-7 h-7 rounded-full object-cover mt-0.5 border"><div><div class="font-bold text-xs text-gray-700">${pc.profiles?.username}</div><div class="text-sm text-gray-800 mt-0.5">${parseRichText(pc.content)}</div><div class="flex items-center space-x-3 mt-1 text-[11px] text-gray-400"><button onclick="setReplyTarget(${pc.id}, '${pc.profiles?.username}')" class="hover:text-blue-500 font-bold">返信</button></div></div></div><button onclick="toggleCommentLike(${pc.id}, ${isCLiked})" class="text-xs flex items-center space-x-0.5 ${isCLiked ? 'text-red-500' : 'text-gray-400'}"><i class="${isCLiked ? 'fa-solid' : 'fa-regular'} fa-heart"></i><span>${cLikeCount || 0}</span></button></div>`;
                    const thisReplies = replies.filter(r => r.parent_id === pc.id);
                    if (thisReplies.length > 0) {
                        html += `<div class="ml-8 mt-2 space-y-2 border-l-2 border-gray-100 pl-3 bg-gray-50/50 p-2 rounded-lg">`;
                        for (const rc of thisReplies) {
                            const rcAvatar = rc.profiles?.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + rc.profiles?.username;
                            const { count: rcLikeCount } = await exClient.from('comment_likes').select('*', { count: 'exact', head: true }).eq('comment_id', rc.id);
                            let isRcLiked = false; if (currentUser) { const { data: myRcLike } = await exClient.from('comment_likes').select('id').eq('comment_id', rc.id).eq('user_id', currentUser.id).maybeSingle(); if (myRcLike) isRcLiked = true; }
                            html += `<div class="flex items-start justify-between"><div class="flex items-start space-x-2"><img src="${rcAvatar}" class="w-5 h-5 rounded-full object-cover mt-0.5 border"><div><div class="font-bold text-[11px] text-gray-600">${rc.profiles?.username}</div><div class="text-xs text-gray-800 mt-0.5">${parseRichText(rc.content)}</div></div></div><button onclick="toggleCommentLike(${rc.id}, ${isRcLiked})" class="text-[10px] flex items-center space-x-0.5 ${isRcLiked ? 'text-red-500' : 'text-gray-400'}"><i class="${isRcLiked ? 'fa-solid' : 'fa-regular'} fa-heart"></i><span>${rcLikeCount || 0}</span></button></div>`;
                        }
                        html += `</div>`;
                    }
                    commentDiv.innerHTML = html; listArea.appendChild(commentDiv);
                }
            }
            if (currentUser) { formArea.innerHTML = `<div class="flex items-center space-x-2"><input id="modalCommentInput" type="text" placeholder="コメントや @ユーザー名 を入力..." class="border rounded-full px-4 py-2 text-xs w-full outline-none"><button onclick="submitModalComment()" class="text-xs bg-green-500 text-white px-4 py-2 rounded-full font-bold hover:bg-green-600 shrink-0">送信</button></div>`; }
            else { formArea.innerHTML = '<p class="text-center text-xs text-gray-400">コメントするにはログインが必要です</p>'; }
        }

        function setReplyTarget(commentId, username) { activeParentCommentId = commentId; document.getElementById('replyTargetName').innerText = username; document.getElementById('replyTargetBadge').classList.remove('hidden'); const input = document.getElementById('modalCommentInput'); if (input) { input.value = `@${username} `; input.focus(); } }
        function cancelReplyTarget() { activeParentCommentId = null; document.getElementById('replyTargetBadge').classList.add('hidden'); }

        async function submitModalComment() {
            const input = document.getElementById('modalCommentInput'); const text = input.value.trim(); if (!text || !activePostIdForComment) return;
            const { error } = await exClient.from('comments').insert([{ post_id: activePostIdForComment, user_id: currentUser.id, content: text, parent_id: activeParentCommentId }]);
            if (!error) {
                // コメント内の@メンション通知送信ロジック
                const mentionMatches = text.match(/@([A-Za-z0-9_ぁ-んァ-ヶー一-龠々]+)/g);
                if (mentionMatches) {
                    for (const match of mentionMatches) {
                        const targetName = match.replace('@', ''); if (targetName === myProfileName) continue;
                        const { data: targetUser } = await exClient.from('public_profiles').select('id').eq('username', targetName).maybeSingle();
                        if (targetUser) { await exClient.from('notifications').insert([{ user_id: targetUser.id, type: 'mention', sender_name: myProfileName, source_id: activePostIdForComment }]); }
                    }
                }
                input.value = ''; cancelReplyTarget(); await renderComments(); await fetchAndRenderPosts();
            }
        }

        async function toggleCommentLike(commentId, isLiked) { if (!currentUser) { alert('ログインが必要です'); return; } if (isLiked) { await exClient.from('comment_likes').delete().eq('comment_id', commentId).eq('user_id', currentUser.id); } else { await exClient.from('comment_likes').insert([{ comment_id: commentId, user_id: currentUser.id }]); } await renderComments(); }
        async function toggleLike(postId, isLiked) { if (!currentUser) { alert('ログインが必要です'); return; } if (isLiked) { await exClient.from('likes').delete().eq('post_id', postId).eq('user_id', currentUser.id); } else { await exClient.from('likes').insert([{ post_id: postId, user_id: currentUser.id }]); } await fetchAndRenderPosts(); }

        async function viewUserProfile(userId) {
            const { data: profile } = await exClient.from('public_profiles').select('*').eq('id', userId).single(); if (!profile) return;
            document.getElementById('viewAvatar').src = profile.avatar_url || "https://api.dicebear.com/7.x/adventurer/svg?seed=" + profile.username;
            document.getElementById('viewName').innerText = profile.username; document.getElementById('viewBio').innerText = profile.bio || "自己紹介はまだありません。";
            const btnArea = document.getElementById('followBtnArea'); btnArea.innerHTML = '';
            if (currentUser && currentUser.id !== userId) {
                const { data: follow } = await exClient.from('follows').select('id').eq('follower_id', currentUser.id).eq('following_id', userId).maybeSingle();
                if (follow) { btnArea.innerHTML = `<button onclick="toggleFollow('${userId}', true)" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-full font-bold text-sm hover:bg-gray-300 w-full">フォロー解除する</button>`; }
                else { btnArea.innerHTML = `<button onclick="toggleFollow('${userId}', false)" class="bg-green-500 text-white px-6 py-2 rounded-full font-bold text-sm hover:bg-green-600 w-full">フォローする</button>`; }
            }
            document.getElementById('userViewModal').classList.remove('hidden');
        }

        async function toggleFollow(targetUserId, isFollowing) { if (isFollowing) { await exClient.from('follows').delete().eq('follower_id', currentUser.id).eq('following_id', targetUserId); } else { await exClient.from('follows').insert([{ follower_id: currentUser.id, following_id: targetUserId }]); } closeUserViewModal(); await fetchAndRenderPosts(); }
        async function deletePost(postId) { if (confirm('削除しますか？')) { await exClient.from('posts').delete().eq('id', postId); await fetchAndRenderPosts(); } }

        async function handleAuthSubmit() {
            const username = document.getElementById('authUsername').value.trim(); const password = document.getElementById('authPassword').value.trim(); if (!username || !password) return; const dummyEmail = `${username}@gmail.com`;
            if (isSignUpMode) {
                const { data: authData } = await exClient.auth.signUp({ email: dummyEmail, password });
                if (authData.user) { await exClient.from('profiles').insert([{ id: authData.user.id, username: username, bio: "", avatar_url: null }]); location.reload(); }
            } else { const { error } = await exClient.auth.signInWithPassword({ email: dummyEmail, password }); if (!error) location.reload(); }
        }

        async function saveProfile() {
            if (!currentUser) return; const bioText = document.getElementById('editBio').value.trim(); const avatarFileInput = document.getElementById('avatarFile'); const avatarFile = avatarFileInput.files[0]; let avatarUrl = document.getElementById('myAvatar').src;
            if (avatarFile) { const compressedBlob = await compressImage(avatarFile); const fileName = `${currentUser.id}_${Date.now()}.jpg`; await exClient.storage.from('avatars').upload(fileName, compressedBlob, { contentType: 'image/jpeg', upsert: true }); const { data: { publicUrl } } = exClient.storage.from('avatars').getPublicUrl(fileName); avatarUrl = publicUrl; }
            await exClient.from('profiles').update({ bio: bioText, avatar_url: avatarUrl }).eq('id', currentUser.id); location.reload();
        }

        async function handleLogout() { await exClient.auth.signOut(); location.reload(); }
        function openAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }
        function openPostModal() { document.getElementById('postModal').classList.remove('hidden'); }
        function closePostModal() { document.getElementById('postModal').classList.add('hidden'); }
        function openProfileModal() { document.getElementById('profileModal').classList.remove('hidden'); }
        function closeProfileModal() { document.getElementById('profileModal').classList.add('hidden'); }
        function openAnnounceModal() { document.getElementById('announceModal').classList.remove('hidden'); }
        function closeAnnounceModal() { document.getElementById('announceModal').classList.add('hidden'); }
        function closeUserViewModal() { document.getElementById('userViewModal').classList.add('hidden'); }
        function openUserSearchModal() { document.getElementById('userSearchModal').classList.remove('hidden'); document.getElementById('userQueryInput').value = ''; searchUsers(); }
        function closeUserSearchModal() { document.getElementById('userSearchModal').classList.add('hidden'); }
        function toggleAuthMode() { isSignUpMode = !isSignUpMode; document.getElementById('authTitle').innerText = isSignUpMode ? '簡易アカウント作成' : 'ログイン'; document.getElementById('authSubmitBtn').innerText = isSignUpMode ? 'アカウントを作成する' : 'ログインする'; document.getElementById('authPasswordConfirm').classList.toggle('hidden', !isSignUpMode); }
    </script>
</body>
</html>
